            // ================================================================
            // 19. 音頻工具
            // ================================================================
            const audioWorkletBlobUrl = URL.createObjectURL(new Blob([`
                class PCMProcessor extends AudioWorkletProcessor {
                    process(inputs, outputs, parameters) {
                        const input = inputs[0];
                        if (input && input.length > 0) {
                            const channelData = input[0];
                            const pcm = new Int16Array(channelData.length);
                            for (let i = 0; i < channelData.length; i++) {
                                const s = Math.max(-1, Math.min(1, channelData[i]));
                                pcm[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
                            }
                            this.port.postMessage(pcm);
                        }
                        return true;
                    }
                }
                registerProcessor('pcm-processor', PCMProcessor);
            `], { type: 'application/javascript' }));

            // ================================================================
            // 20. 語音識別
            // ================================================================
            function recognizeWithIat(audioBase64, wsUrl) {
                return new Promise((resolve, reject) => {
                    const ws = new WebSocket(wsUrl);
                    let transcript = '';
                    let finished = false;
                    const timeout = setTimeout(() => {
                        if (!finished) {
                            ws.close();
                            reject(new Error('語音識別超時'));
                        }
                    }, 15000);

                    ws.onopen = () => {
                        ws.send(JSON.stringify({
                            common: { app_id: 'b35875f2' },
                            business: { language: 'zh_cn', domain: 'iat', accent: 'mandarin' },
                            data: { status: 0, format: 'audio/L16;rate=16000', encoding: 'raw', audio: '' }
                        }));
                        const audioBuffer = Uint8Array.from(atob(audioBase64), c => c.charCodeAt(0));
                        const chunkSize = 4000;
                        let offset = 0;
                        while (offset < audioBuffer.length) {
                            const chunk = audioBuffer.slice(offset, offset + chunkSize);
                            const chunkBase64 = btoa(String.fromCharCode.apply(null, chunk));
                            ws.send(JSON.stringify({
                                data: { status: 1, format: 'audio/L16;rate=16000', encoding: 'raw',
                                    audio: chunkBase64 }
                            }));
                            offset += chunkSize;
                        }
                        ws.send(JSON.stringify({
                            data: { status: 2, format: 'audio/L16;rate=16000', encoding: 'raw', audio: '' }
                        }));
                    };

                    ws.onmessage = (event) => {
                        try {
                            const msg = JSON.parse(event.data);
                            if (msg.code && msg.code !== 0) {
                                reject(new Error(`IAT error: ${msg.code}`));
                                return;
                            }
                            if (msg.data && msg.data.result && msg.data.result.ws) {
                                let text = '';
                                for (const w of msg.data.result.ws) {
                                    for (const cw of w.cw) text += cw.w;
                                }
                                transcript += text;
                            }
                            if (msg.data && msg.data.status === 2) {
                                finished = true;
                                clearTimeout(timeout);
                                ws.close();
                                resolve(transcript);
                            }
                        } catch (e) {
                            reject(e);
                        }
                    };

                    ws.onerror = (err) => {
                        clearTimeout(timeout);
                        reject(err);
                    };
                    ws.onclose = () => {
                        if (!finished) {
                            clearTimeout(timeout);
                            reject(new Error('WebSocket 關閉'));
                        }
                    };
                });
            }

            // ================================================================
            // 21. 開放式錄音綁定
            // ================================================================
            function bindOpenRecording(q) {
                const startBtn = document.getElementById('startRecordBtn');
                const stopBtn = document.getElementById('stopRecordBtn');
                const dot = document.getElementById('recordDot');
                const timer = document.getElementById('recordTimer');
                const statusText = document.getElementById('statusText');
                const transcript = document.getElementById('studentTranscript');
                const progressContainer = document.getElementById('progressContainer');
                const progressBar = document.getElementById('progressBar');
                const progressText = document.getElementById('progressText');

                let mediaStream = null,
                    audioContext = null,
                    workletNode = null;
                let isRecording = false,
                    recordTimer = null,
                    seconds = 0;
                let audioBuffer = [];
                const SAMPLE_RATE = 16000;
                let isProcessing = false;
                let maxTimeReached = false;

                startBtn.onclick = function() { if (!isRecording) startRecording(); };
                stopBtn.onclick = function() { if (isRecording) stopRecording(); };

                function stopRecordingManually() {
                    if (isRecording) {
                        isRecording = false;
                        dot.className = 'status-dot';
                        startBtn.disabled = false;
                        stopBtn.disabled = true;
                        if (recordTimer) { clearInterval(recordTimer);
                            recordTimer = null; }
                        statusText.textContent = '⏹️ ' + t('stopRecording');
                        if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop());
                            mediaStream = null; }
                        if (audioContext) { audioContext.close();
                            audioContext = null; }
                        if (workletNode) { workletNode.disconnect();
                            workletNode = null; }
                        if (!maxTimeReached) {
                            progressContainer.classList.remove('hidden');
                            progressBar.style.width = '10%';
                            progressText.textContent = t('progress');
                            processAudio();
                        }
                    }
                }

                async function startRecording() {
                    audioBuffer = [];
                    maxTimeReached = false;
                    document.getElementById('scoreResult').classList.add('hidden');
                    progressContainer.classList.add('hidden');
                    progressBar.style.width = '0%';
                    try {
                        await initAudioWorklet();
                        isRecording = true;
                        dot.className = 'status-dot recording';
                        startBtn.disabled = true;
                        stopBtn.disabled = false;
                        seconds = 0;
                        timer.textContent = '00:00';
                        if (recordTimer) clearInterval(recordTimer);
                        recordTimer = setInterval(() => {
                            seconds++;
                            if (seconds >= MAX_RECORDING_TIME) {
                                maxTimeReached = true;
                                statusText.textContent = '⏰ ' + t('maxRecordingTime');
                                stopRecordingManually();
                                progressContainer.classList.remove('hidden');
                                progressBar.style.width = '10%';
                                progressText.textContent = t('progress');
                                processAudio();
                                return;
                            }
                            timer.textContent = String(Math.floor(seconds / 60)).padStart(2, '0') + ':' + String(
                                seconds % 60).padStart(2, '0');
                        }, 1000);
                        statusText.textContent = '🔴 ' + t('recording');
                    } catch (err) {
                        console.error('麥克風錯誤:', err);
                        statusText.textContent = '❌ 麥克風錯誤';
                        startBtn.disabled = false;
                    }
                }

                function stopRecording() {
                    if (isRecording) {
                        stopRecordingManually();
                    }
                }

                async function initAudioWorklet() {
                    if (audioContext && audioContext.state === 'running') return;
                    audioContext = new(window.AudioContext || window.webkitAudioContext)({ sampleRate: SAMPLE_RATE });
                    await audioContext.audioWorklet.addModule(audioWorkletBlobUrl);
                    const stream = await navigator.mediaDevices.getUserMedia({
                        audio: { sampleRate: SAMPLE_RATE, channelCount: 1, echoCancellation: false,
                            noiseSuppression: false, autoGainControl: false }
                    });
                    mediaStream = stream;
                    const source = audioContext.createMediaStreamSource(stream);
                    workletNode = new AudioWorkletNode(audioContext, 'pcm-processor');
                    workletNode.port.onmessage = (event) => {
                        if (!isRecording) return;
                        const pcm = event.data;
                        audioBuffer.push(pcm);
                    };
                    workletNode.onprocessorerror = (err) => console.error('AudioWorklet 錯誤:', err);
                    source.connect(workletNode);
                    workletNode.connect(audioContext.destination);
                }

                function processAudio() {
                    if (isProcessing) return;
                    isProcessing = true;
                    const totalLength = audioBuffer.reduce((sum, arr) => sum + arr.length, 0);
                    if (totalLength === 0) {
                        progressContainer.classList.add('hidden');
                        statusText.textContent = '⚠️ 未錄到聲音';
                        isProcessing = false;
                        return;
                    }
                    const merged = new Int16Array(totalLength);
                    let offset = 0;
                    for (const arr of audioBuffer) { merged.set(arr, offset);
                        offset += arr.length; }
                    const bytes = new Uint8Array(merged.buffer);
                    let binary = '';
                    for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
                    const audioBase64 = btoa(binary);

                    progressBar.style.width = '30%';
                    statusText.textContent = '📡 獲取連接...';

                    fetch('/api/getIatUrl')
                        .then(res => {
                            if (!res.ok) throw new Error('獲取 URL 失敗');
                            return res.json();
                        })
                        .then(data => {
                            const wsUrl = data.url;
                            statusText.textContent = '🎤 ' + t('recognizing');
                            progressBar.style.width = '50%';
                            return recognizeWithIat(audioBase64, wsUrl);
                        })
                        .then(transcriptText => {
                            progressBar.style.width = '70%';
                            studentAnswerText = transcriptText;
                            const tradText = toTraditional(transcriptText);
                            transcript.textContent = tradText;
                            const questionInfo = {
                                type: q.type,
                                refAnswer: q.refAnswer || '',
                                keywords: q.keywords || [],
                                subQuestions: q.subQuestions || []
                            };
                            return fetch(BACKEND_URL, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({
                                    question: questionInfo,
                                    textAnswer: transcriptText,
                                    lang: currentLang
                                })
                            });
                        })
                        .then(res => {
                            if (!res.ok) throw new Error('評分錯誤');
                            return res.json();
                        })
                        .then(data => {
                            progressBar.style.width = '90%';
                            if (data.score) {
                                displayScore(data.score);
                            } else {
                                throw new Error('評分結果缺失');
                            }
                            progressContainer.classList.add('hidden');
                            statusText.textContent = '✅ ' + t('done');
                        })
                        .catch(err => {
                            console.error('處理失敗:', err);
                            statusText.textContent = '❌ 服務錯誤';
                            progressContainer.classList.add('hidden');
                        })
                        .finally(() => {
                            isProcessing = false;
                        });
                }

                function displayScore(grade) {
                    const resultDiv = document.getElementById('scoreResult');
                    resultDiv.classList.remove('hidden');
                    if (grade && grade.error) {
                        document.getElementById('totalScore').textContent = '--';
                        document.getElementById('accScore').textContent = '--';
                        document.getElementById('fluencyScore').textContent = '--';
                        document.getElementById('integrityScore').textContent = '--';
                        document.getElementById('suggestionText').innerHTML =
                            `<strong>⚠️ 評分錯誤：</strong>${grade.error || '未知錯誤'}`;
                        document.getElementById('scoreSource').textContent = '';
                        return;
                    }
                    const factor = 10;
                    document.getElementById('totalScore').textContent = Math.round((grade.total_score || 0) * factor);
                    document.getElementById('accScore').textContent = Math.round((grade.accuracy || 0) * factor);
                    document.getElementById('fluencyScore').textContent = Math.round((grade.fluency || 0) * factor);
                    document.getElementById('integrityScore').textContent = Math.round((grade.integrity || 0) * factor);
                    document.getElementById('suggestionText').innerHTML =
                        `<strong>💡 ${t('suggestion')}：</strong>${grade.suggestion || ''}`;
                    document.getElementById('scoreSource').textContent = t('source') + '：訊飛星火 4.0Ultra (經後端代理)';
                    document.querySelectorAll('#scoreResult .num').forEach(el => {
                        const val = parseFloat(el.textContent);
                        if (!isNaN(val)) {
                            el.className = 'num' + (val >= 80 ? ' good' : val >= 60 ? ' mid' : ' poor');
                        }
                    });
                }
            }

            // ================================================================
            // 22. 半固定式錄音綁定
            // ================================================================
            function bindFixedRecording(q) {
                const subs = q.subQuestions || [];
                const recordBtns = document.querySelectorAll('.sq-record-btn');
                const stopBtns = document.querySelectorAll('.sq-stop-btn');
                const transcripts = document.querySelectorAll('.sq-transcript');
                const submitBtn = document.getElementById('submitAllBtn');
                const submitStatus = document.getElementById('submitStatus');
                const progressContainer = document.getElementById('progressContainer');
                const progressBar = document.getElementById('progressBar');
                const progressText = document.getElementById('progressText');

                let currentRecordingIdx = null;
                let mediaStream = null,
                    audioContext = null,
                    workletNode = null;
                let isRecording = false,
                    recordTimer = null,
                    seconds = 0;
                let audioBuffer = [];
                const SAMPLE_RATE = 16000;
                let isProcessing = false;
                let maxTimeReached = false;

                function stopRecordingManually(idx) {
                    if (isRecording) {
                        isRecording = false;
                        const recordBtn = recordBtns[idx];
                        const stopBtn = stopBtns[idx];
                        if (recordBtn) recordBtn.style.display = 'inline-block';
                        if (stopBtn) stopBtn.style.display = 'none';
                        if (recordTimer) { clearInterval(recordTimer);
                            recordTimer = null; }
                        if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop());
                            mediaStream = null; }
                        if (audioContext) { audioContext.close();
                            audioContext = null; }
                        if (workletNode) { workletNode.disconnect();
                            workletNode = null; }
                        const statusSpan = document.querySelectorAll('.sq-status')[idx];
                        if (statusSpan) {
                            statusSpan.textContent = t('waiting');
                            statusSpan.className = 'sq-status waiting';
                        }
                        if (!maxTimeReached) {
                            processAudioForSub(idx);
                        }
                        updateButtons();
                    }
                }

                function updateButtons() {
                    recordBtns.forEach((btn, idx) => {
                        const answered = subAnswered[idx] || false;
                        let disabled = answered || subLocked || isProcessing;
                        if (idx > 0 && !subAnswered[idx - 1]) disabled = true;
                        if (currentRecordingIdx !== null && currentRecordingIdx !== idx) disabled = true;
                        btn.disabled = disabled;
                    });
                    const allDone = subs.every((_, idx) => subAnswered[idx]);
                    if (submitBtn) {
                        submitBtn.disabled = !allDone || subLocked || isProcessing;
                    }
                    if (submitStatus) {
                        submitStatus.textContent = allDone ? t('done') : t('answering');
                    }
                    document.querySelectorAll('.sq-status').forEach((span, idx) => {
                        const answered = subAnswered[idx] || false;
                        if (answered) {
                            span.textContent = t('alreadyAnswered');
                            span.className = 'sq-status done';
                        } else if (currentRecordingIdx === idx && isRecording) {
                            span.textContent = t('recording');
                            span.className = 'sq-status';
                        } else if (currentRecordingIdx === idx && !isRecording && !answered) {
                            span.textContent = t('waiting');
                            span.className = 'sq-status waiting';
                        } else {
                            span.textContent = t('notStarted');
                            span.className = 'sq-status';
                        }
                    });
                }

                recordBtns.forEach((btn, idx) => {
                    btn.onclick = function() {
                        if (this.disabled) return;
                        currentRecordingIdx = idx;
                        maxTimeReached = false;
                        this.style.display = 'none';
                        const stopBtn = stopBtns[idx];
                        stopBtn.style.display = 'inline-block';
                        transcripts[idx].textContent = '';
                        const statusSpan = document.querySelectorAll('.sq-status')[idx];
                        if (statusSpan) {
                            statusSpan.textContent = t('waiting');
                            statusSpan.className = 'sq-status waiting';
                        }
                        startRecordingForSub(idx);
                    };
                });
                stopBtns.forEach((btn, idx) => {
                    btn.onclick = function() {
                        if (!isRecording) return;
                        stopRecordingManually(idx);
                    };
                });

                async function startRecordingForSub(idx) {
                    audioBuffer = [];
                    progressContainer.classList.add('hidden');
                    try {
                        await initAudioWorklet();
                        isRecording = true;
                        const statusSpan = document.querySelectorAll('.sq-status')[idx];
                        if (statusSpan) {
                            statusSpan.textContent = t('recording');
                            statusSpan.className = 'sq-status';
                        }
                        recordBtns.forEach(b => b.disabled = true);
                        seconds = 0;
                        if (recordTimer) clearInterval(recordTimer);
                        recordTimer = setInterval(() => {
                            seconds++;
                            if (seconds >= MAX_RECORDING_TIME) {
                                maxTimeReached = true;
                                statusSpan.textContent = '⏰ ' + t('maxRecordingTime');
                                stopRecordingManually(idx);
                                progressContainer.classList.remove('hidden');
                                progressBar.style.width = '10%';
                                progressText.textContent = t('progress');
                                processAudioForSub(idx);
                                return;
                            }
                        }, 1000);
                        updateButtons();
                    } catch (err) {
                        console.error('麥克風錯誤:', err);
                        const statusSpan = document.querySelectorAll('.sq-status')[idx];
                        if (statusSpan) statusSpan.textContent = '❌ 錯誤';
                    }
                }

                async function initAudioWorklet() {
                    if (audioContext && audioContext.state === 'running') return;
                    audioContext = new(window.AudioContext || window.webkitAudioContext)({ sampleRate: SAMPLE_RATE });
                    await audioContext.audioWorklet.addModule(audioWorkletBlobUrl);
                    const stream = await navigator.mediaDevices.getUserMedia({
                        audio: { sampleRate: SAMPLE_RATE, channelCount: 1, echoCancellation: false,
                            noiseSuppression: false, autoGainControl: false }
                    });
                    mediaStream = stream;
                    const source = audioContext.createMediaStreamSource(stream);
                    workletNode = new AudioWorkletNode(audioContext, 'pcm-processor');
                    workletNode.port.onmessage = (event) => {
                        if (!isRecording) return;
                        const pcm = event.data;
                        audioBuffer.push(pcm);
                    };
                    workletNode.onprocessorerror = (err) => console.error('AudioWorklet 錯誤:', err);
                    source.connect(workletNode);
                    workletNode.connect(audioContext.destination);
                }

                function processAudioForSub(idx) {
                    if (isProcessing) return;
                    isProcessing = true;
                    const totalLength = audioBuffer.reduce((sum, arr) => sum + arr.length, 0);
                    if (totalLength === 0) {
                        const statusSpan = document.querySelectorAll('.sq-status')[idx];
                        if (statusSpan) statusSpan.textContent = '⚠️ 無聲音';
                        isProcessing = false;
                        updateButtons();
                        return;
                    }
                    const merged = new Int16Array(totalLength);
                    let offset = 0;
                    for (const arr of audioBuffer) { merged.set(arr, offset);
                        offset += arr.length; }
                    const bytes = new Uint8Array(merged.buffer);
                    let binary = '';
                    for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
                    const audioBase64 = btoa(binary);

                    fetch('/api/getIatUrl')
                        .then(res => res.json())
                        .then(data => {
                            const wsUrl = data.url;
                            return recognizeWithIat(audioBase64, wsUrl);
                        })
                        .then(transcriptText => {
                            subAnswers[idx] = transcriptText;
                            subAnswered[idx] = true;
                            currentRecordingIdx = null;
                            const statusSpan = document.querySelectorAll('.sq-status')[idx];
                            if (statusSpan) {
                                statusSpan.textContent = t('alreadyAnswered');
                                statusSpan.className = 'sq-status done';
                            }
                            const transcriptEl = transcripts[idx];
                            if (transcriptEl) {
                                transcriptEl.textContent = toTraditional(transcriptText);
                            }
                            const recordBtn = recordBtns[idx];
                            const stopBtn = stopBtns[idx];
                            if (recordBtn) recordBtn.style.display = 'inline-block';
                            if (stopBtn) stopBtn.style.display = 'none';
                            updateButtons();
                        })
                        .catch(err => {
                            console.error('子題目識別失敗:', err);
                            const statusSpan = document.querySelectorAll('.sq-status')[idx];
                            if (statusSpan) statusSpan.textContent = '❌ 錯誤';
                        })
                        .finally(() => {
                            isProcessing = false;
                            updateButtons();
                        });
                }

                if (submitBtn) {
                    submitBtn.onclick = function() {
                        if (this.disabled) return;
                        subLocked = true;
                        updateButtons();
                        progressContainer.classList.remove('hidden');
                        progressBar.style.width = '10%';
                        progressText.textContent = t('progress');

                        let fullAnswer = '';
                        subs.forEach((sq, idx) => {
                            fullAnswer += `問題${idx+1}：${sq.question}\n回答：${subAnswers[idx] || ''}\n`;
                        });
                        const hasChinese = /[\u4e00-\u9fa5]/.test(fullAnswer);
                        if (!hasChinese) {
                            const grade = {
                                total_score: 0,
                                suggestion: t('englishDetected'),
                                sub_scores: subs.map(() => ({ accuracy: 0, completeness: 0, integrity: 0,
                                    comment: '未使用普通話作答' }))
                            };
                            displayFixedScore(grade);
                            progressContainer.classList.add('hidden');
                            subLocked = false;
                            updateButtons();
                            return;
                        }

                        const questionInfo = {
                            type: q.type,
                            refAnswer: q.refAnswer || '',
                            keywords: q.keywords || [],
                            subQuestions: q.subQuestions || []
                        };
                        fetch(BACKEND_URL, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({
                                    question: questionInfo,
                                    textAnswer: fullAnswer,
                                    lang: currentLang
                                })
                            })
                            .then(res => res.json())
                            .then(data => {
                                progressBar.style.width = '80%';
                                if (data.score) {
                                    displayFixedScore(data.score);
                                } else {
                                    throw new Error('評分結果缺失');
                                }
                                progressContainer.classList.add('hidden');
                                subLocked = false;
                                updateButtons();
                            })
                            .catch(err => {
                                console.error('評分錯誤:', err);
                                progressContainer.classList.add('hidden');
                                subLocked = false;
                                updateButtons();
                            });
                    };
                }

                function displayFixedScore(grade) {
                    const resultDiv = document.getElementById('scoreResult');
                    resultDiv.classList.remove('hidden');
                    if (grade && grade.error) {
                        document.getElementById('totalScore').textContent = '--';
                        document.getElementById('accScore').textContent = '--';
                        document.getElementById('compScore').textContent = '--';
                        document.getElementById('integrityScore').textContent = '--';
                        document.getElementById('suggestionText').innerHTML =
                            `<strong>⚠️ 評分錯誤：</strong>${grade.error || '未知錯誤'}`;
                        document.getElementById('scoreSource').textContent = '';
                        document.getElementById('subFeedback').innerHTML = '';
                        return;
                    }
                    const factor = 10;
                    document.getElementById('totalScore').textContent = Math.round((grade.total_score || 0) * factor);
                    let avgAcc = 0,
                        avgComp = 0,
                        avgInt = 0;
                    const subScores = grade.sub_scores || [];
                    if (subScores.length > 0) {
                        let sumAcc = 0,
                            sumComp = 0,
                            sumInt = 0;
                        subScores.forEach(s => {
                            sumAcc += s.accuracy || 0;
                            sumComp += s.completeness || 0;
                            sumInt += s.integrity || 0;
                        });
                        avgAcc = sumAcc / subScores.length;
                        avgComp = sumComp / subScores.length;
                        avgInt = sumInt / subScores.length;
                    } else {
                        avgAcc = grade.accuracy || 0;
                        avgComp = grade.completeness || 0;
                        avgInt = grade.integrity || 0;
                    }
                    document.getElementById('accScore').textContent = Math.round(avgAcc * factor);
                    document.getElementById('compScore').textContent = Math.round(avgComp * factor);
                    document.getElementById('integrityScore').textContent = Math.round(avgInt * factor);
                    document.getElementById('suggestionText').innerHTML =
                        `<strong>💡 ${t('suggestion')}：</strong>${grade.suggestion || ''}`;
                    document.getElementById('scoreSource').textContent = t('source') + '：訊飛星火 4.0Ultra (經後端代理)';
                    document.querySelectorAll('#scoreResult .num').forEach(el => {
                        const val = parseFloat(el.textContent);
                        if (!isNaN(val)) {
                            el.className = 'num' + (val >= 80 ? ' good' : val >= 60 ? ' mid' : ' poor');
                        }
                    });
                    let fbHtml = '';
                    (q.subQuestions || []).forEach((sq, idx) => {
                        const s = subScores[idx] || { accuracy: 0, completeness: 0, integrity: 0, comment: '' };
                        fbHtml += `
                            <div class="fb-item">
                                <strong>${idx+1}.</strong> ${sq.question}<br>
                                內容:${Math.round(s.accuracy*factor)} 完整性:${Math.round(s.completeness*factor)} 語音:${Math.round(s.integrity*factor)}
                                <br>💬 ${s.comment || ''}
                            </div>
                        `;
                    });
                    document.getElementById('subFeedback').innerHTML = fbHtml;
                }

                updateButtons();
            }

            // ================================================================
            // 23. 截圖下載
            // ================================================================
            function downloadScreenshot() {
                const element = document.getElementById('answerArea') || document.getElementById('mainContent');
                if (!element) return;
                if (typeof html2canvas === 'undefined') {
                    alert('html2canvas 未載入，請檢查網路。');
                    return;
                }
                html2canvas(element, {
                    scale: 2,
                    useCORS: true,
                    logging: false,
                    backgroundColor: '#ffffff'
                }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = '評測結果.png';
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                }).catch(err => {
                    console.error('截圖失敗:', err);
                    alert('截圖生成失敗，請重試。');
                });
            }

            // ================================================================
            // 24. 初始化
            // ================================================================
            initConverter();
            startListeningQuestions();
            updateTopBar(); // 初始化頂欄翻譯
            render();
            // 移除控制台日誌
        })();
    </script>
</body>
</html>
