<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>普通话严苛评测 · 基于置信度防方言</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', 'PingFang SC', Roboto, sans-serif;
            background: #f4f7fc;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            width: 100%;
            background: #fff;
            border-radius: 32px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
            padding: 36px 32px;
        }
        h1 {
            font-size: 26px;
            color: #0b1e33;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .warning-banner {
            background: #fef2f2;
            border-left: 5px solid #b91c1c;
            padding: 12px 18px;
            border-radius: 8px;
            margin: 12px 0 24px 0;
            font-size: 14px;
            color: #7f1d1d;
        }
        .warning-banner strong {
            color: #b91c1c;
        }
        .role-tabs {
            display: flex;
            gap: 4px;
            background: #eef2f6;
            border-radius: 60px;
            padding: 4px;
            margin-bottom: 28px;
        }
        .role-tab {
            flex: 1;
            border: none;
            background: transparent;
            padding: 10px 16px;
            border-radius: 60px;
            font-weight: 600;
            color: #4a5a6e;
            cursor: pointer;
            transition: 0.2s;
        }
        .role-tab.active {
            background: #fff;
            color: #0b1e33;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }
        .panel {
            display: none;
            animation: fade 0.25s ease;
        }
        .panel.active {
            display: block;
        }
        @keyframes fade {
            0% {
                opacity: 0.5;
                transform: translateY(6px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .upload-area {
            border: 2px dashed #cbd5e1;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            background: #fafcff;
            margin-bottom: 18px;
        }
        .upload-area:hover {
            border-color: #2563eb;
            background: #f0f7ff;
        }
        .upload-area .icon {
            font-size: 40px;
        }
        #imagePreview {
            max-width: 100%;
            max-height: 260px;
            border-radius: 16px;
            margin-top: 12px;
            display: none;
        }
        .teacher-form label {
            font-weight: 600;
            font-size: 14px;
            color: #1e293b;
            display: block;
            margin-top: 16px;
            margin-bottom: 4px;
        }
        .teacher-form textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #dce2ea;
            border-radius: 14px;
            font-size: 15px;
            font-family: inherit;
            resize: vertical;
            min-height: 70px;
        }
        .teacher-form textarea:focus {
            outline: none;
            border-color: #2563eb;
        }
        .btn {
            padding: 10px 28px;
            border: none;
            border-radius: 60px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 12px;
        }
        .btn-primary {
            background: #0b1e33;
            color: #fff;
        }
        .btn-primary:hover {
            background: #1e3a5f;
        }
        .btn-danger {
            background: #b91c1c;
            color: #fff;
        }
        .btn-danger:hover {
            background: #991b1b;
        }
        .btn-success {
            background: #0b8a5e;
            color: #fff;
        }
        .btn-success:hover {
            background: #0d7a52;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-outline {
            background: transparent;
            border: 1.5px solid #dce2ea;
            color: #1e293b;
        }

        .student-image-box {
            background: #f8fafc;
            border-radius: 16px;
            padding: 16px;
            text-align: center;
            min-height: 100px;
            border: 1px solid #eef2f6;
            margin-bottom: 16px;
        }
        .student-image-box img {
            max-width: 100%;
            max-height: 280px;
            border-radius: 12px;
        }
        .reference-box {
            background: #f0f7ff;
            border-radius: 12px;
            padding: 14px 18px;
            margin-bottom: 16px;
            border-left: 4px solid #2563eb;
        }
        .reference-box .label {
            font-weight: 600;
            font-size: 12px;
            color: #2563eb;
            text-transform: uppercase;
        }

        .recording-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            margin: 12px 0;
        }
        .status-badge {
            padding: 6px 16px;
            border-radius: 60px;
            background: #eef2f6;
            font-size: 14px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .status-badge.recording {
            background: #fee2e2;
            color: #991b1b;
        }
        .status-badge .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #94a3b8;
            display: inline-block;
        }
        .status-badge.recording .dot {
            background: #b91c1c;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.3;
                transform: scale(0.7);
            }
        }

        .result-box {
            background: #f8fafc;
            border-radius: 14px;
            padding: 16px 18px;
            border: 1px solid #eef2f6;
            margin-top: 12px;
            min-height: 50px;
        }
        .result-box .label {
            font-weight: 600;
            font-size: 13px;
            color: #64748b;
        }
        .result-box .text {
            font-size: 16px;
            color: #0b1e33;
            margin-top: 4px;
        }
        .result-box .text.empty {
            color: #b0c0d0;
        }

        .score-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px;
            margin-top: 16px;
        }
        .score-item {
            background: #fff;
            border-radius: 14px;
            padding: 12px;
            border: 1px solid #eef2f6;
            text-align: center;
        }
        .score-item .value {
            font-size: 26px;
            font-weight: 700;
            color: #0b1e33;
        }
        .score-item .value.good {
            color: #0b8a5e;
        }
        .score-item .value.ok {
            color: #d97706;
        }
        .score-item .value.poor {
            color: #b91c1c;
        }
        .score-item .desc {
            font-size: 12px;
            color: #64748b;
            margin-top: 2px;
        }
        .advice-box {
            background: #fefce8;
            border-radius: 14px;
            padding: 16px 18px;
            margin-top: 16px;
            border-left: 4px solid #d97706;
        }
        .advice-box .label {
            font-weight: 600;
            font-size: 13px;
            color: #d97706;
        }
        .advice-box .content {
            margin-top: 4px;
            font-size: 15px;
            line-height: 1.6;
        }

        .confidence-bar {
            margin-top: 12px;
            background: #eef2f6;
            border-radius: 60px;
            height: 8px;
            overflow: hidden;
        }
        .confidence-bar .fill {
            height: 100%;
            border-radius: 60px;
            background: #2563eb;
            transition: width 0.3s;
        }
        .confidence-bar .fill.danger {
            background: #b91c1c;
        }
        .confidence-bar .fill.warning {
            background: #d97706;
        }

        @media (max-width: 640px) {
            .container {
                padding: 20px 12px;
            }
            .recording-controls {
                flex-direction: column;
            }
            .btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎙️ 普通話語音評測</h1>
        <div class="warning-banner">
            ⚠️ <strong>防方言機制已開啟</strong>：系統將嚴格審查語音置信度（Confidence）。若檢測到粵語或地方口音導致置信度偏低（< 0.70），將直接判定為發音不標準，無法獲得高分。
        </div>

        <div class="role-tabs">
            <button class="role-tab active" data-role="teacher">👩‍🏫 教師</button>
            <button class="role-tab" data-role="student">🧑‍🎓 學生</button>
        </div>

        <!-- 教师面板 -->
        <div id="panelTeacher" class="panel active">
            <div class="upload-area" id="uploadArea">
                <span class="icon">🖼️</span>
                <p><strong>點擊上傳看圖說話圖片</strong></p>
                <input type="file" id="imageInput" accept="image/*" style="display:none;">
                <img id="imagePreview" />
            </div>
            <div class="teacher-form">
                <label>📝 參考答案（標準敘述）</label>
                <textarea id="refAnswer">今天的天氣很好，小明和爸爸在公園裡放風箏。媽媽在一旁拍照，他們玩得非常開心。</textarea>
                <label>🏷️ 關鍵詞（逗號分隔）</label>
                <textarea id="refKeywords" style="min-height:40px;">天氣, 小明, 爸爸, 公園, 風箏, 拍照, 開心</textarea>
                <button class="btn btn-success" id="saveConfigBtn">💾 儲存設定</button>
                <span id="saveStatus" style="margin-left:12px;font-size:14px;color:#0b8a5e;"></span>
            </div>
        </div>

        <!-- 学生面板 -->
        <div id="panelStudent" class="panel">
            <div class="student-image-box" id="studentImageBox">
                <span style="color:#94a3b8;">📷 等待教師上傳圖片...</span>
            </div>
            <div class="reference-box">
                <div class="label">📖 參考答案</div>
                <div id="refDisplay" style="margin-top:4px;color:#1e293b;">教師尚未設定。</div>
            </div>

            <div class="recording-controls">
                <button class="btn btn-primary" id="startBtn">🎤 開始錄音</button>
                <button class="btn btn-danger" id="stopBtn" disabled>⏹ 停止</button>
                <span class="status-badge" id="statusBadge"><span class="dot"></span> 就緒</span>
            </div>

            <div class="result-box">
                <div class="label">📝 識別文字</div>
                <div class="text empty" id="recognizedText">點擊錄音後說話...</div>
                <!-- 置信度条 -->
                <div style="margin-top:10px;">
                    <div style="display:flex;justify-content:space-between;font-size:13px;color:#475569;">
                        <span>語音置信度 (Confidence)</span>
                        <span id="confidenceLabel">--</span>
                    </div>
                    <div class="confidence-bar">
                        <div class="fill" id="confidenceFill" style="width:0%;"></div>
                    </div>
                </div>
            </div>

            <div id="scoreArea" style="display:none;margin-top:16px;">
                <div class="score-grid">
                    <div class="score-item"><div class="value" id="sContent">—</div><div class="desc">內容匹配</div></div>
                    <div class="score-item"><div class="value" id="sKeyword">—</div><div class="desc">關鍵詞覆蓋</div></div>
                    <div class="score-item"><div class="value" id="sConfidence">—</div><div class="desc">發音置信度</div></div>
                    <div class="score-item"><div class="value" id="sOverall">—</div><div class="desc">綜合評分</div></div>
                </div>
                <div class="advice-box">
                    <div class="label">💡 智能診斷</div>
                    <div class="content" id="adviceContent">評分完成後顯示分析。</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            // ---- DOM 引用 ----
            const tabs = document.querySelectorAll('.role-tab');
            const pTeacher = document.getElementById('panelTeacher');
            const pStudent = document.getElementById('panelStudent');
            const uploadArea = document.getElementById('uploadArea');
            const imageInput = document.getElementById('imageInput');
            const imagePreview = document.getElementById('imagePreview');
            const refAnswer = document.getElementById('refAnswer');
            const refKeywords = document.getElementById('refKeywords');
            const saveBtn = document.getElementById('saveConfigBtn');
            const saveStatus = document.getElementById('saveStatus');
            const studentImageBox = document.getElementById('studentImageBox');
            const refDisplay = document.getElementById('refDisplay');
            const startBtn = document.getElementById('startBtn');
            const stopBtn = document.getElementById('stopBtn');
            const statusBadge = document.getElementById('statusBadge');
            const recognizedText = document.getElementById('recognizedText');
            const confidenceFill = document.getElementById('confidenceFill');
            const confidenceLabel = document.getElementById('confidenceLabel');
            const scoreArea = document.getElementById('scoreArea');
            const sContent = document.getElementById('sContent');
            const sKeyword = document.getElementById('sKeyword');
            const sConfidence = document.getElementById('sConfidence');
            const sOverall = document.getElementById('sOverall');
            const adviceContent = document.getElementById('adviceContent');

            // ---- 状态 ----
            let config = {
                imageData: null,
                refAnswer: '',
                refKeywords: []
            };

            let isRecording = false;
            let recognition = null;
            let finalTranscript = '';
            let finalConfidence = 0;

            // ---- 本地存储 ----
            function loadFromStorage() {
                try {
                    const raw = localStorage.getItem('mandarin_teacher_config_v2');
                    if (raw) {
                        const c = JSON.parse(raw);
                        config = c;
                        if (c.imageData) {
                            imagePreview.src = c.imageData;
                            imagePreview.style.display = 'block';
                            studentImageBox.innerHTML = `<img src="${c.imageData}" alt="圖片" />`;
                        }
                        if (c.refAnswer) {
                            refAnswer.value = c.refAnswer;
                            refDisplay.textContent = c.refAnswer;
                        }
                        if (c.refKeywords && c.refKeywords.length) {
                            refKeywords.value = c.refKeywords.join(', ');
                        }
                    }
                } catch (e) {}
            }

            function saveToStorage() {
                const kw = refKeywords.value.trim().split(',').map(s => s.trim()).filter(Boolean);
                config.refAnswer = refAnswer.value.trim();
                config.refKeywords = kw;
                try {
                    localStorage.setItem('mandarin_teacher_config_v2', JSON.stringify(config));
                } catch (e) {}
                refDisplay.textContent = config.refAnswer || '教師尚未設定。';
                saveStatus.textContent = '✅ 已儲存';
                setTimeout(() => saveStatus.textContent = '', 1800);
            }

            // ---- 图片 ----
            uploadArea.addEventListener('click', () => imageInput.click());
            imageInput.addEventListener('change', (e) => {
                if (e.target.files[0]) {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        const data = ev.target.result;
                        config.imageData = data;
                        imagePreview.src = data;
                        imagePreview.style.display = 'block';
                        studentImageBox.innerHTML = `<img src="${data}" alt="圖片" />`;
                        saveToStorage();
                    };
                    reader.readAsDataURL(e.target.files[0]);
                }
            });

            // ---- 保存 ----
            saveBtn.addEventListener('click', saveToStorage);

            // ---- 切换角色 ----
            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    tabs.forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    if (tab.dataset.role === 'teacher') {
                        pTeacher.classList.add('active');
                        pStudent.classList.remove('active');
                    } else {
                        pTeacher.classList.remove('active');
                        pStudent.classList.add('active');
                        if (isRecording) stopRecording();
                    }
                });
            });

            // ---- 核心：语音识别 + 严苛置信度审查 ----
            function initRecognition() {
                const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SR) {
                    statusBadge.textContent = '❌ 不支援語音識別';
                    startBtn.disabled = true;
                    return null;
                }
                const rec = new SR();
                // 【关键】强制指定为大陆普通话（标准声学模型）
                rec.lang = 'zh-CN';
                rec.continuous = false;
                rec.interimResults = true;
                rec.maxAlternatives = 1;

                rec.onstart = () => {
                    isRecording = true;
                    startBtn.disabled = true;
                    stopBtn.disabled = false;
                    statusBadge.className = 'status-badge recording';
                    statusBadge.innerHTML = '<span class="dot"></span> 🔴 錄音中...';
                    finalTranscript = '';
                    finalConfidence = 0;
                    recognizedText.textContent = '🎤 聆聽中...';
                    recognizedText.className = 'text';
                    confidenceFill.style.width = '0%';
                    confidenceLabel.textContent = '--';
                    scoreArea.style.display = 'none';
                };

                rec.onerror = (e) => {
                    console.warn('识别错误:', e.error);
                    statusBadge.className = 'status-badge';
                    statusBadge.textContent = '❌ 錯誤: ' + e.error;
                    isRecording = false;
                    startBtn.disabled = false;
                    stopBtn.disabled = true;
                };

                rec.onresult = (event) => {
                    let interim = '';
                    let final = '';
                    let conf = 0;

                    for (let i = event.resultIndex; i < event.results.length; i++) {
                        const result = event.results[i];
                        const transcript = result[0].transcript;
                        // 【关键】获取置信度 (0~1)
                        const confidence = result[0].confidence || 0;

                        if (result.isFinal) {
                            final += transcript;
                            conf = confidence; // 取最后一段的置信度
                        } else {
                            interim += transcript;
                        }
                    }

                    const displayText = final || interim || '🎤 聆聽中...';
                    recognizedText.textContent = displayText;
                    recognizedText.className = 'text';

                    // 实时更新置信度条
                    if (final) {
                        finalTranscript = final;
                        finalConfidence = conf;
                        confidenceFill.style.width = (conf * 100) + '%';
                        confidenceLabel.textContent = (conf * 100).toFixed(1) + '%';
                        // 颜色警示
                        confidenceFill.className = 'fill';
                        if (conf < 0.5) confidenceFill.classList.add('danger');
                        else if (conf < 0.70) confidenceFill.classList.add('warning');
                    }
                };

                rec.onend = () => {
                    isRecording = false;
                    startBtn.disabled = false;
                    stopBtn.disabled = true;
                    statusBadge.className = 'status-badge';
                    statusBadge.innerHTML = '<span class="dot"></span> 已停止';

                    if (finalTranscript.trim()) {
                        recognizedText.textContent = finalTranscript;
                        recognizedText.className = 'text';
                        // 立即执行评分（包含置信度审查）
                        performStrictScoring(finalTranscript, finalConfidence);
                    } else {
                        recognizedText.textContent = '⚠️ 未識別到有效語音，請重試';
                        recognizedText.className = 'text empty';
                    }
                };

                return rec;
            }

            // ---- 严苛评分逻辑 ----
            function performStrictScoring(transcript, confidence) {
                const ref = config.refAnswer || '';
                const keywords = config.refKeywords || [];

                // 1. 内容匹配度 (编辑距离)
                let contentScore = 0;
                if (ref && transcript) {
                    const sim = 1 - (levenshteinDistance(transcript, ref) / Math.max(transcript.length, ref.length));
                    contentScore = Math.round(Math.max(0, sim) * 100);
                } else {
                    contentScore = ref ? 0 : 50;
                }

                // 2. 关键词覆盖
                let keywordScore = 0;
                if (keywords.length > 0 && transcript) {
                    let found = 0;
                    const lowT = transcript.toLowerCase();
                    for (const kw of keywords) {
                        if (lowT.includes(kw.toLowerCase())) found++;
                    }
                    keywordScore = Math.round((found / keywords.length) * 100);
                } else {
                    keywordScore = keywords.length === 0 ? 50 : 0;
                }

                // 3. 【核心】发音置信度得分 —— 直接使用 Confidence
                // 如果 confidence < 0.70，视为发音不标准（疑似粤语/方言）
                let confidenceScore = 0;
                if (confidence > 0) {
                    // 将 0~1 映射到 0~100，但设置硬门槛：低于0.7直接给极低分
                    if (confidence < 0.5) {
                        confidenceScore = Math.round(confidence * 30); // 最高 15分
                    } else if (confidence < 0.70) {
                        confidenceScore = Math.round(30 + (confidence - 0.5) * 150); // 30~60分
                    } else {
                        confidenceScore = Math.round(70 + (confidence - 0.7) * 100); // 70~100分
                    }
                    confidenceScore = Math.min(100, Math.max(0, confidenceScore));
                } else {
                    confidenceScore = 0;
                }

                // 4. 综合评分（加重发音权重）
                // 内容 30% + 关键词 20% + 发音置信度 50%
                const overall = Math.round(contentScore * 0.3 + keywordScore * 0.2 + confidenceScore * 0.5);

                // ---- 渲染评分 ----
                sContent.textContent = contentScore + '%';
                sContent.className = 'value ' + getClass(contentScore);
                sKeyword.textContent = keywordScore + '%';
                sKeyword.className = 'value ' + getClass(keywordScore);
                sConfidence.textContent = confidenceScore + '%';
                sConfidence.className = 'value ' + getClass(confidenceScore);
                sOverall.textContent = overall + '%';
                sOverall.className = 'value ' + getClass(overall);
                scoreArea.style.display = 'block';

                // ---- 生成智能建议 ----
                let advice = '';
                if (confidence < 0.70) {
                    advice = '🚨 <strong>發音警告：</strong>檢測到語音置信度僅 ' + (confidence * 100).toFixed(1) +
                        '%，遠低於標準普通話門檻（70%）。這通常表示帶有明顯的粵語口音或方言發音，請嚴格使用標準普通話朗讀。';
                } else if (confidence < 0.85) {
                    advice = '🔊 發音基本清晰，但仍有輕微口音影響。建議注意聲調（如一聲、四聲）和翹舌音（zh/ch/sh）。';
                } else {
                    advice = '✅ 發音標準清晰！普通話聲學特徵匹配良好。繼續保持。';
                }

                if (contentScore < 50 && ref) {
                    advice += ' 內容偏離參考答案較多，建議圍繞圖片中的要素（人物、地點、活動）組織語言。';
                } else if (keywordScore < 50 && keywords.length > 0) {
                    advice += ' 關鍵詞覆蓋不足，試著帶入「' + keywords.slice(0, 3).join('、') + '」等詞彙。';
                }

                adviceContent.innerHTML = advice;
            }

            function getClass(score) {
                if (score >= 70) return 'good';
                if (score >= 40) return 'ok';
                return 'poor';
            }

            function levenshteinDistance(a, b) {
                const matrix = [];
                for (let i = 0; i <= b.length; i++) matrix[i] = [i];
                for (let j = 0; j <= a.length; j++) matrix[0][j] = j;
                for (let i = 1; i <= b.length; i++) {
                    for (let j = 1; j <= a.length; j++) {
                        if (b[i - 1] === a[j - 1]) matrix[i][j] = matrix[i - 1][j - 1];
                        else matrix[i][j] = Math.min(matrix[i - 1][j - 1] + 1, matrix[i][j - 1] + 1, matrix[i - 1][j] + 1);
                    }
                }
                return matrix[b.length][a.length];
            }

            // ---- 录音控制 ----
            function startRecording() {
                if (!recognition) {
                    recognition = initRecognition();
                    if (!recognition) return;
                }
                try { recognition.start(); } catch (e) {
                    if (e.name === 'InvalidStateError') {
                        recognition.stop();
                        setTimeout(() => { try { recognition.start(); } catch (e2) {} }, 200);
                    }
                }
            }

            function stopRecording() {
                if (recognition && isRecording) {
                    try { recognition.stop(); } catch (e) {}
                }
                isRecording = false;
                startBtn.disabled = false;
                stopBtn.disabled = true;
                statusBadge.className = 'status-badge';
                statusBadge.innerHTML = '<span class="dot"></span> 已停止';
            }

            startBtn.addEventListener('click', startRecording);
            stopBtn.addEventListener('click', stopRecording);

            // ---- 初始化 ----
            loadFromStorage();
            recognition = initRecognition();

            console.log('✅ 嚴苛版語音評測已啟動 (置信度門檻: 0.70)');
            console.log('📌 提示：若用粵語朗讀，置信度將暴跌，系統會自動判定為發音不標準。');
        })();
    </script>
</body>
