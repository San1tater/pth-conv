<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>普通話語音評測系統 · 完整版</title>
    <!-- 引入 OpenCC 用於簡繁轉換 -->
    <script src="https://cdn.jsdelivr.net/npm/opencc-js@1.0.5/dist/opencc.min.js"></script>
    <style>
        /* ===== 全域樣式 ===== */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', 'PingFang HK', 'Microsoft YaHei', sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 20px;
            color: #1e2a3a;
        }
        #app {
            width: 100%;
            max-width: 1200px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        /* 頂部列 */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            padding-bottom: 12px;
            border-bottom: 2px solid #dce1e8;
        }
        .top-bar h1 {
            font-size: 28px;
            font-weight: 700;
            color: #0b1e2e;
        }
        .top-bar .lang-switch {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .top-bar .lang-switch button {
            padding: 6px 16px;
            border: 1px solid #cbd5e1;
            background: #fff;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: 0.2s;
        }
        .top-bar .lang-switch button.active {
            background: #3b82f6;
            color: #fff;
            border-color: #3b82f6;
        }
        .top-bar .lang-switch button:hover:not(.active) {
            background: #eef2f6;
        }
        /* 視圖切換 (教師/學生) */
        .view-tabs {
            display: flex;
            gap: 4px;
            background: #e9edf2;
            border-radius: 30px;
            padding: 4px;
            width: fit-content;
        }
        .view-tabs button {
            padding: 8px 24px;
            border: none;
            border-radius: 30px;
            background: transparent;
            font-size: 16px;
            font-weight: 600;
            color: #4b5a6a;
            cursor: pointer;
            transition: 0.2s;
        }
        .view-tabs button.active {
            background: #fff;
            color: #0b1e2e;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        /* 主內容區 */
        .main-content {
            flex: 1;
            background: #fff;
            border-radius: 20px;
            padding: 24px 28px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.04);
            min-height: 500px;
        }
        /* 通用表單 */
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 4px;
            font-size: 14px;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #dce1e8;
            border-radius: 10px;
            font-size: 15px;
            font-family: inherit;
            background: #fafcff;
            transition: 0.2s;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
        }
        .form-group textarea {
            resize: vertical;
            min-height: 60px;
        }
        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 30px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-primary { background: #3b82f6; color: #fff; }
        .btn-primary:hover { background: #2563eb; }
        .btn-success { background: #22c55e; color: #fff; }
        .btn-success:hover { background: #16a34a; }
        .btn-danger { background: #ef4444; color: #fff; }
        .btn-danger:hover { background: #dc2626; }
        .btn-outline { background: transparent; border: 1.5px solid #cbd5e1; }
        .btn-outline:hover { background: #f1f5f9; }
        .btn-sm { padding: 6px 14px; font-size: 13px; }
        /* 教師管理 */
        .teacher-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }
        @media (max-width: 800px) {
            .teacher-grid { grid-template-columns: 1fr; }
        }
        .question-list {
            border-right: 1px solid #e9edf2;
            padding-right: 24px;
        }
        .question-list .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            border-bottom: 1px solid #f0f2f5;
            cursor: pointer;
            transition: 0.1s;
        }
        .question-list .list-item:hover { background: #f8fafc; }
        .question-list .list-item.selected { background: #eef4ff; border-left: 4px solid #3b82f6; }
        .question-list .list-item .info { flex: 1; }
        .question-list .list-item .info .title { font-weight: 600; }
        .question-list .list-item .info .meta { font-size: 13px; color: #6b7a8a; }
        .question-list .list-item .actions { display: flex; gap: 6px; }
        .editor-panel { padding-left: 8px; }
        .editor-panel .field-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .editor-panel .field-row > * { flex: 1; min-width: 150px; }
        .sub-question {
            background: #f8fafc;
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 10px;
            border: 1px solid #e9edf2;
        }
        .sub-question .row { display: flex; gap: 10px; flex-wrap: wrap; }
        .sub-question .row > * { flex: 1; min-width: 120px; }
        /* 學生選擇 */
        .student-selector {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 20px;
            align-items: flex-end;
        }
        .student-selector .form-group { margin-bottom: 0; flex: 1; min-width: 150px; }
        .question-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
        }
        .question-card {
            background: #f8fafc;
            border-radius: 16px;
            padding: 16px;
            border: 1px solid #e9edf2;
            cursor: pointer;
            transition: 0.2s;
        }
        .question-card:hover { background: #eef4ff; border-color: #3b82f6; }
        .question-card .qtitle { font-weight: 600; font-size: 16px; }
        .question-card .qmeta { font-size: 13px; color: #6b7a8a; }
        /* 學生答題 */
        .answer-area {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .answer-area .question-image {
            max-width: 100%;
            max-height: 300px;
            border-radius: 12px;
            object-fit: contain;
            background: #f0f2f5;
        }
        .answer-area .question-text {
            font-size: 18px;
            font-weight: 600;
        }
        .answer-area .sub-questions {
            background: #f8fafc;
            border-radius: 12px;
            padding: 16px;
            border: 1px solid #e9edf2;
        }
        .answer-area .sub-questions .sq-item {
            padding: 8px 0;
            border-bottom: 1px solid #e9edf2;
        }
        .answer-area .sub-questions .sq-item:last-child { border-bottom: none; }
        .answer-area .keywords {
            background: #f0f7ff;
            padding: 12px 16px;
            border-radius: 10px;
            border-left: 4px solid #3b82f6;
            font-size: 15px;
        }
        .answer-area .keywords strong { color: #0b1e2e; }
        .answer-area .transcript-box {
            background: #fff;
            border: 1px solid #dce1e8;
            border-radius: 12px;
            padding: 14px 18px;
            min-height: 80px;
            font-size: 17px;
            line-height: 1.7;
        }
        .answer-area .record-controls {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }
        .answer-area .record-controls .status-dot {
            display: inline-block;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #94a3b8;
            transition: 0.2s;
        }
        .answer-area .record-controls .status-dot.recording {
            background: #ef4444;
            animation: pulse 1s infinite;
        }
        @keyframes pulse { 0%,100% { transform:scale(1); } 50% { transform:scale(1.25); } }
        .answer-area .record-controls .timer {
            font-size: 18px;
            font-weight: 600;
            color: #0b1e2e;
            min-width: 60px;
        }
        /* 評分結果 */
        .result-box {
            background: #f8fafc;
            border-radius: 16px;
            padding: 20px 24px;
            border: 1px solid #e2e8f0;
            margin-top: 16px;
        }
        .result-box .score-row {
            display: flex;
            flex-wrap: wrap;
            gap: 18px 32px;
            margin-bottom: 8px;
        }
        .result-box .score-item { display: flex; align-items: baseline; gap: 6px; }
        .result-box .score-item .num { font-size: 28px; font-weight: 700; }
        .result-box .score-item .num.good { color: #22c55e; }
        .result-box .score-item .num.mid { color: #eab308; }
        .result-box .score-item .num.poor { color: #ef4444; }
        .result-box .suggestion { margin-top: 12px; padding-top: 12px; border-top: 1px solid #e2e8f0; }
        /* 響應式 */
        @media (max-width: 600px) {
            body { padding: 10px; }
            .main-content { padding: 16px; }
            .top-bar h1 { font-size: 22px; }
            .view-tabs button { padding: 6px 16px; font-size: 14px; }
            .teacher-grid { grid-template-columns: 1fr; }
            .question-list { border-right: none; padding-right: 0; }
            .editor-panel { padding-left: 0; }
        }
        .hidden { display: none !important; }
        /* 簡單提示 */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e2a3a;
            color: #fff;
            padding: 12px 28px;
            border-radius: 40px;
            font-size: 15px;
            font-weight: 500;
            box-shadow: 0 8px 30px rgba(0,0,0,0.2);
            z-index: 999;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .toast.show { opacity: 1; }
        /* 狀態欄（簡化） */
        .status-bar {
            padding: 8px 12px;
            background: #f0f2f5;
            border-radius: 10px;
            font-size: 14px;
            color: #4b5a6a;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .status-bar .label { font-weight: 600; }
    </style>
</head>
<body>
<div id="app">
    <!-- 頂部 -->
    <div class="top-bar">
        <h1>🎙️ 普通話語音評測</h1>
        <div style="display:flex; gap:12px; align-items:center; flex-wrap:wrap;">
            <div class="view-tabs">
                <button class="active" data-view="teacher">👩‍🏫 教師</button>
                <button data-view="student">🧑‍🎓 學生</button>
            </div>
            <div class="lang-switch">
                <button class="active" data-lang="zh">繁體</button>
                <button data-lang="en">English</button>
            </div>
        </div>
    </div>

    <!-- 主內容 -->
    <div class="main-content" id="mainContent">
        <!-- 動態渲染由 JavaScript 處理 -->
    </div>

    <!-- Toast 訊息 -->
    <div id="toast" class="toast"></div>
</div>

<script>
    (function() {
        'use strict';

        // ================================================================
        // 1. 全域配置
        // ================================================================
        const CONFIG = {
            IAT_APPID: 'b35875f2',
            IAT_API_KEY: '2cba10591dc68d093065c60d0c8b98ab',
            IAT_API_SECRET: 'ZDg0NzJhZjgyNjE0N2I0OTEzMDMxZmMy',
            IAT_WS_URL: 'wss://iat-api.xfyun.cn/v2/iat',
            SPARK_APPID: 'b35875f2',
            SPARK_API_KEY: '2cba10591dc68d093065c60d0c8b98ab',
            SPARK_API_SECRET: 'ZDg0NzJhZjgyNjE0N2I0OTEzMDMxZmMy',
            SPARK_WS_URL: 'wss://spark-api.xf-yun.com/v4.0/chat',
            SPARK_DOMAIN: '4.0Ultra',
        };

        // ================================================================
        // 2. 語言資源
        // ================================================================
        const LANG = {
            zh: {
                appTitle: '普通話語音評測',
                teacher: '教師',
                student: '學生',
                grade: '年級',
                semester: '學期',
                questionList: '題目列表',
                newQuestion: '新增題目',
                editQuestion: '編輯題目',
                delete: '刪除',
                save: '儲存',
                cancel: '取消',
                title: '標題',
                type: '題型',
                open: '開放式 (看圖說故事)',
                fixed: '半固定式 (看圖答問題)',
                referenceAnswer: '整體參考答案',
                keywords: '關鍵字 (用逗號分隔)',
                image: '圖片',
                uploadImage: '上傳圖片',
                subQuestions: '子問題',
                addSubQuestion: '新增子問題',
                subQuestion: '子問題',
                question: '問題',
                answer: '參考答案',
                keyword: '關鍵字 (逗號分隔)',
                selectGradeSemester: '請選擇年級與學期',
                noQuestions: '目前暫無題目',
                startRecording: '開始錄音',
                stopRecording: '停止錄音',
                recording: '錄音中...',
                recognizing: '語音識別中...',
                scoring: '評分中...',
                done: '完成',
                score: '評分結果',
                accuracy: '內容相關性',
                fluency: '豐富度',
                integrity: '語音準確度',
                suggestion: '建議',
                source: '評分來源',
                back: '返回',
                chooseQuestion: '選擇題目作答',
                answerHere: '請看圖說話/回答問題',
                keywordsHint: '提示關鍵字',
                transcriptResult: '語音識別結果',
                pleaseSelect: '請選擇',
            },
            en: {
                appTitle: 'Mandarin Speech Assessment',
                teacher: 'Teacher',
                student: 'Student',
                grade: 'Grade',
                semester: 'Semester',
                questionList: 'Question List',
                newQuestion: 'New Question',
                editQuestion: 'Edit Question',
                delete: 'Delete',
                save: 'Save',
                cancel: 'Cancel',
                title: 'Title',
                type: 'Type',
                open: 'Open (Story Telling)',
                fixed: 'Fixed (Q&A)',
                referenceAnswer: 'Reference Answer (Overall)',
                keywords: 'Keywords (comma separated)',
                image: 'Image',
                uploadImage: 'Upload Image',
                subQuestions: 'Sub-questions',
                addSubQuestion: 'Add Sub-question',
                subQuestion: 'Sub-question',
                question: 'Question',
                answer: 'Reference Answer',
                keyword: 'Keywords (comma)',
                selectGradeSemester: 'Please select grade and semester',
                noQuestions: 'No questions available',
                startRecording: 'Start Recording',
                stopRecording: 'Stop Recording',
                recording: 'Recording...',
                recognizing: 'Recognizing...',
                scoring: 'Scoring...',
                done: 'Done',
                score: 'Score Result',
                accuracy: 'Content Relevance',
                fluency: 'Richness',
                integrity: 'Pronunciation Accuracy',
                suggestion: 'Suggestion',
                source: 'Scoring Source',
                back: 'Back',
                chooseQuestion: 'Choose a question',
                answerHere: 'Look at the picture and speak/answer',
                keywordsHint: 'Keywords hint',
                transcriptResult: 'Speech Recognition Result',
                pleaseSelect: 'Please select',
            }
        };

        let currentLang = 'zh';
        function t(key) { return LANG[currentLang][key] || key; }

        // ================================================================
        // 3. 數據管理
        // ================================================================
        let questions = [];
        let currentView = 'teacher';
        let selectedGrade = '';
        let selectedSemester = '';
        let selectedQuestionId = null;
        let editingQuestionId = null;
        let studentSelectedQuestionId = null;
        let studentAnswerText = '';

        // 載入數據
        function loadData() {
            try {
                const raw = localStorage.getItem('speech_questions');
                if (raw) questions = JSON.parse(raw);
                else questions = [];
            } catch(e) { questions = []; }
        }
        function saveData() {
            localStorage.setItem('speech_questions', JSON.stringify(questions));
        }

        // 生成 ID
        function genId() { return Date.now().toString(36) + Math.random().toString(36).substr(2,5); }

        // ================================================================
        // 4. 簡繁轉換 (使用 OpenCC)
        // ================================================================
        let converter = null;
        function initOpenCC() {
            if (typeof OpenCC !== 'undefined') {
                converter = OpenCC.Converter({ from: 'cn', to: 'hk' });
            }
        }
        function toTraditional(text) {
            if (!text) return text;
            if (converter) return converter(text);
            // fallback: 簡單映射
            return text;
        }

        // ================================================================
        // 5. UI 渲染
        // ================================================================
        const mainEl = document.getElementById('mainContent');
        const toastEl = document.getElementById('toast');
        let toastTimer = null;
        function showToast(msg) {
            toastEl.textContent = msg;
            toastEl.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => toastEl.classList.remove('show'), 3000);
        }

        // 語言切換
        document.querySelectorAll('[data-lang]').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('[data-lang]').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentLang = this.dataset.lang;
                render();
            });
        });

        // 視圖切換
        document.querySelectorAll('[data-view]').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('[data-view]').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentView = this.dataset.view;
                render();
            });
        });

        function render() {
            loadData();
            if (currentView === 'teacher') renderTeacher();
            else renderStudent();
        }

        // ================================================================
        // 6. 教師視圖
        // ================================================================
        function renderTeacher() {
            const grades = [...new Set(questions.map(q => q.grade))].sort();
            const semesters = [...new Set(questions.map(q => q.semester))].sort();

            let html = `
                <div class="teacher-grid">
                    <div class="question-list">
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
                            <h3>${t('questionList')}</h3>
                            <button class="btn btn-primary btn-sm" onclick="startNewQuestion()">+ ${t('newQuestion')}</button>
                        </div>
                        <div style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px;">
                            <select id="filterGrade" onchange="applyFilter()" style="padding:6px 10px; border-radius:8px; border:1px solid #dce1e8;">
                                <option value="">${t('grade')}</option>
                                ${grades.map(g => `<option value="${g}">${g}</option>`).join('')}
                            </select>
                            <select id="filterSemester" onchange="applyFilter()" style="padding:6px 10px; border-radius:8px; border:1px solid #dce1e8;">
                                <option value="">${t('semester')}</option>
                                ${semesters.map(s => `<option value="${s}">${s}</option>`).join('')}
                            </select>
                        </div>
                        <div id="questionListContainer">
                            ${renderQuestionList()}
                        </div>
                    </div>
                    <div class="editor-panel">
                        ${renderEditor()}
                    </div>
                </div>
            `;
            mainEl.innerHTML = html;
        }

        function renderQuestionList() {
            const gradeFilter = document.getElementById('filterGrade')?.value || '';
            const semFilter = document.getElementById('filterSemester')?.value || '';
            let filtered = questions;
            if (gradeFilter) filtered = filtered.filter(q => q.grade === gradeFilter);
            if (semFilter) filtered = filtered.filter(q => q.semester === semFilter);

            if (filtered.length === 0) {
                return `<div style="padding:20px; text-align:center; color:#8a9aa8;">${t('noQuestions')}</div>`;
            }
            let html = '';
            filtered.forEach(q => {
                const sel = (editingQuestionId === q.id) ? 'selected' : '';
                html += `
                    <div class="list-item ${sel}" onclick="selectQuestion('${q.id}')">
                        <div class="info">
                            <div class="title">${toTraditional(q.title)}</div>
                            <div class="meta">${q.grade} · ${q.semester} · ${q.type === 'open' ? t('open') : t('fixed')}</div>
                        </div>
                        <div class="actions">
                            <button class="btn btn-outline btn-sm" onclick="event.stopPropagation(); editQuestion('${q.id}')">✎</button>
                            <button class="btn btn-danger btn-sm" onclick="event.stopPropagation(); deleteQuestion('${q.id}')">×</button>
                        </div>
                    </div>
                `;
            });
            return html;
        }

        function renderEditor() {
            const q = questions.find(q => q.id === editingQuestionId);
            if (!q) {
                // 若無編輯，顯示提示
                return `<div style="padding:30px; text-align:center; color:#8a9aa8;">${t('selectGradeSemester')}</div>`;
            }
            const isOpen = q.type === 'open';
            let html = `
                <h3>${editingQuestionId ? t('editQuestion') : t('newQuestion')}</h3>
                <div class="form-group">
                    <label>${t('grade')}</label>
                    <select id="editGrade">
                        <option value="一年級" ${q.grade==='一年級'?'selected':''}>一年級</option>
                        <option value="二年級" ${q.grade==='二年級'?'selected':''}>二年級</option>
                        <option value="三年級" ${q.grade==='三年級'?'selected':''}>三年級</option>
                        <option value="四年級" ${q.grade==='四年級'?'selected':''}>四年級</option>
                        <option value="五年級" ${q.grade==='五年級'?'selected':''}>五年級</option>
                        <option value="六年級" ${q.grade==='六年級'?'selected':''}>六年級</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>${t('semester')}</label>
                    <select id="editSemester">
                        <option value="上學期" ${q.semester==='上學期'?'selected':''}>上學期</option>

                type: 'open',
                refAnswer: '',

            questions.push(newQ);
            editingQuestionId = newQ.id;

            render();

            render();

            editingQuestionId = id;
            render();
        };

        window.deleteQuestion = function(id) {
            if (!confirm('確定刪除該題目？')) return;
            questions = questions.filter(q => q.id !== id);
            if (editingQuestionId === id) editingQuestionId = null;
            saveData();
            render();
        };

            render();
        };

        window.toggleQuestionType = function() {
            const type = document.getElementById('editType').value;
            const q = questions.find(q => q.id === editingQuestionId);
            if (q) {
                q.type = type;
                if (type === 'open') q.subQuestions = [];
                saveData();
                render();
            }
        };

        window.handleImageUpload = function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(ev) {
                document.getElementById('editImageData').value = ev.target.result;
                // 顯示縮圖
                const div = document.getElementById('editImage').parentElement;
                let img = div.querySelector('img');
                if (!img) {
                    img = document.createElement('img');
                    img.style.maxHeight = '100px';
                    img.style.borderRadius = '8px';
                    img.style.marginTop = '6px';
                    div.appendChild(img);
                }
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        };

        window.addSubQuestion = function() {
            const q = questions.find(q => q.id === editingQuestionId);
            if (!q) return;
            if (!q.subQuestions) q.subQuestions = [];
            q.subQuestions.push({ question: '', answer: '', keywords: [] });
            saveData();
            render();
        };

        window.removeSubQuestion = function(btn) {
            const div = btn.closest('.sub-question');
            const idx = Array.from(div.parentElement.children).indexOf(div);
            const q = questions.find(q => q.id === editingQuestionId);
            if (q && q.subQuestions) {
                q.subQuestions.splice(idx, 1);
                saveData();
                render();
            }
        };

        window.saveQuestion = function() {
            const q = questions.find(q => q.id === editingQuestionId);
            if (!q) return;
            q.grade = document.getElementById('editGrade').value;
            q.semester = document.getElementById('editSemester').value;
            q.title = document.getElementById('editTitle').value;
            q.type = document.getElementById('editType').value;
            q.refAnswer = document.getElementById('editRefAnswer').value;
            q.keywords = document.getElementById('editKeywords').value.split(',').map(s => s.trim()).filter(s => s);
            q.image = document.getElementById('editImageData').value;

            if (q.type === 'fixed') {
                const sqDivs = document.querySelectorAll('.sub-question');
                q.subQuestions = [];
                sqDivs.forEach(div => {
                    const qInput = div.querySelector('.sq-question');
                    const aInput = div.querySelector('.sq-answer');
                    const kInput = div.querySelector('.sq-keywords');
                    if (qInput && aInput) {
                        q.subQuestions.push({
                            question: qInput.value,
                            answer: aInput.value,
                            keywords: kInput ? kInput.value.split(',').map(s => s.trim()).filter(s => s) : []
                        });
                    }
                });
            } else {
                q.subQuestions = [];
            }
            saveData();
            showToast('✅ 題目已儲存');
            render();
        };

        // ================================================================
        // 10. 錄音與評分邏輯（與之前類似，但整合到學生答題）
        // ================================================================
        let mediaStream = null, audioContext = null, scriptProcessor = null;
        let isRecording = false, recordTimer = null, seconds = 0;
        let audioBuffer = [];
        const SAMPLE_RATE = 16000;
        let iatWs = null, isRecognizing = false, finalTranscript = '';
        let iatReceivedMessage = false, iatTimeoutId = null, iatChunkCount = 0;
        let isIatEndSent = false, waitForIatResult = false;
        let cryptoReady = false;
        let sparkWs = null, isScoring = false, sparkResult = '';
        let sparkTimeoutId = null;

        function bindRecordingControls(q) {
            const startBtn = document.getElementById('startRecordBtn');
            const stopBtn = document.getElementById('stopRecordBtn');
            const dot = document.getElementById('recordDot');
            const timer = document.getElementById('recordTimer');
            const statusText = document.getElementById('statusText');
            const transcript = document.getElementById('studentTranscript');

            // 加載 CryptoJS
            if (!cryptoReady) {
                loadCryptoJs(() => {
                    // 重試
                });
            }

            startBtn.onclick = function() {
                if (isRecording) return;
                startRecording(q);
            };
            stopBtn.onclick = function() {
                if (!isRecording) return;
                stopRecording();
            };

            function startRecording(q) {
                log('開始錄音...');
                audioBuffer = [];
                finalTranscript = '';
                isIatEndSent = false;
                waitForIatResult = false;
                iatReceivedMessage = false;
                iatChunkCount = 0;
                document.getElementById('scoreResult').classList.add('hidden');

                initAudio((err) => {
                    if (err) {
                        showToast('❌ 麥克風錯誤：'+err.message);
                        return;
                    }
                    isRecording = true;
                    dot.className = 'status-dot recording';
                    startBtn.disabled = true;
                    stopBtn.disabled = false;
                    seconds = 0;
                    timer.textContent = '00:00';
                    if (recordTimer) clearInterval(recordTimer);
                    recordTimer = setInterval(() => {
                        seconds++;
                        timer.textContent = String(Math.floor(seconds/60)).padStart(2,'0')+':'+String(seconds%60).padStart(2,'0');
                    }, 1000);
                    statusText.textContent = '🔴 '+t('recording');
                    startIatRecognition(q);
                });
            }

            function stopRecording() {
                isRecording = false;
                dot.className = 'status-dot';
                startBtn.disabled = false;
                stopBtn.disabled = true;
                if (recordTimer) { clearInterval(recordTimer); recordTimer = null; }
                statusText.textContent = '⏹️ '+t('stopRecording');
                // 釋放音頻資源
                if (mediaStream) { mediaStream.getTracks().forEach(t=>t.stop()); mediaStream=null; }
                if (audioContext) { audioContext.close(); audioContext=null; }
                if (scriptProcessor) { scriptProcessor.disconnect(); scriptProcessor=null; }
                if (!iatReceivedMessage) {
                    showToast('⚠️ 未收到語音服務回應');
                }
                log('錄音停止');
            }

            function initAudio(callback) {
                navigator.mediaDevices.getUserMedia({
                    audio: { sampleRate: SAMPLE_RATE, channelCount: 1, echoCancellation: false, noiseSuppression: false, autoGainControl: false }
                }).then(stream => {
                    mediaStream = stream;
                    audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: SAMPLE_RATE });
                    const source = audioContext.createMediaStreamSource(stream);
                    scriptProcessor = audioContext.createScriptProcessor(4096, 1, 1);
                    scriptProcessor.onaudioprocess = (event) => {
                        if (!isRecording) return;
                        const inputData = event.inputBuffer.getChannelData(0);
                        const pcm = new Int16Array(inputData.length);
                        for (let i=0; i<inputData.length; i++) {
                            const s = Math.max(-1, Math.min(1, inputData[i]));
                            pcm[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
                        }
                        audioBuffer.push(pcm);
                    };
                    source.connect(scriptProcessor);
                    scriptProcessor.connect(audioContext.destination);
                    callback(null);
                }).catch(err => callback(err));
            }

            function startIatRecognition(q) {
                if (isRecognizing) return;
                if (!cryptoReady) {
                    loadCryptoJs(() => { startIatRecognition(q); });
                    return;
                }
                try {
                    const urlObj = new URL(CONFIG.IAT_WS_URL);
                    const wsUrl = buildWsUrl(urlObj.host, urlObj.pathname, CONFIG.IAT_API_KEY, CONFIG.IAT_API_SECRET);
                    iatWs = new WebSocket(wsUrl);
                    isRecognizing = true;
                    iatReceivedMessage = false;
                    iatChunkCount = 0;
                    finalTranscript = '';
                    isIatEndSent = false;
                    waitForIatResult = false;

                    if (iatTimeoutId) clearTimeout(iatTimeoutId);
                    iatTimeoutId = setTimeout(() => {
                        if (!iatReceivedMessage && iatWs && iatWs.readyState === WebSocket.OPEN) {
                            showToast('⚠️ 語音服務無回應');
                            if (iatWs) iatWs.close();
                            stopRecording();
                        }
                        isRecognizing = false;
                    }, 20000);

                    iatWs.onopen = () => {
                        sendIatHandshake();
                        sendIatAudioData();
                    };
                    iatWs.onmessage = (event) => {
                        iatReceivedMessage = true;
                        if (iatTimeoutId) { clearTimeout(iatTimeoutId); iatTimeoutId = null; }
                        try {
                            const data = JSON.parse(event.data);
                            handleIatMessage(data, q);
                        } catch(e) { console.error(e); }
                    };
                    iatWs.onerror = (err) => {
                        showToast('❌ 語音錯誤');
                        stopRecording();
                        isRecognizing = false;
                    };
                    iatWs.onclose = (e) => {
                        if (!iatReceivedMessage) showToast('⚠️ 語音連線失敗');
                        if (isRecording) stopRecording();
                        isRecognizing = false;
                    };
                } catch(e) {
                    showToast('❌ 語音初始化失敗');
                    stopRecording();
                }
            }

            function sendIatHandshake() {
                const handshake = {
                    common: { app_id: CONFIG.IAT_APPID },
                    business: { language: 'zh_cn', domain: 'iat', accent: 'mandarin' },
                    data: { status: 0, format: 'audio/L16;rate=16000', encoding: 'raw', audio: '' }
                };
                iatWs.send(JSON.stringify(handshake));
            }

            function sendIatAudioData() {
                const sendChunk = () => {
                    if (isIatEndSent || iatWs.readyState !== WebSocket.OPEN) return;
                    if (!isRecording) {
                        isIatEndSent = true;
                        iatWs.send(JSON.stringify({ data: { status: 2, format: 'audio/L16;rate=16000', encoding: 'raw', audio: '' } }));
                        waitForIatResult = true;
                        setTimeout(() => {
                            if (waitForIatResult && !finalTranscript) {
                                showToast('⚠️ 語音識別超時');
                                if (iatWs && iatWs.readyState === WebSocket.OPEN) iatWs.close();
                            }
                        }, 10000);
                        return;
                    }
                    if (audioBuffer.length > 0) {
                        const totalLength = audioBuffer.reduce((sum, arr) => sum + arr.length, 0);
                        const merged = new Int16Array(totalLength);
                        let offset = 0;
                        for (const arr of audioBuffer) {
                            merged.set(arr, offset);
                            offset += arr.length;
                        }
                        audioBuffer = [];
                        const bytes = new Uint8Array(merged.buffer);
                        let binary = '';
                        for (let i=0; i<bytes.length; i++) binary += String.fromCharCode(bytes[i]);
                        const base64 = btoa(binary);
                        iatWs.send(JSON.stringify({
                            data: { status: 1, format: 'audio/L16;rate=16000', encoding: 'raw', audio: base64 }
                        }));
                        iatChunkCount++;
                    }
                    setTimeout(sendChunk, 100);
                };
                sendChunk();
            }

            function handleIatMessage(data, q) {
                if (data.code && data.code !== 0) {
                    showToast('❌ 語音錯誤 '+data.code);
                    stopRecording();
                    isRecognizing = false;
                    return;
                }
                if (data.data && data.data.result) {
                    const result = data.data.result;
                    if (result.ws) {
                        let text = '';
                        for (const w of result.ws) {
                            for (const cw of w.cw) text += cw.w;
                        }
                        if (text) {
                            finalTranscript += text;
                            // 顯示繁體
                            transcript.innerHTML = toTraditional(finalTranscript);
                        }
                    }
                }
                if (data.data && data.data.status === 2) {
                    waitForIatResult = false;
                    if (iatWs && iatWs.readyState === WebSocket.OPEN) iatWs.close();
                    if (finalTranscript.trim()) {
                        studentAnswerText = finalTranscript;
                        // 開始評分
                        callSparkForScore(q, finalTranscript);
                    } else {
                        showToast('⚠️ 未識別到語音');
                    }
                    stopRecording();
                    isRecognizing = false;
                }
            }

            // 評分函數
            function callSparkForScore(q, answer) {
                if (isScoring) return;
                isScoring = true;
                statusText.textContent = '🤖 '+t('scoring');
                if (!cryptoReady) {
                    loadCryptoJs(() => { callSparkForScore(q, answer); });
                    return;
                }
                try {
                    const urlObj = new URL(CONFIG.SPARK_WS_URL);
                    const wsUrl = buildWsUrl(urlObj.host, urlObj.pathname, CONFIG.SPARK_API_KEY, CONFIG.SPARK_API_SECRET);
                    sparkWs = new WebSocket(wsUrl);
                    sparkResult = '';
                    if (sparkTimeoutId) clearTimeout(sparkTimeoutId);
                    sparkTimeoutId = setTimeout(() => {
                        if (sparkWs && sparkWs.readyState === WebSocket.OPEN) {
                            showToast('⚠️ 評分超時');
                            sparkWs.close();
                        }
                        isScoring = false;
                    }, 30000);

                    sparkWs.onopen = () => {
                        sendSparkRequest(q, answer);
                    };
                    sparkWs.onmessage = (event) => {
                        try {
                            const data = JSON.parse(event.data);
                            handleSparkMessage(data);
                        } catch(e) {}
                    };
                    sparkWs.onerror = (err) => {
                        showToast('❌ 評分錯誤');
                        isScoring = false;
                    };
                    sparkWs.onclose = (e) => {
                        if (!sparkResult) showToast('⚠️ 評分無回應');
                        isScoring = false;
                    };
                } catch(e) {
                    showToast('❌ 評分初始化失敗');
                    isScoring = false;
                }
            }

            function sendSparkRequest(q, answer) {
                // 構建提示詞
                let prompt = `你是一位專業的普通話語言教師，請用鼓勵性、引導性的語氣對學生的回答進行評分。避免直接批評，多給予肯定和具體的改進建議。

【題目類型】${q.type === 'open' ? '開放式看圖說故事' : '半固定式看圖答問題'}
【主題描述】${q.refAnswer || ''}
【關鍵字】${(q.keywords || []).join('、')}
`;

                if (q.type === 'fixed') {
                    prompt += '\n【子問題與參考答案】\n';
                    (q.subQuestions || []).forEach((sq, idx) => {
                        prompt += `${idx+1}. 問題：${sq.question}\n   參考答案：${sq.answer || ''}\n   關鍵字：${(sq.keywords||[]).join('、')}\n`;
                    });
                }

                prompt += `\n【學生的回答】\n${answer}\n\n請從以下三個維度評分（每項0-100）：
1. 內容相關性 (accuracy)：回答是否準確。
2. 豐富度 (fluency)：詞彙和細節是否豐富。
3. 語音準確度 (integrity)：是否有因發音近似導致的錯字。

請以JSON格式回覆，包含 accuracy, fluency, integrity, total_score (平均分), suggestion (具體建議，用繁體中文，50-100字，語氣鼓勵)。只輸出JSON。`;

                const request = {
                    header: { app_id: CONFIG.SPARK_APPID, uid: 'student' },
                    parameter: { chat: { domain: CONFIG.SPARK_DOMAIN, temperature: 0.3, max_tokens: 1024, top_k: 5 } },
                    payload: {
                        message: {
                            text: [
                                { role: 'system', content: '你是一位專業的普通話教師，擅長鼓勵學生。' },
                                { role: 'user', content: prompt }
                            ]
                        }
                    }
                };
                sparkWs.send(JSON.stringify(request));
            }

            function handleSparkMessage(data) {
                if (data.header && data.header.code !== 0) {
                    showToast('❌ 星火錯誤 '+data.header.code);
                    isScoring = false;
                    if (sparkWs) sparkWs.close();
                    return;
                }
                if (data.payload && data.payload.choices && data.payload.choices.text) {
                    for (const text of data.payload.choices.text) {
                        if (text.content) sparkResult += text.content;
                    }
                }
                if (data.header && data.header.status === 2) {
                    if (sparkTimeoutId) clearTimeout(sparkTimeoutId);
                    if (sparkWs) sparkWs.close();
                    try {
                        let jsonStr = sparkResult.trim();
                        jsonStr = jsonStr.replace(/^```json\s*/, '').replace(/\s*```$/, '');
                        const match = jsonStr.match(/\{[\s\S]*\}/);
                        if (match) jsonStr = match[0];
                        const grade = JSON.parse(jsonStr);
                        displayScore(grade);
                    } catch(e) {
                        showToast('⚠️ 評分解析失敗');
                        console.error(sparkResult);
                    }
                    isScoring = false;
                }
            }

            function displayScore(grade) {
                const resultDiv = document.getElementById('scoreResult');
                resultDiv.classList.remove('hidden');
                document.getElementById('totalScore').textContent = Math.round(grade.total_score || 0);
                document.getElementById('accScore').textContent = Math.round(grade.accuracy || 0);
                document.getElementById('fluencyScore').textContent = Math.round(grade.fluency || 0);
                document.getElementById('integrityScore').textContent = Math.round(grade.integrity || 0);
                document.getElementById('suggestionText').innerHTML = `<strong>💡 ${t('suggestion')}：</strong>${toTraditional(grade.suggestion || '')}`;
                document.getElementById('scoreSource').textContent = t('source')+'：訊飛星火 4.0Ultra';
                // 顏色
                document.querySelectorAll('#scoreResult .num').forEach(el => {
                    const val = parseFloat(el.textContent);
                    el.className = 'num' + (val>=80?' good': val>=60?' mid':' poor');
                });
                statusText.textContent = '✅ '+t('done');
                showToast('✅ 評分完成！');
            }

            // 輔助函數
            function buildWsUrl(host, path, apiKey, apiSecret) {
                if (typeof CryptoJS === 'undefined') throw new Error('CryptoJS not loaded');
                const date = new Date().toUTCString();
                const requestLine = `GET ${path} HTTP/1.1`;
                const signatureOrigin = `host: ${host}\ndate: ${date}\n${requestLine}`;
                const hmac = CryptoJS.HmacSHA256(signatureOrigin, apiSecret);
                const signature = CryptoJS.enc.Base64.stringify(hmac);
                const authorizationOrigin = `api_key="${apiKey}", algorithm="hmac-sha256", headers="host date request-line", signature="${signature}"`;
                const authorization = CryptoJS.enc.Base64.stringify(CryptoJS.enc.Utf8.parse(authorizationOrigin));
                return `wss://${host}${path}?authorization=${encodeURIComponent(authorization)}&host=${host}&date=${encodeURIComponent(date)}`;
            }

            function loadCryptoJs(cb) {
                if (typeof CryptoJS !== 'undefined') { cryptoReady=true; cb(); return; }
                const script = document.createElement('script');
                script.src = 'https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js';
                script.onload = function() { cryptoReady=true; cb(); };
                script.onerror = function() { showToast('❌ 加密庫載入失敗'); };
                document.head.appendChild(script);
            }

            function log(msg) { console.log('[Speech]', msg); }
        }

        // ================================================================
        // 11. 初始化
        // ================================================================
        initOpenCC();
        loadData();
        render();
        // 確保過濾器存在
        window.filterStudentQuestions = function() { renderStudent(); };

        console.log('✅ 系統已啟動 (完整版)');
    })();
</script>
