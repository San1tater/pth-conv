        <div class="info"><div class="name" id="headerName">普通話課堂</div><div class="subtitle" id="headerSub">拼音對話練習</div></div>
        <button id="btnBack" style="display:none;">↩️ 返回</button>

<!-- 引入 Vosk 浏览器库（WebAssembly） -->

<!-- 引入 pinyin-pro（用于中文转拼音） -->
<script src="https://cdn.jsdelivr.net/npm/pinyin-pro@3.25.0/dist/index.js"></script>

<script>
(function(){
    const AppState={currentView:'menu',currentThemeId:null,editThemeId:null};
    const STORAGE_KEY='pinyin_teaching_vosk';
    function getDefaultThemes(){ /* ... 主题数据不变 ... */ }
    function loadThemes(){ /* ... 读取存储 ... */ }
    function saveThemes(t){ /* ... 保存 ... */ }

    let themes=loadThemes(),currentDialogueIndex=0,confirmedSyllables=[],
        selectedInitial=null,selectedFinal=null,selectedTone=null,inputOrder=0,
        isCourseComplete=false,
        recognizer=null,audioContext=null,mediaStream=null,isRecording=false,
        currentEvalTarget=null,micPermissionGranted=false;

    // ... 原有界面渲染、键盘交互、拼写逻辑等函数均保持不变 ...

    /* ===== Vosk 语音识别初始化 ===== */
    async function initRecognizer() {
        if (recognizer) return true;
        try {
            // 加载模型（model/ 目录需要完整解压）
            const model = await Vosk.createModel('/model/');
            recognizer = new Vosk.Recognizer(model, 16000.0);
            recognizer.setWords(true);    // 获取置信度
            recognizer.setPartialResults(false);
            showToast('✅ 離線語音引擎就緒');
            return true;
        } catch (e) {
            console.error(e);
            showToast('⚠️ 模型載入失敗，請確認 model/ 資料夾完整');
            return false;
        }
    }

    async function requestMic() {
        try {
            mediaStream = await navigator.mediaDevices.getUserMedia({ audio: { sampleRate: 16000 } });
            micPermissionGranted = true;
        } catch (e) { micPermissionGranted = false; }
        return micPermissionGranted;
    }

    function openEvalModal(pinyinNum,chinese,openQ,openKw){
        // ... 弹窗 UI 不变 ...
        // 在“朗讀指定回覆”/“自由回答”按钮中调用 initRecognizer 和 startRecording
    }

    function closeEvalModal(){
        if(isRecording) stopRecording();
        document.getElementById('evalModal')?.remove();
        currentEvalTarget=null;
    }

    async function startRecording(){
        if(!recognizer) {
            const ok = await initRecognizer();
            if(!ok) { document.getElementById('evalResult').textContent='模型未就緒'; return; }
        }
        if(!mediaStream){
            const granted = await requestMic();
            if(!granted) { document.getElementById('evalResult').textContent='需麥克風權限'; return; }
        }
        try {
            audioContext = new AudioContext({ sampleRate: 16000 });
            const source = audioContext.createMediaStreamSource(mediaStream);
            const processor = audioContext.createScriptProcessor(4096, 1, 1);
            processor.onaudioprocess = (event) => {
                if(!isRecording || !recognizer) return;
                const inputData = event.inputBuffer.getChannelData(0);
                recognizer.acceptWaveform(inputData);
                const result = recognizer.result();
                if(result && result.text) {
                    const text = result.text;
                    clearTimeout(window._voskTimer);
                    window._voskTimer = setTimeout(() => evaluateWithPinyin(text), 300);
                }
            };
            source.connect(processor);
            processor.connect(audioContext.destination);
            isRecording = true;
            document.getElementById('btnMic').textContent='🔴';
            document.getElementById('btnMic').classList.add('recording');
            document.getElementById('evalResult').textContent = '🎤 正在聆聽...';
        } catch(e) { console.error(e); }
    }

    function stopRecording(){
        if(audioContext){ audioContext.close(); audioContext=null; }
        isRecording = false;
        const mic = document.getElementById('btnMic');
        if(mic){ mic.textContent='🎙️'; mic.classList.remove('recording'); }
        if(recognizer) recognizer.reset();
    }

    function evaluateWithPinyin(text){
        if(!currentEvalTarget) return;
        // 将识别出的中文转成数字拼音
        const recognizedPinyin = window.pinyinPro.pinyin(text, { toneType: 'num', type: 'array' }).join(' ');
        const targetPinyin = currentEvalTarget.pinyin.trim();
        let stars=0, msg='', detail='';

        if(currentMode==='standard'){
            const sim = similarity(recognizedPinyin, targetPinyin);
            if(sim>=0.9){ stars=5; msg='🏆 拼音完美！'; }
            else if(sim>=0.7){ stars=4; msg='👍 拼音大致正確'; }
            else if(sim>=0.5){ stars=3; msg='📝 部分音節有誤'; }
            else { stars=1; msg='📢 請再試一次（注意聲調）'; }
            detail = `目標：${targetPinyin}  你的發音：${recognizedPinyin}`;
        } else {
            const keywords = currentEvalTarget.openKw.split(',').map(s=>s.trim());
            const matched = keywords.filter(kw => text.includes(kw));
            const rate = keywords.length ? matched.length/keywords.length : 0;
            if(rate>=0.8){ stars=5; msg='🏆 內容完全符合！'; }
            else if(rate>=0.5){ stars=4; msg='👍 大部分關鍵詞命中'; }
            else if(rate>=0.3){ stars=3; msg='📝 部分關鍵詞命中'; }
            else { stars=1; msg='📢 未命中關鍵詞，請再試一次'; }
            detail = `關鍵詞：${keywords.join('、')}  命中：${matched.join('、')||'無'}`;
        }
        document.getElementById('evalResult').textContent = msg;
        document.getElementById('evalStars').textContent = ['','⭐','⭐⭐','⭐⭐⭐','⭐⭐⭐⭐','🌟🌟🌟🌟🌟'][stars];
        document.getElementById('evalDetail').textContent = detail;
    }

    function similarity(s1,s2){ /* 编辑距离算法，不变 */ }
    function editDistance(s1,s2){ /* 同上 */ }

    // ... 教师管理、自动生成关键词等函数保持不变 ...
})();
</script>
</body>
</html>
