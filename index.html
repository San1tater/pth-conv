<!doctype html>
<html lang="zh-Hans">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>普通话口语评测（iFlytek + Deepseek 实测版）</title>
<style>
body{font-family:system-ui,Segoe UI,Roboto,Arial;margin:16px;background:#f7f8fb;color:#111}
.card{background:#fff;border-radius:8px;padding:12px;margin-top:12px;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
label{display:block;margin-top:8px;font-weight:600}
button{padding:8px 12px;border-radius:6px;border:1px solid #ddd;background:#fff;cursor:pointer}
.btn-primary{background:#2563eb;color:#fff;border-color:#2563eb}
.result{white-space:pre-wrap;background:#f1f5f9;padding:10px;border-radius:6px;margin-top:8px}
.small{font-size:13px;color:#555}
</style>
<script src="https://unpkg.com/pinyin-pro/dist/pinyin-pro.umd.js"></script>
</head>
<body>
<h2>普通话口语评测（测试版）</h2>
<div class="card">
  <label>角色</label>
  <select id="role"><option value="student">学生</option><option value="teacher">教师</option></select>
  <label>题目图片（教师上传）</label>
  <input type="file" id="imgUpload" accept="image/*"/>
  <label>参考答案（教师可手动输入或使用 Deepseek 生成）</label>
  <textarea id="refText" style="width:100%;min-height:80px"></textarea>
  <div style="margin-top:8px">
    <button id="deepseekBtn">使用 Deepseek 生成参考答案</button>
    <span class="small">（已内嵌你提供的 Deepseek Key）</span>
  </div>
</div>

<div class="card" id="studentCard">
  <label>题目</label>
  <div id="questionList" class="small">暂无题目</div>
  <label>录音控制</label>
  <div>
    <button id="startRec" class="btn-primary">开始录音</button>
    <button id="stopRec">停止录音</button>
    <button id="playRec">播放录音</button>
    <button id="sendIfly">发送到科大讯飞识别并评分</button>
    <button id="sendFallback">使用浏览器识别并评分（回退）</button>
  </div>
  <div id="recStatus" class="small">未录音</div>
  <label>识别结果与评分</label>
  <div id="results" class="result">等待识别结果...</div>
</div>

<div class="card">
  <label>日志</label>
  <div id="log" class="result small">初始化</div>
</div>

<script>
/* ========== 配置（测试版：凭证直接内嵌） ========== */
const IFLYTEK = {
  APPID: 'b35875f2',
  APIKey: '2cba10591dc68d093065c60d0c8b98ab',
  APISecret: 'ZDg0NzJhZjgyNjE0N2I0OTEzMDMxZmMy',
  WS_URL: 'wss://iat-api.xfyun.cn/v2/iat',
  REST_URL: 'https://iat-api.xfyun.cn/v2/iat'
};
const DEEPSEEK = {
  ENDPOINT: 'https://api.deepseek.ai/v1/describe',
  API_KEY: 'sk-1b549674ca454f55b440b778e2cc122b'
};

/* 全局 */
let mediaRecorder, audioChunks=[], audioBlob=null, audioUrl=null;
let currentRefText='', currentRefPinyin=[];
const logEl=document.getElementById('log'), resultsEl=document.getElementById('results'), questionList=document.getElementById('questionList');

function log(msg){ logEl.textContent = `[${new Date().toLocaleTimeString()}] ${msg}\n` + logEl.textContent; }

/* 拼音与比对 */
function toPinyin(text){
  const cleaned = (text||'').replace(/[^\u4e00-\u9fa5]/g,'');
  return window.pinyinPro.pinyin(cleaned, {toneType:'num', type:'array'});
}
function levenshtein(a,b){
  if(!a) return b?b.length:0; if(!b) return a.length;
  const m=a.length,n=b.length,dp=Array.from({length:m+1},()=>Array(n+1).fill(0));
  for(let i=0;i<=m;i++)dp[i][0]=i; for(let j=0;j<=n;j++)dp[0][j]=j;
  for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)dp[i][j]=Math.min(dp[i-1][j]+1,dp[i][j-1]+1,dp[i-1][j-1]+(a[i-1]===b[j-1]?0:1));
  return dp[m][n];
}
function scoreAndSuggest(refArr, recArr){
  const refStr=refArr.join(' '), recStr=recArr.join(' ');
  const dist=levenshtein(refStr,recStr), maxLen=Math.max(refStr.length,recStr.length)||1;
  const percent=Math.round((1 - dist/maxLen)*100);
  const suggestions=[];
  const minLen=Math.min(refArr.length, recArr.length);
  for(let i=0;i<minLen;i++) if(refArr[i]!==recArr[i]) suggestions.push(`第${i+1}字：参考 ${refArr[i]}，你读 ${recArr[i]||'（缺失）'}`);
  if(recArr.length<refArr.length) suggestions.push('可能漏读部分内容。');
  if(suggestions.length===0) suggestions.push('发音与参考高度一致。');
  return {percent,suggestions};
}

/* 录音 */
document.getElementById('startRec').addEventListener('click', async ()=>{
  audioChunks=[]; try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    mediaRecorder=new MediaRecorder(stream);
    mediaRecorder.ondataavailable=e=>audioChunks.push(e.data);
    mediaRecorder.onstart=()=>{ document.getElementById('recStatus').textContent='录音中...'; log('开始录音'); };
    mediaRecorder.onstop=()=>{ audioBlob=new Blob(audioChunks,{type:'audio/webm'}); audioUrl=URL.createObjectURL(audioBlob); document.getElementById('recStatus').textContent='录音已停止'; log('录音停止'); };
    mediaRecorder.start();
  }catch(e){ log('麦克风获取失败: '+e); alert('无法获取麦克风权限'); }
});
document.getElementById('stopRec').addEventListener('click', ()=>{ if(mediaRecorder && mediaRecorder.state!=='inactive') mediaRecorder.stop(); });
document.getElementById('playRec').addEventListener('click', ()=>{ if(audioUrl) new Audio(audioUrl).play(); else log('无录音'); });

/* Deepseek 调用（真实 endpoint + 你提供 key） */
document.getElementById('deepseekBtn').addEventListener('click', async ()=>{
  const f=document.getElementById('imgUpload').files[0];
  if(!f){ alert('请上传图片'); return; }
  const r=new FileReader();
  r.onload=async ()=>{ const base64=r.result.split(',')[1]; log('调用 Deepseek'); 
    try{
      const resp=await fetch(DEEPSEEK.ENDPOINT, {
        method:'POST',
        headers:{ 'Content-Type':'application/json', 'Authorization':'Bearer '+DEEPSEEK.API_KEY },
        body: JSON.stringify({ image_base64: base64, language: 'zh', task: 'describe_picture_story' })
      });
      if(!resp.ok) throw new Error('Deepseek 返回 '+resp.status);
      const data=await resp.json();
      const answer = data.description || data.text || data.answer || '';
      document.getElementById('refText').value = answer;
      currentRefText = answer; currentRefPinyin = toPinyin(answer);
      questionList.textContent = '题目：' + (answer||'（无）');
      log('Deepseek 返回参考答案');
    }catch(e){ log('Deepseek 调用失败: '+e); alert('Deepseek 调用失败，请检查控制台日志'); }
  };
  r.readAsDataURL(f);
});
document.getElementById('refText').addEventListener('input', e=>{ currentRefText=e.target.value.trim(); currentRefPinyin=toPinyin(currentRefText); if(currentRefText) questionList.textContent='题目：'+currentRefText; });

/* iFlytek 签名与调用（浏览器端示例签名，按官方 SDK 要求） */
function rfc1123Date(){ return new Date().toUTCString(); }
async function hmacBase64(key,msg){
  const enc=new TextEncoder(), k=enc.encode(key);
  const cryptoKey=await crypto.subtle.importKey('raw',k,{name:'HMAC',hash:'SHA-256'},false,['sign']);
  const sig=await crypto.subtle.sign('HMAC',cryptoKey,enc.encode(msg));
  return btoa(String.fromCharCode(...new Uint8Array(sig)));
}
async function blobTo16kBase64(blob){
  const ab=await blob.arrayBuffer();
  const decodeCtx=new (window.AudioContext||window.webkitAudioContext)();
  const decoded=await decodeCtx.decodeAudioData(ab.slice(0));
  const targetRate=16000, length=Math.ceil(decoded.duration*targetRate);
  const offline=new OfflineAudioContext(1,length,targetRate);
  const src=offline.createBufferSource();
  const mono=offline.createBuffer(1,decoded.length,decoded.sampleRate);
  mono.copyToChannel(decoded.getChannelData(0),0);
  src.buffer=mono; src.connect(offline.destination); src.start(0);
  const rendered=await offline.startRendering();
  const ch=rendered.getChannelData(0);
  const pcm=new Int16Array(ch.length);
  for(let i=0;i<ch.length;i++){ let s=Math.max(-1,Math.min(1,ch[i])); pcm[i]=s<0? s*0x8000 : s*0x7FFF; }
  const wav=int16ToWav(pcm,targetRate);
  return arrayBufferToBase64(wav);
}
function int16ToWav(samples,sr){
  const buf=new ArrayBuffer(44+samples.length*2), view=new DataView(buf);
  function wstr(o,s){ for(let i=0;i<s.length;i++) view.setUint8(o+i,s.charCodeAt(i)); }
  wstr(0,'RIFF'); view.setUint32(4,36+samples.length*2,true); wstr(8,'WAVE'); wstr(12,'fmt ');
  view.setUint32(16,16,true); view.setUint16(20,1,true); view.setUint16(22,1,true); view.setUint32(24,sr,true);
  view.setUint32(28,sr*2,true); view.setUint16(32,2,true); view.setUint16(34,16,true); wstr(36,'data'); view.setUint32(40,samples.length*2,true);
  let off=44; for(let i=0;i<samples.length;i++,off+=2) view.setInt16(off,samples[i],true);
  return buf;
}
function arrayBufferToBase64(buf){ let bin=''; const bytes=new Uint8Array(buf); for(let i=0;i<bytes.length;i++) bin+=String.fromCharCode(bytes[i]); return btoa(bin); }

async function callIflytekREST(audioBase64){
  const date=rfc1123Date(), host=new URL(IFLYTEK.REST_URL).host;
  const signatureOrigin=`host: ${host}\ndate: ${date}\nPOST /v2/iat HTTP/1.1`;
  const signature=await hmacBase64(IFLYTEK.APISecret, signatureOrigin);
  const auth=`api_key="${IFLYTEK.APIKey}", algorithm="hmac-sha256", headers="host date request-line", signature="${signature}"`;
  const body={ common:{app_id:IFLYTEK.APPID}, business:{language:'zh_cn',domain:'iat',accent:'mandarin',vad_eos:5000}, data:{status:2,format:'audio/L16;rate=16000',encoding:'raw',audio:audioBase64} };
  const resp=await fetch(IFLYTEK.REST_URL, {method:'POST', headers:{'Content-Type':'application/json','Authorization':auth,'Date':date,'Host':host}, body:JSON.stringify(body)});
  if(!resp.ok) throw new Error('iFlytek REST '+resp.status);
  const data=await resp.json(); log('iFlytek REST 返回');
  // 解析以官方返回为准，这里尝试读取常见字段
  if(data && data.data && data.data.result) return data.data.result;
  if(data && data.result) return data.result;
  return '';
}
async function callIflytekWS(audioBase64){
  const date=rfc1123Date(), host=new URL(IFLYTEK.WS_URL.replace('wss://','https://')).host;
  const signatureOrigin=`host: ${host}\ndate: ${date}\nGET /v2/iat HTTP/1.1`;
  const signature=await hmacBase64(IFLYTEK.APISecret, signatureOrigin);
  const auth=btoa(`api_key="${IFLYTEK.APIKey}", algorithm="hmac-sha256", headers="host date request-line", signature="${signature}"`);
  const wsUrl=`${IFLYTEK.WS_URL}?authorization=${encodeURIComponent(auth)}&date=${encodeURIComponent(date)}&host=${encodeURIComponent(host)}`;
  return new Promise((resolve,reject)=>{
    try{
      const ws=new WebSocket(wsUrl);
      ws.onopen=()=>{ log('iFlytek WS 已连接，发送音频'); ws.send(JSON.stringify({common:{app_id:IFLYTEK.APPID}, business:{language:'zh_cn',domain:'iat',accent:'mandarin'}, data:{status:2,format:'audio/L16;rate=16000',encoding:'raw',audio:audioBase64}})); };
      ws.onmessage=(e)=>{ try{ const msg=JSON.parse(e.data); log('iFlytek WS 返回'); if(msg && msg.data && msg.data.result){ resolve(msg.data.result); ws.close(); } }catch(err){ log('WS 解析错误:'+err); } };
      ws.onerror=(err)=>{ log('WS 错误'); reject(err); };
    }catch(e){ reject(e); }
  });
}

/* 发送到 iFlytek 并评分（优先 REST -> WS -> 回退） */
document.getElementById('sendIfly').addEventListener('click', async ()=>{
  if(!audioBlob){ alert('请先录音'); return; }
  if(!currentRefText){ alert('请先由教师设置参考答案'); return; }
  resultsEl.textContent='正在发送到 iFlytek...';
  try{
    const audioBase64 = await blobTo16kBase64(audioBlob);
    let recognized='';
    try{ recognized = await callIflytekREST(audioBase64); }catch(e){ log('REST 失败: '+e); try{ recognized = await callIflytekWS(audioBase64); }catch(e2){ log('WS 失败: '+e2); throw new Error('iFlytek 调用失败'); } }
    if(!recognized) throw new Error('未识别到文本');
    const recPinyin=toPinyin(recognized), refPinyin=currentRefPinyin||toPinyin(currentRefText);
    const res=scoreAndSuggest(refPinyin, recPinyin);
    resultsEl.innerText = `识别文字（iFlytek）：${recognized}\n参考文字：${currentRefText}\n参考拼音：${refPinyin.join(' ')}\n识别拼音：${recPinyin.join(' ')}\n相似度得分：${res.percent}%\n建议：\n${res.suggestions.join('\n')}`;
    log('评分完成：'+res.percent+'%');
  }catch(e){ log('iFlytek 识别失败: '+e); alert('iFlytek 调用失败，请使用回退识别或检查控制台'); }
});

/* 回退：浏览器 Web Speech API（播放录音并实时识别） */
document.getElementById('sendFallback').addEventListener('click', async ()=>{
  if(!audioBlob){ alert('请先录音'); return; }
  if(!currentRefText){ alert('请先由教师设置参考答案'); return; }
  if(!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)){ alert('当前浏览器不支持 Web Speech API'); return; }
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  const recognition = new SpeechRecognition();
  recognition.lang='zh-CN'; recognition.interimResults=false; recognition.maxAlternatives=1;
  resultsEl.textContent='使用浏览器识别（播放录音中）...'; log('回退到浏览器识别');
  recognition.onresult = (ev)=>{ const t=ev.results[0][0].transcript; log('浏览器识别:'+t); const recPinyin=toPinyin(t), refPinyin=currentRefPinyin||toPinyin(currentRefText); const res=scoreAndSuggest(refPinyin,recPinyin);
    resultsEl.innerText = `识别文字（浏览器）：${t}\n参考文字：${currentRefText}\n相似度得分：${res.percent}%\n建议：\n${res.suggestions.join('\n')}`; };
  recognition.onerror = (e)=>{ log('浏览器识别错误:'+e.error); alert('识别错误:'+e.error); };
  recognition.start(); new Audio(audioUrl).play();
});

/* 角色切换 */
document.getElementById('role').addEventListener('change', e=>{ document.getElementById('studentCard').style.display = e.target.value==='teacher' ? 'none' : 'block'; });
document.getElementById('role').dispatchEvent(new Event('change'));
log('页面就绪');
</script>
</body>
</html>
