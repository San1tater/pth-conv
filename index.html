        .btn-primary {

            color: #6b7a8a;
            margin-top: 2px;
            font-weight: 400;
        }
    </style>

            let currentLang = 'zh';

            function t(key) { return LANG[currentLang][key] || key; }

            // ================================================================
            // 4. 簡繁轉換
            // ================================================================
            let cnToHkConverter = null;
            let hkToCnConverter = null;

            function initConverter() {
                if (typeof OpenCC !== 'undefined') {
                    try {
                        cnToHkConverter = OpenCC.Converter({ from: 'cn', to: 'hk' });
                        hkToCnConverter = OpenCC.Converter({ from: 'hk', to: 'cn' });
                    } catch (e) {
                        cnToHkConverter = null;
                        hkToCnConverter = null;
                    }
                }
            }

            function forceToTraditional(text) {
                if (!text) return text;
                if (cnToHkConverter) {
                    try { return cnToHkConverter(text); } catch (e) { return text; }
                }
                return text;
            }

            function forceToSimplified(text) {
                if (!text) return text;
                if (hkToCnConverter) {
                    try { return hkToCnConverter(text); } catch (e) { return text; }
                }
                return text;
            }

            // ================================================================
            // 5. 拼音工具（pinyin-pro）
            // ================================================================
            function generatePinyinForText(text, toneType) {
                if (!text || typeof text !== 'string') return '';
                if (typeof window.pinyinPro === 'undefined') {
                    console.warn('pinyin-pro 未加載，返回空拼音');
                    return '';
                }
                try {
                    const p = window.pinyinPro.pinyin;
                    // 將文字按逗號分割，分別生成拼音
                    const parts = text.split(',').map(s => s.trim()).filter(s => s.length > 0);
                    const result = parts.map(word => {
                        // 先轉簡體再生成拼音
                        const simplified = forceToSimplified(word);
                        if (!simplified) return '';
                        const py = p(simplified, {
                            toneType: toneType || 'num',
                            v: true,
                            mode: 'normal'
                        });
                        return py || '';
                    });
                    return result.join(', ');
                } catch (e) {
                    console.warn('生成拼音失敗:', e);
                    return '';
                }
            }

            function generatePinyinNum(text) {
                return generatePinyinForText(text, 'num');
            }

            function generatePinyinSymbol(text) {
                return generatePinyinForText(text, 'symbol');
            }

            // 將帶數字聲調的拼音轉為帶聲調符號
            function numToSymbolPinyin(pinyinNum) {
                if (!pinyinNum) return '';
                try {
                    if (typeof window.pinyinPro !== 'undefined') {
                        const { pinyin } = window.pinyinPro;
                        // 直接使用 pinyin-pro 轉換
                        // 但我們需要的是將數字聲調轉為符號，可以逐詞處理
                        const parts = pinyinNum.split(',').map(s => s.trim()).filter(s => s.length > 0);
                        const result = parts.map(word => {
                            // 用 pinyin-pro 重新生成帶符號的拼音
                            // 但我們沒有原始中文，所以只能嘗試用數字轉符號
                            // 簡單方式：用 pinyin-pro 的 convert 功能？
                            // 實際上 pinyin-pro 沒有直接的數字轉符號函數，我們自己實現
                            // 但更好的辦法是直接保存中文和拼音的映射
                            // 這裡我們簡單地返回原來的數字拼音，學生端顯示時再轉換
                            // 實際上我們可以在學生端直接顯示帶符號的拼音
                            return word;
                        });
                        return result.join(', ');
                    }
                    return pinyinNum;
                } catch (e) {
                    return pinyinNum;
                }
            }

            // 將帶數字聲調的拼音轉為 HTML 帶聲調符號的顯示
            function pinyinNumToHtml(pinyinNum) {
                if (!pinyinNum) return '';
                // 簡單映射：將數字轉為聲調符號
                const toneMap = {
                    'a1': 'ā',
                    'a2': 'á',
                    'a3': 'ǎ',
                    'a4': 'à',
                    'a0': 'a',
                    'e1': 'ē',
                    'e2': 'é',
                    'e3': 'ě',
                    'e4': 'è',
                    'e0': 'e',
                    'i1': 'ī',
                    'i2': 'í',
                    'i3': 'ǐ',
                    'i4': 'ì',
                    'i0': 'i',
                    'o1': 'ō',
                    'o2': 'ó',
                    'o3': 'ǒ',
                    'o4': 'ò',
                    'o0': 'o',
                    'u1': 'ū',
                    'u2': 'ú',
                    'u3': 'ǔ',
                    'u4': 'ù',
                    'u0': 'u',
                    'ü1': 'ǖ',
                    'ü2': 'ǘ',
                    'ü3': 'ǚ',
                    'ü4': 'ǜ',
                    'ü0': 'ü',
                    'v1': 'ǖ',
                    'v2': 'ǘ',
                    'v3': 'ǚ',
                    'v4': 'ǜ',
                    'v0': 'ü'
                };

                // 處理每個音節
                const syllables = pinyinNum.split(',').map(s => s.trim()).filter(s => s.length > 0);
                const result = syllables.map(syl => {
                    // 匹配字母+數字
                    let processed = syl;
                    // 處理 ü/v
                    processed = processed.replace(/v/g, 'ü');
                    // 處理聲調
                    for (const [key, val] of Object.entries(toneMap)) {
                        // 匹配字母+數字，但數字在末尾
                        const regex = new RegExp(key.replace('1', '1').replace('2', '2').replace('3', '3').replace('4', '4')
                            .replace('0', '0') + '\\b');
                        // 更精確：匹配字母+數字
                        const pattern = key.replace(/\d/g, '');
                        const num = key.replace(/\D/g, '');
                        const re = new RegExp(pattern + num + '(?![a-z])', 'gi');
                        if (re.test(processed)) {
                            processed = processed.replace(re, val);
                            break;
                        }
                    }
                    return processed;
                });
                return result.join(' ');
            }

            // ================================================================
            // 10. 拼音自動生成綁定
            // ================================================================
            function bindPinyinAutoGen() {
                // 綁定所有 .pinyin-trigger 輸入框，當值變化時自動生成拼音
                const triggers = document.querySelectorAll('.pinyin-trigger');
                triggers.forEach(input => {
                    // 移除舊的事件監聽（避免重複）
                    input.removeEventListener('input', window._pinyinAutoGenHandler);
                    const handler = function(e) {
                        const target = e.target;
                        // 找到同一個子題目或同一層級的拼音輸入框
                        const parent = target.closest('.sub-question') || target.closest('.editor-panel');
                        if (!parent) return;
                        // 找到拼音輸入框
                        let pinyinInput = null;
                        if (parent.querySelector('.sub-question')) {
                            // 在子題目中
                            const subDiv = target.closest('.sub-question');
                            if (subDiv) {
                                pinyinInput = subDiv.querySelector('.sq-pinyin');
                            }
                        } else {
                            // 在開放式題目中
                            pinyinInput = document.getElementById('editPinyin');
                        }
                        if (!pinyinInput) return;
                        // 如果拼音被手動修改過且關鍵詞沒有變化，不自動生成
                        const key = target.id || target.className + '_' + (target.dataset.index || '');
                        if (pinyinManuallyEdited[key]) {
                            // 但如果關鍵詞內容變化了，重新生成
                            // 簡單判斷：如果關鍵詞為空，清空拼音
                            if (!target.value.trim()) {
                                pinyinInput.value = '';
                                return;
                            }
                            // 否則保留手動修改
                            return;
                        }
                        // 自動生成拼音
                        const kwText = target.value;
                        if (kwText.trim()) {
                            const pinyin = generatePinyinNum(kwText);
                            pinyinInput.value = pinyin;
                        } else {
                            pinyinInput.value = '';
                        }
                    };
                    input.addEventListener('input', handler);
                    window._pinyinAutoGenHandler = handler; // 存儲以便清理
                    // 同時，當拼音框被手動編輯時，標記為手動修改
                    const parent = input.closest('.sub-question') || input.closest('.editor-panel');
                    let pinyinInput = null;
                    if (parent) {
                        if (input.closest('.sub-question')) {
                            const subDiv = input.closest('.sub-question');
                            if (subDiv) pinyinInput = subDiv.querySelector('.sq-pinyin');
                        } else {
                            pinyinInput = document.getElementById('editPinyin');
                        }
                    }
                    if (pinyinInput) {
                        pinyinInput.addEventListener('input', function(e) {
                            const key = input.id || input.className + '_' + (input.dataset.index || '');
                            pinyinManuallyEdited[key] = true;
                        });
                    }
                });
            }

            // ================================================================
            // 11. 年級學期同步
            // ================================================================
            function bindGradeSemesterSync() {
                // 右側編輯區的年級學期下拉框
                const editGrade = document.getElementById('editGrade');
                const editSemester = document.getElementById('editSemester');
                const filterGrade = document.getElementById('filterGrade');
                const filterSemester = document.getElementById('filterSemester');

                if (editGrade && filterGrade) {
                    // 移除舊監聽
                    editGrade.removeEventListener('change', window._gradeSyncHandler);
                    const handler = function() {
                        const val = this.value;
                        if (filterGrade) filterGrade.value = val;
                        // 更新當前題目的年級
                        const q = questions.find(q => q.id === editingQuestionId);
                        if (q) {
                            q.grade = val;
                            // 更新到 Firestore（不保存，只更新本地）
                            // 但為了即時反饋，我們更新本地數據後重新渲染
                        }
                        teacherFilterGrade = val;
                        // 重新渲染列表
                        renderQuestionList();
                        // 重新渲染編輯器（但保持編輯狀態）
                        // 用更簡單的方式：只更新列表
                        const container = document.getElementById('questionListContainer');
                        if (container) container.innerHTML = renderQuestionList();
                        // 同步左側篩選
                        if (filterGrade) filterGrade.value = val;
                        // 重新高亮選中項
                        highlightSelected();
                    };
                    editGrade.addEventListener('change', handler);
                    window._gradeSyncHandler = handler;
                }

                if (editSemester && filterSemester) {
                    editSemester.removeEventListener('change', window._semesterSyncHandler);
                    const handler = function() {
                        const val = this.value;
                        if (filterSemester) filterSemester.value = val;
                        const q = questions.find(q => q.id === editingQuestionId);
                        if (q) {
                            q.semester = val;
                        }
                        teacherFilterSemester = val;
                        const container = document.getElementById('questionListContainer');
                        if (container) container.innerHTML = renderQuestionList();
                        if (filterSemester) filterSemester.value = val;
                        highlightSelected();
                    };
                    editSemester.addEventListener('change', handler);
                    window._semesterSyncHandler = handler;
                }

                // 左側篩選變化時，同步右側
                if (filterGrade) {
                    filterGrade.removeEventListener('change', window._filterGradeSyncHandler);
                    const handler = function() {
                        const val = this.value;
                        teacherFilterGrade = val;
                        if (editGrade) editGrade.value = val;
                        // 如果當前正在編輯題目，更新題目的年級
                        const q = questions.find(q => q.id === editingQuestionId);
                        if (q) {
                            q.grade = val;
                        }
                        // 重新渲染列表
                        const container = document.getElementById('questionListContainer');
                        if (container) container.innerHTML = renderQuestionList();
                        highlightSelected();
                    };
                    filterGrade.addEventListener('change', handler);
                    window._filterGradeSyncHandler = handler;
                }

                if (filterSemester) {
                    filterSemester.removeEventListener('change', window._filterSemesterSyncHandler);
                    const handler = function() {
                        const val = this.value;
                        teacherFilterSemester = val;
                        if (editSemester) editSemester.value = val;
                        const q = questions.find(q => q.id === editingQuestionId);
                        if (q) {
                            q.semester = val;
                        }
                        const container = document.getElementById('questionListContainer');
                        if (container) container.innerHTML = renderQuestionList();
                        highlightSelected();
                    };
                    filterSemester.addEventListener('change', handler);
                    window._filterSemesterSyncHandler = handler;
                }
            }

            function highlightSelected() {
                document.querySelectorAll('.list-item').forEach(el => {
                    el.classList.remove('selected');
                    if (el.dataset.id === editingQuestionId) {
                        el.classList.add('selected');
                    }
                });
            }

            // ================================================================
            // 12. 教師操作函數（Firestore 非同步）
            // ================================================================
            window.startNewQuestion = function() {
                const filterGrade = document.getElementById('filterGrade')?.value || '一年級';
                const filterSemester = document.getElementById('filterSemester')?.value || '上學期';
                const newId = db.collection('questions').doc().id;
                const newQ = {
                    grade: filterGrade,
                    semester: filterSemester,
                    title: '新題目',
                    type: 'open',
                    refAnswer: '',
                    keywords: [],
                    pinyin: [],
                    image: '',
                    subQuestions: [],
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                };
                db.collection('questions').doc(newId).set(newQ)
                    .then(() => {
                        editingQuestionId = newId;
                        // 重置手動編輯標記
                        pinyinManuallyEdited = {};
                        // 同步篩選
                        const fg = document.getElementById('filterGrade');
                        const fs = document.getElementById('filterSemester');
                        if (fg) fg.value = filterGrade;
                        if (fs) fs.value = filterSemester;
                        teacherFilterGrade = filterGrade;
                        teacherFilterSemester = filterSemester;
                        render();
                    })
                    .catch(err => console.error('新增題目失敗:', err));
            };

            window.selectQuestion = function(id) {
                editingQuestionId = id;
                pinyinManuallyEdited = {};
                // 同步篩選
                const q = questions.find(q => q.id === id);
                if (q) {
                    const fg = document.getElementById('filterGrade');
                    const fs = document.getElementById('filterSemester');
                    if (fg) fg.value = q.grade || '';
                    if (fs) fs.value = q.semester || '';
                    teacherFilterGrade = q.grade || '';
                    teacherFilterSemester = q.semester || '';
                }
                render();
            };

            window.editQuestion = function(id) {
                editingQuestionId = id;
                pinyinManuallyEdited = {};
                const q = questions.find(q => q.id === id);
                if (q) {
                    const fg = document.getElementById('filterGrade');

            // ================================================================
            // 15. 音頻工具（AudioWorklet）
            // ================================================================
            const audioWorkletBlobUrl = URL.createObjectURL(new Blob([`
                class PCMProcessor extends AudioWorkletProcessor {
                    process(inputs, outputs, parameters) {
                        const input = inputs[0];
                        if (input && input.length > 0) {
                            const channelData = input[0];
                            const pcm = new Int16Array(channelData.length);
                            for (let i = 0; i < channelData.length; i++) {
                                const s = Math.max(-1, Math.min(1, channelData[i]));
                                pcm[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
                            }
                            this.port.postMessage(pcm);
                        }
                        return true;
                    }
                }
                registerProcessor('pcm-processor', PCMProcessor);
            `], { type: 'application/javascript' }));

            // ================================================================
            // 16. 通用語音識別函數（前端直連訊飛 WebSocket）
            // ================================================================
            function recognizeWithIat(audioBase64, wsUrl) {
                return new Promise((resolve, reject) => {
                    const ws = new WebSocket(wsUrl);
                    let transcript = '';
                    let finished = false;
                    const timeout = setTimeout(() => {
                        if (!finished) {
                            ws.close();
                            reject(new Error('語音識別超時'));
                        }
                    }, 15000);

                    ws.onopen = () => {
                        ws.send(JSON.stringify({
                            common: { app_id: 'b35875f2' },
                            business: { language: 'zh_cn', domain: 'iat', accent: 'mandarin' },
                            data: { status: 0, format: 'audio/L16;rate=16000', encoding: 'raw', audio: '' }
                        }));
                        const audioBuffer = Uint8Array.from(atob(audioBase64), c => c.charCodeAt(0));
                        const chunkSize = 4000;
                        let offset = 0;
                        while (offset < audioBuffer.length) {
                            const chunk = audioBuffer.slice(offset, offset + chunkSize);
                            const chunkBase64 = btoa(String.fromCharCode.apply(null, chunk));
                            ws.send(JSON.stringify({
                                data: { status: 1, format: 'audio/L16;rate=16000', encoding: 'raw',
                                    audio: chunkBase64 }
                            }));
                            offset += chunkSize;
                        }
                        ws.send(JSON.stringify({
                            data: { status: 2, format: 'audio/L16;rate=16000', encoding: 'raw', audio: '' }
                        }));
                    };

                    ws.onmessage = (event) => {
                        try {
                            const msg = JSON.parse(event.data);
                            if (msg.code && msg.code !== 0) {
                                reject(new Error(`IAT error: ${msg.code}`));
                                return;
                            }
                            if (msg.data && msg.data.result && msg.data.result.ws) {
                                let text = '';
                                for (const w of msg.data.result.ws) {
                                    for (const cw of w.cw) text += cw.w;
                                }
                                transcript += text;
                            }
                            if (msg.data && msg.data.status === 2) {
                                finished = true;
                                clearTimeout(timeout);
                                ws.close();
                                resolve(transcript);
                            }
                        } catch (e) {
                            reject(e);
                        }
                    };

                    ws.onerror = (err) => {
                        clearTimeout(timeout);
                        reject(err);
                    };
                    ws.onclose = () => {
                        if (!finished) {
                            clearTimeout(timeout);
                            reject(new Error('WebSocket 關閉'));
                        }
                    };
                });
            }

            // ================================================================
            // 17. 開放式錄音綁定
            // ================================================================
            function bindOpenRecording(q) {
                const startBtn = document.getElementById('startRecordBtn');
                const stopBtn = document.getElementById('stopRecordBtn');
                const dot = document.getElementById('recordDot');
                const timer = document.getElementById('recordTimer');
                const statusText = document.getElementById('statusText');
                const transcript = document.getElementById('studentTranscript');
                const progressContainer = document.getElementById('progressContainer');
                const progressBar = document.getElementById('progressBar');
                const progressText = document.getElementById('progressText');

                let mediaStream = null,
                    audioContext = null,
                    workletNode = null;
                let isRecording = false,
                    recordTimer = null,
                    seconds = 0;
                let audioBuffer = [];
                const SAMPLE_RATE = 16000;
                let isProcessing = false;

                startBtn.onclick = function() { if (!isRecording) startRecording(); };
                stopBtn.onclick = function() { if (isRecording) stopRecording(); };

                async function startRecording() {
                    audioBuffer = [];
                    document.getElementById('scoreResult').classList.add('hidden');
                    progressContainer.classList.add('hidden');
                    progressBar.style.width = '0%';
                    try {
                        await initAudioWorklet();
                        isRecording = true;
                        dot.className = 'status-dot recording';
                        startBtn.disabled = true;
                        stopBtn.disabled = false;
                        seconds = 0;
                        timer.textContent = '00:00';
                        if (recordTimer) clearInterval(recordTimer);
                        recordTimer = setInterval(() => {
                            seconds++;
                            timer.textContent = String(Math.floor(seconds / 60)).padStart(2, '0') + ':' + String(
                                seconds % 60).padStart(2, '0');
                        }, 1000);
                        statusText.textContent = '🔴 ' + t('recording');
                    } catch (err) {
                        console.error('麥克風錯誤:', err);
                        statusText.textContent = '❌ 麥克風錯誤';
                        startBtn.disabled = false;
                    }
                }

                function stopRecording() {
                    isRecording = false;
                    dot.className = 'status-dot';
                    startBtn.disabled = false;
                    stopBtn.disabled = true;
                    if (recordTimer) { clearInterval(recordTimer);
                        recordTimer = null; }
                    statusText.textContent = '⏹️ ' + t('stopRecording');
                    progressContainer.classList.remove('hidden');
                    progressBar.style.width = '10%';
                    progressText.textContent = t('progress');
                    if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop());
                        mediaStream = null; }
                    if (audioContext) { audioContext.close();
                        audioContext = null; }
                    if (workletNode) { workletNode.disconnect();
                        workletNode = null; }
                    processAudio();
                }

                async function initAudioWorklet() {
                    if (audioContext && audioContext.state === 'running') return;
                    audioContext = new(window.AudioContext || window.webkitAudioContext)({ sampleRate: SAMPLE_RATE });
                    await audioContext.audioWorklet.addModule(audioWorkletBlobUrl);
                    const stream = await navigator.mediaDevices.getUserMedia({
                        audio: { sampleRate: SAMPLE_RATE, channelCount: 1, echoCancellation: false,
                            noiseSuppression: false, autoGainControl: false }
                    });
                    mediaStream = stream;
                    const source = audioContext.createMediaStreamSource(stream);
                    workletNode = new AudioWorkletNode(audioContext, 'pcm-processor');
                    workletNode.port.onmessage = (event) => {
                        if (!isRecording) return;
                        const pcm = event.data;
                        audioBuffer.push(pcm);
                    };
                    workletNode.onprocessorerror = (err) => console.error('AudioWorklet 錯誤:', err);
                    source.connect(workletNode);
                    workletNode.connect(audioContext.destination);
                }

                function processAudio() {
                    if (isProcessing) return;
                    isProcessing = true;
                    const totalLength = audioBuffer.reduce((sum, arr) => sum + arr.length, 0);
                    if (totalLength === 0) {
                        progressContainer.classList.add('hidden');
                        statusText.textContent = '⚠️ 未錄到聲音';
                        isProcessing = false;
                        return;
                    }
                    const merged = new Int16Array(totalLength);
                    let offset = 0;
                    for (const arr of audioBuffer) { merged.set(arr, offset);
                        offset += arr.length; }
                    const bytes = new Uint8Array(merged.buffer);
                    let binary = '';
                    for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
                    const audioBase64 = btoa(binary);

                    progressBar.style.width = '30%';
                    statusText.textContent = '📡 獲取連接...';

                    fetch('/api/getIatUrl')
                        .then(res => {
                            if (!res.ok) throw new Error('獲取 URL 失敗');
                            return res.json();
                        })
                        .then(data => {
                            const wsUrl = data.url;
                            statusText.textContent = '🎤 ' + t('recognizing');
                            progressBar.style.width = '50%';
                            return recognizeWithIat(audioBase64, wsUrl);
                        })
                        .then(transcriptText => {
                            progressBar.style.width = '70%';
                            studentAnswerText = transcriptText;
                            const tradText = forceToTraditional(transcriptText);
                            transcript.innerHTML = tradText;
                            const questionInfo = {
                                type: q.type,
                                refAnswer: q.refAnswer || '',
                                keywords: q.keywords || [],
                                subQuestions: q.subQuestions || []
                            };
                            return fetch(BACKEND_URL, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ question: questionInfo, textAnswer: transcriptText })
                            });
                        })
                        .then(res => {
                            if (!res.ok) throw new Error('評分錯誤');
                            return res.json();
                        })
                        .then(data => {
                            progressBar.style.width = '90%';
                            if (data.score) {
                                displayScore(data.score);
                            } else {
                                throw new Error('評分結果缺失');
                            }
                            progressContainer.classList.add('hidden');
                            statusText.textContent = '✅ ' + t('done');
                        })
                        .catch(err => {
                            console.error('處理失敗:', err);
                            statusText.textContent = '❌ 服務錯誤';
                            progressContainer.classList.add('hidden');
                        })
                        .finally(() => {
                            isProcessing = false;
                        });
                }

                function displayScore(grade) {
                    const resultDiv = document.getElementById('scoreResult');
                    resultDiv.classList.remove('hidden');
                    const factor = 10;
                    document.getElementById('totalScore').textContent = Math.round((grade.total_score || 0) * factor);
                    document.getElementById('accScore').textContent = Math.round((grade.accuracy || 0) * factor);
                    document.getElementById('fluencyScore').textContent = Math.round((grade.fluency || 0) * factor);
                    document.getElementById('integrityScore').textContent = Math.round((grade.integrity || 0) * factor);
                    document.getElementById('suggestionText').innerHTML =
                        `<strong>💡 ${t('suggestion')}：</strong>${forceToTraditional(grade.suggestion || '')}`;
                    document.getElementById('scoreSource').textContent = t('source') + '：訊飛星火 4.0Ultra (經後端代理)';
                    document.querySelectorAll('#scoreResult .num').forEach(el => {
                        const val = parseFloat(el.textContent);
                        el.className = 'num' + (val >= 80 ? ' good' : val >= 60 ? ' mid' : ' poor');
                    });
                }
            }

            // ================================================================
            // 18. 半固定式錄音綁定
            // ================================================================
            function bindFixedRecording(q) {
                const subs = q.subQuestions || [];
                const recordBtns = document.querySelectorAll('.sq-record-btn');
                const stopBtns = document.querySelectorAll('.sq-stop-btn');
                const transcripts = document.querySelectorAll('.sq-transcript');
                const submitBtn = document.getElementById('submitAllBtn');
                const submitStatus = document.getElementById('submitStatus');
                const progressContainer = document.getElementById('progressContainer');
                const progressBar = document.getElementById('progressBar');
                const progressText = document.getElementById('progressText');

                let currentRecordingIdx = null;
                let mediaStream = null,
                    audioContext = null,
                    workletNode = null;
                let isRecording = false,
                    recordTimer = null,
                    seconds = 0;
                let audioBuffer = [];
                const SAMPLE_RATE = 16000;
                let isProcessing = false;

                function updateButtons() {
                    recordBtns.forEach((btn, idx) => {
                        const answered = subAnswered[idx] || false;
                        let disabled = answered || subLocked || isProcessing;
                        if (idx > 0 && !subAnswered[idx - 1]) disabled = true;
                        if (currentRecordingIdx !== null && currentRecordingIdx !== idx) disabled = true;
                        btn.disabled = disabled;
                    });
                    const allDone = subs.every((_, idx) => subAnswered[idx]);
                    if (submitBtn) {
                        submitBtn.disabled = !allDone || subLocked || isProcessing;
                    }
                    if (submitStatus) {
                        submitStatus.textContent = allDone ? t('done') : t('answering');
                    }
                    document.querySelectorAll('.sq-status').forEach((span, idx) => {
                        const answered = subAnswered[idx] || false;
                        if (answered) {
                            span.textContent = t('alreadyAnswered');
                            span.className = 'sq-status done';
                        } else if (currentRecordingIdx === idx && isRecording) {
                            span.textContent = t('recording');
                            span.className = 'sq-status';
                        } else if (currentRecordingIdx === idx && !isRecording && !answered) {
                            span.textContent = t('waiting');
                            span.className = 'sq-status waiting';
                        } else {
                            span.textContent = t('notStarted');
                            span.className = 'sq-status';
                        }
                    });
                }

                recordBtns.forEach((btn, idx) => {
                    btn.onclick = function() {
                        if (this.disabled) return;
                        currentRecordingIdx = idx;
                        this.style.display = 'none';
                        const stopBtn = stopBtns[idx];
                        stopBtn.style.display = 'inline-block';
                        transcripts[idx].textContent = '';
                        const statusSpan = document.querySelectorAll('.sq-status')[idx];
                        if (statusSpan) {
                            statusSpan.textContent = t('waiting');
                            statusSpan.className = 'sq-status waiting';
                        }
                        startRecordingForSub(idx);
                    };
                });
                stopBtns.forEach((btn, idx) => {
                    btn.onclick = function() {
                        if (!isRecording) return;
                        stopRecordingForSub(idx);
                    };
                });

                async function startRecordingForSub(idx) {
                    audioBuffer = [];
                    progressContainer.classList.add('hidden');
                    try {
                        await initAudioWorklet();
                        isRecording = true;
                        const statusSpan = document.querySelectorAll('.sq-status')[idx];
                        if (statusSpan) {
                            statusSpan.textContent = t('recording');
                            statusSpan.className = 'sq-status';
                        }
                        recordBtns.forEach(b => b.disabled = true);
                        updateButtons();
                    } catch (err) {
                        console.error('麥克風錯誤:', err);
                        const statusSpan = document.querySelectorAll('.sq-status')[idx];
                        if (statusSpan) statusSpan.textContent = '❌ 錯誤';
                    }
                }

                function stopRecordingForSub(idx) {
                    isRecording = false;
                    const recordBtn = recordBtns[idx];
                    const stopBtn = stopBtns[idx];
                    recordBtn.style.display = 'inline-block';
                    stopBtn.style.display = 'none';
                    if (recordTimer) { clearInterval(recordTimer);
                        recordTimer = null; }
                    if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop());
                        mediaStream = null; }
                    if (audioContext) { audioContext.close();
                        audioContext = null; }
                    if (workletNode) { workletNode.disconnect();
                        workletNode = null; }
                    const statusSpan = document.querySelectorAll('.sq-status')[idx];
                    if (statusSpan) {
                        statusSpan.textContent = t('waiting');
                        statusSpan.className = 'sq-status waiting';
                    }
                    processAudioForSub(idx);
                    updateButtons();
                }

                async function initAudioWorklet() {
                    if (audioContext && audioContext.state === 'running') return;
                    audioContext = new(window.AudioContext || window.webkitAudioContext)({ sampleRate: SAMPLE_RATE });
                    await audioContext.audioWorklet.addModule(audioWorkletBlobUrl);
                    const stream = await navigator.mediaDevices.getUserMedia({
                        audio: { sampleRate: SAMPLE_RATE, channelCount: 1, echoCancellation: false,
                            noiseSuppression: false, autoGainControl: false }
                    });
                    mediaStream = stream;
                    const source = audioContext.createMediaStreamSource(stream);
                    workletNode = new AudioWorkletNode(audioContext, 'pcm-processor');
                    workletNode.port.onmessage = (event) => {
                        if (!isRecording) return;
                        const pcm = event.data;
                        audioBuffer.push(pcm);
                    };
                    workletNode.onprocessorerror = (err) => console.error('AudioWorklet 錯誤:', err);
                    source.connect(workletNode);
                    workletNode.connect(audioContext.destination);
                }

                function processAudioForSub(idx) {
                    if (isProcessing) return;
                    isProcessing = true;
                    const totalLength = audioBuffer.reduce((sum, arr) => sum + arr.length, 0);
                    if (totalLength === 0) {
                        const statusSpan = document.querySelectorAll('.sq-status')[idx];
                        if (statusSpan) statusSpan.textContent = '⚠️ 無聲音';
                        isProcessing = false;
                        updateButtons();
                        return;
                    }
                    const merged = new Int16Array(totalLength);
                    let offset = 0;
                    for (const arr of audioBuffer) { merged.set(arr, offset);
                        offset += arr.length; }
                    const bytes = new Uint8Array(merged.buffer);
                    let binary = '';
                    for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
                    const audioBase64 = btoa(binary);

                    fetch('/api/getIatUrl')
                        .then(res => res.json())
                        .then(data => {
                            const wsUrl = data.url;
                            return recognizeWithIat(audioBase64, wsUrl);
                        })
                        .then(transcriptText => {
                            subAnswers[idx] = transcriptText;
                            subAnswered[idx] = true;
                            currentRecordingIdx = null;
                            const statusSpan = document.querySelectorAll('.sq-status')[idx];
                            if (statusSpan) {
                                statusSpan.textContent = t('alreadyAnswered');
                                statusSpan.className = 'sq-status done';
                            }
                            const transcriptEl = transcripts[idx];
                            if (transcriptEl) {
                                transcriptEl.textContent = forceToTraditional(transcriptText);
                            }
                            const recordBtn = recordBtns[idx];
                            const stopBtn = stopBtns[idx];
                            if (recordBtn) recordBtn.style.display = 'inline-block';
                            if (stopBtn) stopBtn.style.display = 'none';
                            updateButtons();
                        })
                        .catch(err => {
                            console.error('子題目識別失敗:', err);
                            const statusSpan = document.querySelectorAll('.sq-status')[idx];
                            if (statusSpan) statusSpan.textContent = '❌ 錯誤';
                        })
                        .finally(() => {
                            isProcessing = false;
                            updateButtons();
                        });
                }

                if (submitBtn) {
                    submitBtn.onclick = function() {
                        if (this.disabled) return;
                        subLocked = true;
                        updateButtons();
                        progressContainer.classList.remove('hidden');
                        progressBar.style.width = '10%';
                        progressText.textContent = t('progress');

                        let fullAnswer = '';
                        subs.forEach((sq, idx) => {
                            fullAnswer += `問題${idx+1}：${sq.question}\n回答：${subAnswers[idx] || ''}\n`;
                        });
                        const hasChinese = /[\u4e00-\u9fa5]/.test(fullAnswer);
                        if (!hasChinese) {
                            const grade = {
                                total_score: 0,
                                suggestion: t('englishDetected'),
                                sub_scores: subs.map(() => ({ accuracy: 0, fluency: 0, integrity: 0,
                                    comment: '未使用普通話作答' }))
                            };
                            displayFixedScore(grade);
                            progressContainer.classList.add('hidden');
                            subLocked = false;
                            updateButtons();
                            return;
                        }

                        const questionInfo = {
                            type: q.type,
                            refAnswer: q.refAnswer || '',
                            keywords: q.keywords || [],
                            subQuestions: q.subQuestions || []
                        };
                        fetch(BACKEND_URL, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({
                                    question: questionInfo,
                                    textAnswer: fullAnswer
                                })
                            })
                            .then(res => res.json())
                            .then(data => {
                                progressBar.style.width = '80%';
                                if (data.score) {
                                    displayFixedScore(data.score);
                                } else {
                                    throw new Error('評分結果缺失');
                                }
                                progressContainer.classList.add('hidden');
                                subLocked = false;
                                updateButtons();
                            })
                            .catch(err => {
                                console.error('評分錯誤:', err);
                                progressContainer.classList.add('hidden');
                                subLocked = false;
                                updateButtons();
                            });
                    };
                }

                function displayFixedScore(grade) {
                    const resultDiv = document.getElementById('scoreResult');
                    resultDiv.classList.remove('hidden');
                    const factor = 10;
                    document.getElementById('totalScore').textContent = Math.round((grade.total_score || 0) * factor);
                    let avgAcc = 0,
                        avgFlu = 0,
                        avgInt = 0;
                    const subScores = grade.sub_scores || [];
                    if (subScores.length > 0) {
                        let sumAcc = 0,
                            sumFlu = 0,
                            sumInt = 0;
                        subScores.forEach(s => { sumAcc += s.accuracy || 0;
                            sumFlu += s.fluency || 0;
                            sumInt += s.integrity || 0; });
                        avgAcc = sumAcc / subScores.length;
                        avgFlu = sumFlu / subScores.length;
                        avgInt = sumInt / subScores.length;
                    } else {
                        avgAcc = grade.accuracy || 0;
                        avgFlu = grade.fluency || 0;
                        avgInt = grade.integrity || 0;
                    }
                    document.getElementById('accScore').textContent = Math.round(avgAcc * factor);
                    document.getElementById('fluencyScore').textContent = Math.round(avgFlu * factor);
                    document.getElementById('integrityScore').textContent = Math.round(avgInt * factor);
                    document.getElementById('suggestionText').innerHTML =
                        `<strong>💡 ${t('suggestion')}：</strong>${forceToTraditional(grade.suggestion || '')}`;
                    document.getElementById('scoreSource').textContent = t('source') + '：訊飛星火 4.0Ultra (經後端代理)';
                    document.querySelectorAll('#scoreResult .num').forEach(el => {
                        const val = parseFloat(el.textContent);
                        el.className = 'num' + (val >= 80 ? ' good' : val >= 60 ? ' mid' : ' poor');
                    });
                    let fbHtml = '';
                    (q.subQuestions || []).forEach((sq, idx) => {
                        const s = subScores[idx] || { accuracy: 0, fluency: 0, integrity: 0, comment: '' };
                        fbHtml += `
                            <div class="fb-item">
                                <strong>${idx+1}.</strong> ${forceToTraditional(sq.question)}<br>
                                內容:${Math.round(s.accuracy*factor)} 豐富:${Math.round(s.fluency*factor)} 語音:${Math.round(s.integrity*factor)}
                                <br>💬 ${forceToTraditional(s.comment || '')}
                            </div>
                        `;
                    });
                    document.getElementById('subFeedback').innerHTML = fbHtml;
                }

                updateButtons();
            }

            // ================================================================
            // 19. 初始化
            // ================================================================
            initConverter();
            startListeningQuestions();
            render();
            console.log('✅ Firebase 即時同步啟動，後端代理:', BACKEND_URL);
        })();
    </script>
</body>
</html>
