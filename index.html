<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>普通話語音評測 · 音頻直連訊飛版</title>

    <!-- Firebase SDK (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js">
    </script>

    <!-- OpenCC 簡繁轉換 -->
    <script src="https://cdn.jsdelivr.net/npm/opencc-js@1.3.1/dist/umd/full.min.js">
    </script>

    <!-- pinyin-pro 純 CDN -->
    <script src="https://unpkg.com/pinyin-pro">
    </script>

    <!-- html2canvas 用於截圖 -->
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js">

    <style>
        /* 全域樣式 – 完整保留，與原先完全一致 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', 'PingFang HK', 'Microsoft YaHei', sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px;
            color: #1e2a3a;
        }
        #app {
            width: 100%;
            max-width: 1200px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            padding-bottom: 10px;
            border-bottom: 2px solid #dce1e8;
        }
        .top-bar h1 {
            font-size: 26px;
            font-weight: 700;
            color: #0b1e2e;
        }
        .top-bar .lang-switch {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .top-bar .lang-switch button {
            padding: 5px 14px;
            border: 1px solid #cbd5e1;
            background: #fff;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: 0.2s;
        }
        .top-bar .lang-switch button.active {
            background: #3b82f6;
            color: #fff;
            border-color: #3b82f6;
        }
        .top-bar .lang-switch button:hover:not(.active) {
            background: #eef2f6;
        }
        .view-tabs {
            display: flex;
            gap: 4px;
            background: #e9edf2;
            border-radius: 30px;
            padding: 4px;
        }
        .view-tabs button {
            padding: 7px 20px;
            border: none;
            border-radius: 30px;
            background: transparent;
            font-size: 15px;
            font-weight: 600;
            color: #4b5a6a;
            cursor: pointer;
            transition: 0.2s;
        }
        .view-tabs button.active {
            background: #fff;
            color: #0b1e2e;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }
        .main-content {
            flex: 1;
            background: #fff;
            border-radius: 20px;
            padding: 20px 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
            min-height: 450px;
            position: relative;
        }
        .form-group {
            margin-bottom: 14px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 4px;
            font-size: 14px;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 9px 12px;
            border: 1px solid #dce1e8;
            border-radius: 10px;
            font-size: 15px;
            font-family: inherit;
            background: #fafcff;
            transition: 0.2s;
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }
        .form-group textarea {
            resize: vertical;
            min-height: 50px;
        }
        .btn {
            padding: 8px 20px;
            border: none;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-primary {
            background: #3b82f6;
            color: #fff;
        }
        .btn-primary:hover {
            background: #2563eb;
        }
        .btn-success {
            background: #22c55e;
            color: #fff;
        }
        .btn-success:hover {
            background: #16a34a;
        }
        .btn-danger {
            background: #ef4444;
            color: #fff;
        }
        .btn-danger:hover {
            background: #dc2626;
        }
        .btn-outline {
            background: transparent;
            border: 1.5px solid #cbd5e1;
        }
        .btn-outline:hover {
            background: #f1f5f9;
        }
        .btn-sm {
            padding: 4px 12px;
            font-size: 12px;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .teacher-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        @media (max-width:800px) {
            .teacher-grid {
                grid-template-columns: 1fr;
            }
        }
        .question-list {
            border-right: 1px solid #e9edf2;
            padding-right: 20px;
        }
        .question-list .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 10px;
            border-bottom: 1px solid #f0f2f5;
            cursor: pointer;
            transition: 0.1s;
        }
        .question-list .list-item:hover {
            background: #f8fafc;
        }
        .question-list .list-item.selected {
            background: #eef4ff;
            border-left: 4px solid #3b82f6;
        }
        .question-list .list-item .info {
            flex: 1;
        }
        .question-list .list-item .info .title {
            font-weight: 600;
        }
        .question-list .list-item .info .meta {
            font-size: 12px;
            color: #6b7a8a;
        }
        .question-list .list-item .actions {
            display: flex;
            gap: 4px;
        }
        .editor-panel {
            padding-left: 8px;
        }
        .sub-question {
            background: #f8fafc;
            border-radius: 12px;
            padding: 10px 14px;
            margin-bottom: 8px;
            border: 1px solid #e9edf2;
            cursor: grab;
            transition: background 0.2s;
        }
        .sub-question:active {
            cursor: grabbing;
        }
        .sub-question.drag-over {
            border-color: #3b82f6;
            background: #eef4ff;
        }
        .sub-question .row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .sub-question .row>* {
            flex: 1;
            min-width: 100px;
        }
        .student-selector {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 16px;
            align-items: flex-end;
        }
        .student-selector .form-group {
            margin-bottom: 0;
            flex: 1;
            min-width: 120px;
        }
        .question-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 14px;
        }
        .question-card {
            background: #f8fafc;
            border-radius: 14px;
            padding: 14px;
            border: 1px solid #e9edf2;
            cursor: pointer;
            transition: 0.2s;
        }
        .question-card:hover {
            background: #eef4ff;
            border-color: #3b82f6;
        }
        .question-card .qtitle {
            font-weight: 600;
            font-size: 15px;
        }
        .question-card img {
            max-width: 100%;
            max-height: 100px;
            border-radius: 6px;
            margin-top: 6px;
        }
        .answer-area {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .answer-area .question-image {
            max-width: 100%;
            max-height: 250px;
            border-radius: 12px;
            object-fit: contain;
            background: #f0f2f5;
        }
        .answer-area .question-text {
            font-size: 18px;
            font-weight: 600;
        }
        .answer-area .sub-questions {
            background: #f8fafc;
            border-radius: 12px;
            padding: 14px;
            border: 1px solid #e9edf2;
        }
        .answer-area .sub-questions .sq-item {
            padding: 6px 0;
            border-bottom: 1px solid #e9edf2;
            display: flex;
            flex-direction: column;
        }
        .answer-area .sub-questions .sq-item:last-child {
            border-bottom: none;
        }
        .answer-area .sub-questions .sq-item .sq-label {
            font-weight: 500;
            text-align: left;
            flex: 1 1 240px;
            min-width: 180px;
        }
        .answer-area .sub-questions .sq-item .sq-status {
            font-size: 13px;
            color: #6b7a8a;
        }
        .answer-area .sub-questions .sq-item .sq-status.done {
            color: #22c55e;
            font-weight: 600;
        }
        .answer-area .sub-questions .sq-item .sq-status.waiting {
            color: #eab308;
            font-weight: 600;
        }
        .answer-area .keywords {
            background: #f0f7ff;
            padding: 10px 14px;
            border-radius: 10px;
            border-left: 4px solid #3b82f6;
            font-size: 14px;
        }
        .answer-area .transcript-box {
            background: #fff;
            border: 1px solid #dce1e8;
            border-radius: 12px;
            padding: 12px 16px;
            min-height: 60px;
            font-size: 16px;
            line-height: 1.7;
        }
        .answer-area .record-controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        .answer-area .record-controls .status-dot {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #94a3b8;
            transition: 0.2s;
        }
        .answer-area .record-controls .status-dot.recording {
            background: #ef4444;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.2);
            }
        }
        .answer-area .record-controls .timer {
            font-size: 18px;
            font-weight: 600;
            color: #0b1e2e;
            min-width: 50px;
        }
        .result-box {
            background: #f8fafc;
            border-radius: 16px;
            padding: 16px 20px;
            border: 1px solid #e2e8f0;
            margin-top: 12px;
        }
        .result-box .score-row {
            display: flex;
            flex-wrap: wrap;
            gap: 14px 24px;
            margin-bottom: 6px;
        }
        .result-box .score-item {
            display: flex;
            align-items: baseline;
            gap: 4px;
        }
        .result-box .score-item .num {
            font-size: 24px;
            font-weight: 700;
        }
        .result-box .score-item .num.good {
            color: #22c55e;
        }
        .result-box .score-item .num.mid {
            color: #eab308;
        }
        .result-box .score-item .num.poor {
            color: #ef4444;
        }
        .result-box .suggestion {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #e2e8f0;
        }
        .result-box .sub-feedback {
            margin-top: 8px;
            font-size: 14px;
        }
        .result-box .sub-feedback .fb-item {
            padding: 4px 0;
            border-bottom: 1px solid #f0f2f5;
        }
        .progress-container {
            width: 100%;
            margin: 10px 0 4px 0;
        }
        .progress-bar-bg {
            width: 100%;
            height: 8px;
            background: #e9edf2;
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: #3b82f6;
            border-radius: 10px;
            transition: width 0.3s;
        }
        .progress-text {
            font-size: 14px;
            color: #4b5a6a;
            margin-top: 4px;
            text-align: center;
        }
        .hidden {
            display: none !important;
        }
        .status-bar {
            padding: 6px 12px;
            background: #f0f2f5;
            border-radius: 10px;
            font-size: 13px;
            color: #4b5a6a;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .status-bar .label {
            font-weight: 600;
        }
        @media (max-width:600px) {
            body {
                padding: 8px;
            }
            .main-content {
                padding: 14px;
            }
            .top-bar h1 {
                font-size: 20px;
            }
            .view-tabs button {
                padding: 5px 12px;
                font-size: 13px;
            }
            .teacher-grid {
                grid-template-columns: 1fr;
            }
            .question-list {
                border-right: none;
                padding-right: 0;
            }
            .editor-panel {
                padding-left: 0;
            }
            .answer-area .sub-questions .sq-item .sq-label {
                flex: 0 0 auto;
                min-width: auto;
            }
        }
        .readonly-field {
            background: #f0f2f5;
            padding: 9px 12px;
            border-radius: 10px;
            border: 1px solid #dce1e8;
            font-size: 15px;
            color: #1e2a3a;
        }
        .image-preview-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 6px;
        }
        .image-preview-container img {
            max-height: 80px;
            border-radius: 6px;
        }
        .image-preview-container .btn-remove-image {
            padding: 2px 10px;
            font-size: 12px;
            background: #ef4444;
            color: #fff;
            border: none;
            border-radius: 20px;
            cursor: pointer;
        }
        .image-preview-container .btn-remove-image:hover {
            background: #dc2626;
        }
        .empty-editor {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            min-height: 300px;
            color: #8a9aa8;
            font-size: 16px;
            text-align: center;
        }
        .empty-editor .icon {
            font-size: 48px;
            margin-bottom: 12px;
        }
        .kw-table {
            border-collapse: collapse;
            border: none;
            margin: 0;
            table-layout: auto;
            width: auto;
        }
        .kw-table td {
            border: none;
            padding: 2px 6px;
            text-align: center;
            vertical-align: middle;
            white-space: nowrap;
        }
        .kw-table td .pinyin {
            font-size: 12px;
            color: #3b82f6;
            letter-spacing: 0.5px;
        }
        .kw-table td .word {
            font-size: 16px;
            font-weight: 500;
        }
        .sq-keywords-display .kw-table td .pinyin {
            font-size: 11px;
            letter-spacing: 0.3px;
        }
        .sq-keywords-display .kw-table td .word {
            font-size: 14px;
        }
        .view-only .kw-table td .pinyin {
            font-size: 12px;
        }
        .view-only .kw-table td .word {
            font-size: 15px;
        }
        .kw-wrapper {
            text-align: left;
        }
        .drag-handle {
            cursor: grab;
            color: #94a3b8;
            font-size: 18px;
            padding: 0 4px;
            user-select: none;
        }
        .drag-handle:active {
            cursor: grabbing;
        }
        .sq-item-row {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px 16px;
            width: 100%;
            justify-content: space-between;
        }
        .sq-item-row .sq-label {
            flex: 1 1 240px;
            text-align: left;
            font-weight: 500;
        }
        .sq-item-row .sq-keywords-middle {
            flex: 2 1 300px;
            text-align: left;
            min-width: 200px;
        }
        .sq-item-row .sq-keywords-middle .kw-label {
            font-weight: 500;
            margin-right: 6px;
            color: #1e2a3a;
        }
        .sq-item-row .sq-keywords-middle .kw-table {
            display: inline-table;
        }
        .sq-item-row .sq-actions {
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .sq-transcript {
            width: 100%;
            margin-top: 4px;
            font-size: 14px;
            color: #4b5a6a;
            min-height: 20px;
        }
        @media (orientation: portrait),
        (max-width: 600px) {
            .sq-item-row {
                flex-direction: column;
                align-items: stretch;
                gap: 6px;
            }
            .sq-item-row .sq-label {
                flex: 0 0 auto;
                text-align: left;
            }
            .sq-item-row .sq-keywords-middle {
                flex: 0 0 auto;
                text-align: left;
                min-width: auto;
            }
            .sq-item-row .sq-actions {
                justify-content: flex-start;
            }
        }
        .readonly-value {
            padding: 6px 8px;
            background: #f0f2f5;
            border-radius: 6px;
            font-size: 15px;
            color: #1e2a3a;
        }
        .sub-question-view {
            padding: 6px 8px;
            margin-bottom: 6px;
            border-bottom: 1px solid #eef2f6;
        }
        .sub-question-view .sq-q {
            font-weight: 500;
        }
        .sub-question-view .sq-a {
            color: #4b5a6a;
            font-size: 14px;
        }
        .sub-question-view .kw-wrapper {
            margin-top: 2px;
        }
        #downloadScreenshotBtn {
            margin-top: 12px;
        }
        /* 教師密碼鎖定覆蓋層 */
        .teacher-lock-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255,255,255,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 20px;
            z-index: 10;
            border-radius: 20px;
        }
        .teacher-lock-overlay input {
            padding: 10px 16px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 8px;
            width: 240px;
        }
        .teacher-lock-overlay .error {
            color: #ef4444;
            font-size: 14px;
        }
    </style>
</head>

        <div class="main-content" id="mainContent"></div>

            function getCurrentSemesterList() { return LANG[currentLang].semesterList; }
            // 中文基準列表（用於 value）
            const ZH_GRADE_LIST = LANG.zh.gradeList;
            const ZH_SEMESTER_LIST = LANG.zh.semesterList;

            // 輔助函數：將中文年級/學期轉換為當前語言顯示
            function getGradeDisplay(grade) {
                const idx = ZH_GRADE_LIST.indexOf(grade);
                if (idx !== -1) return getCurrentGradeList()[idx];
                return grade;
            }
            function getSemesterDisplay(semester) {
                const idx = ZH_SEMESTER_LIST.indexOf(semester);
                if (idx !== -1) return getCurrentSemesterList()[idx];
                return semester;
            }

            // ================================================================
            // 4. 簡繁轉換（用於語音轉寫內容及系統提示）
            // ================================================================
            let cnToHkConverter = null;
            let hkToCnConverter = null;

            function initConverter() {
                if (typeof OpenCC !== 'undefined') {
                    try {
                        cnToHkConverter = OpenCC.Converter({ from: 'cn', to: 'hk' });
                        hkToCnConverter = OpenCC.Converter({ from: 'hk', to: 'cn' });
                    } catch (e) {
                        cnToHkConverter = null;
                        hkToCnConverter = null;
                    }
                }
            }

            function toTraditional(text) {
                if (!text) return text;
                if (cnToHkConverter) {
                    try { return cnToHkConverter(text); } catch (e) { return text; }
                }
                return text;
            }

            function toSimplified(text) {
                if (!text) return text;
                if (hkToCnConverter) {
                    try { return hkToCnConverter(text); } catch (e) { return text; }
                }
                return text;
            }

            // ================================================================
            // 5. 分割函數：同時支援英文逗號和中文逗號
            // ================================================================
            function splitKeywords(text) {
                if (!text || typeof text !== 'string') return [];
                return text.split(/[,，]/).map(s => s.trim()).filter(s => s.length > 0);
            }

            // ================================================================
            // 6. 拼音工具（pinyin-pro），修改：將聲調5改為0（輕聲）
            // ================================================================
            function generatePinyinNum(text) {
                if (!text || typeof text !== 'string') return '';
                if (typeof window.pinyinPro === 'undefined') {
                    console.warn('pinyin-pro 未加載');
                    return '';
                }
                try {
                    const p = window.pinyinPro.pinyin;
                    const parts = splitKeywords(text);
                    const result = parts.map(word => {
                        const simplified = toSimplified(word);
                        if (!simplified) return '';
                        let py = p(simplified, {
                            toneType: 'num',
                            v: true,
                            mode: 'normal'
                        });
                        // 將聲調5（輕聲）替換為0
                        if (py) {
                            py = py.replace(/\b5\b/g, '0');
                        }
                        return py || '';
                    });
                    return result.join(', ');
                } catch (e) {
                    console.warn('生成拼音失敗:', e);
                    return '';
                }
            }

            // 将数字声调拼音转为带声调符号的字符串（用于显示），处理声调0（轻声）
            function pinyinNumToHtml(numPinyin) {
                if (!numPinyin) return '';
                const words = numPinyin.split(',').map(s => s.trim()).filter(s => s.length > 0);
                const result = words.map(word => {
                    const syllables = word.split(/\s+/).filter(s => s.length > 0);
                    const converted = syllables.map(syl => {
                        const match = syl.match(/^([a-zü]+)(\d)$/);
                        if (!match) return syl;
                        let base = match[1];
                        const tone = parseInt(match[2], 10);
                        // 輕聲（0）直接返回 base
                        if (tone === 0) return base;
                        // 主元音選擇規則：a > o > e > (iu -> u, ui -> i) > u > i > ü
                        let mainVowel = '';
                        let idx = -1;
                        if (base.includes('a')) {
                            mainVowel = 'a';
                            idx = base.lastIndexOf('a');
                        } else if (base.includes('o')) {
                            mainVowel = 'o';
                            idx = base.lastIndexOf('o');
                        } else if (base.includes('e')) {
                            mainVowel = 'e';
                            idx = base.lastIndexOf('e');
                        } else {
                            // 檢查 i 和 u 的同時出現順序
                            const iPos = base.indexOf('i');
                            const uPos = base.indexOf('u');
                            if (iPos !== -1 && uPos !== -1) {
                                // 同時有 i 和 u
                                if (iPos < uPos) {
                                    // i 在前 => iu，標在 u 上
                                    mainVowel = 'u';
                                    idx = uPos;
                                } else {
                                    // u 在前 => ui，標在 i 上
                                    mainVowel = 'i';
                                    idx = iPos;
                                }
                            } else if (base.includes('u')) {
                                mainVowel = 'u';
                                idx = base.lastIndexOf('u');
                            } else if (base.includes('i')) {
                                mainVowel = 'i';
                                idx = base.lastIndexOf('i');
                            } else if (base.includes('ü')) {
                                mainVowel = 'ü';
                                idx = base.lastIndexOf('ü');
                            }
                        }
                        if (mainVowel === '' || idx === -1) return syl;
                        const vowelMap = {
                            'a': ['ā', 'á', 'ǎ', 'à', 'a'],
                            'o': ['ō', 'ó', 'ǒ', 'ò', 'o'],
                            'e': ['ē', 'é', 'ě', 'è', 'e'],
                            'i': ['ī', 'í', 'ǐ', 'ì', 'i'],
                            'u': ['ū', 'ú', 'ǔ', 'ù', 'u'],
                            'ü': ['ǖ', 'ǘ', 'ǚ', 'ǜ', 'ü']
                        };
                        const symbol = vowelMap[mainVowel][tone - 1];
                        return base.substring(0, idx) + symbol + base.substring(idx + 1);
                    });
                    return converted.join(' ');
                });
                return result.join(' ');
            }

            // ================================================================
            // 7. 生成關鍵詞表格 HTML（嚴格兩行，每列一個詞，無逗號）
            // ================================================================
            function renderKeywordTable(keywords, pinyinArr, cellClass) {
                if (!keywords || keywords.length === 0) return '';
                const pinyinDisplay = pinyinArr.map(py => py ? pinyinNumToHtml(py) : '');
                while (pinyinDisplay.length < keywords.length) pinyinDisplay.push('');
                const cellClassStr = cellClass || '';
                let html = '<table class="kw-table">';
                html += '<tr>';
                pinyinDisplay.forEach(py => {
                    html += `<td class="${cellClassStr}"><span class="pinyin">${py}</span></td>`;
                });
                html += '</tr>';
                html += '<tr>';
                keywords.forEach(kw => {
                    html += `<td class="${cellClassStr}"><span class="word">${kw}</span></td>`;
                });
                html += '</tr>';
                html += '</table>';
                return html;
            }

                overlay.innerHTML = `

                const cancelBtn = document.getElementById('teacherPasswordCancel');
                const errorEl = document.getElementById('teacherPasswordError');

                const verify = () => {
                    const pwd = input.value.trim();
                    if (!pwd) return;
                    db.collection('config').doc('teacher').get()
                        .then(doc => {
                            if (doc.exists) {
                                const stored = doc.data().password;
                                if (pwd === stored) {
                                    teacherUnlocked = true;
                                    overlay.remove();
                                    switchView('teacher');
                                } else {
                                    errorEl.style.display = 'block';
                                    input.value = '';

                                }
                            } else {

                                } else {

                                    input.value = '';

                            }

                            } else {
                                errorEl.style.display = 'block';
                                input.value = '';

                            }

                    if (qInput) {

                            keywords: kw,

            // ================================================================
            // 14. 年級學期同步
            // ================================================================
            function bindGradeSemesterSync() {
                const editGrade = document.getElementById('editGrade');
                const editSemester = document.getElementById('editSemester');
                const filterGrade = document.getElementById('filterGrade');
                const filterSemester = document.getElementById('filterSemester');

                if (editGrade && filterGrade) {
                    editGrade.removeEventListener('change', window._gradeSyncHandler);
                    const handler = function() {
                        const val = this.value;
                        if (filterGrade) filterGrade.value = val;
                        const q = questions.find(q => q.id === editingQuestionId);
                        if (q && isEditingMode) {
                            q.grade = val;
                        }
                        teacherFilterGrade = val;
                        const container = document.getElementById('questionListContainer');
                        if (container) container.innerHTML = renderQuestionList();
                        highlightSelected();
                    };
                    editGrade.addEventListener('change', handler);
                    window._gradeSyncHandler = handler;
                }

                if (editSemester && filterSemester) {
                    editSemester.removeEventListener('change', window._semesterSyncHandler);
                    const handler = function() {
                        const val = this.value;
                        if (filterSemester) filterSemester.value = val;
                        const q = questions.find(q => q.id === editingQuestionId);
                        if (q && isEditingMode) {
                            q.semester = val;
                        }
                        teacherFilterSemester = val;
                        const container = document.getElementById('questionListContainer');
                        if (container) container.innerHTML = renderQuestionList();
                        highlightSelected();
                    };
                    editSemester.addEventListener('change', handler);
                    window._semesterSyncHandler = handler;
                }

                if (filterGrade) {
                    filterGrade.removeEventListener('change', window._filterGradeSyncHandler);
                    const handler = function() {
                        const val = this.value;
                        teacherFilterGrade = val;
                        if (editGrade) editGrade.value = val;
                        const q = questions.find(q => q.id === editingQuestionId);
                        if (q && isEditingMode) {
                            q.grade = val;
                        }
                        const container = document.getElementById('questionListContainer');
                        if (container) container.innerHTML = renderQuestionList();
                        highlightSelected();
                    };
                    filterGrade.addEventListener('change', handler);
                    window._filterGradeSyncHandler = handler;
                }

                if (filterSemester) {
                    filterSemester.removeEventListener('change', window._filterSemesterSyncHandler);
                    const handler = function() {
                        const val = this.value;
                        teacherFilterSemester = val;
                        if (editSemester) editSemester.value = val;
                        const q = questions.find(q => q.id === editingQuestionId);
                        if (q && isEditingMode) {
                            q.semester = val;
                        }
                        const container = document.getElementById('questionListContainer');
                        if (container) container.innerHTML = renderQuestionList();
                        highlightSelected();
                    };
                    filterSemester.addEventListener('change', handler);
                    window._filterSemesterSyncHandler = handler;
                }
            }

            function highlightSelected() {
                document.querySelectorAll('.list-item').forEach(el => {
                    el.classList.remove('selected');
                    if (el.dataset.id === editingQuestionId) {

                    }
                });

            // ================================================================
            // 15. 拖拽排序
            // ================================================================
            function bindDragDropEvents() {
                const subQuestions = document.querySelectorAll('.sub-question');
                let dragSrcIndex = null;

                subQuestions.forEach(el => {
                    el.addEventListener('dragstart', function(e) {
                        dragSrcIndex = parseInt(this.dataset.index, 10);
                        e.dataTransfer.effectAllowed = 'move';
                        this.classList.add('dragging');
                    });
                    el.addEventListener('dragend', function(e) {
                        this.classList.remove('dragging');
                        document.querySelectorAll('.sub-question').forEach(el => el.classList.remove('drag-over'));
                    });
                    el.addEventListener('dragover', function(e) {
                        e.preventDefault();
                        e.dataTransfer.dropEffect = 'move';
                        this.classList.add('drag-over');
                    });
                    el.addEventListener('dragleave', function(e) {
                        this.classList.remove('drag-over');
                    });
                    el.addEventListener('drop', function(e) {
                        e.preventDefault();
                        this.classList.remove('drag-over');
                        const targetIndex = parseInt(this.dataset.index, 10);
                        if (dragSrcIndex !== null && dragSrcIndex !== targetIndex) {
                            const q = questions.find(q => q.id === editingQuestionId);
                            if (q && q.subQuestions) {
                                const subQs = q.subQuestions;
                                const [removed] = subQs.splice(dragSrcIndex, 1);
                                subQs.splice(targetIndex, 0, removed);
                                render();
                            }
                        }
                        dragSrcIndex = null;
                    });
                });
            }

            // ================================================================
            // 16. 教師操作（Firestore）
            // ================================================================
            window.startNewQuestion = function() {
                const filterGrade = document.getElementById('filterGrade')?.value || '一年級';
                const filterSemester = document.getElementById('filterSemester')?.value || '上學期';
                const newId = db.collection('questions').doc().id;
                const newQ = {
                    grade: filterGrade,
                    semester: filterSemester,
                    title: '新題目',
                    type: 'open',
                    refAnswer: '',
                    keywords: [],
                    pinyin: [],
                    image: '',
                    subQuestions: [],
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                };
                db.collection('questions').doc(newId).set(newQ)
                    .then(() => {
                        editingQuestionId = newId;
                        isEditingMode = true;
                        isNewQuestion = true;
                        const q = questions.find(q => q.id === newId);
                        if (q) originalQuestionData = deepClone(q);
                        const fg = document.getElementById('filterGrade');
                        const fs = document.getElementById('filterSemester');
                        if (fg) fg.value = filterGrade;
                        if (fs) fs.value = filterSemester;
                        teacherFilterGrade = filterGrade;
                        teacherFilterSemester = filterSemester;
                        render();
                    })
                    .catch(err => console.error('新增題目失敗:', err));
            };

            window.selectQuestion = function(id) {
                // 放棄當前編輯（如有未保存修改）
                if (isEditingMode) {
                    if (isNewQuestion && editingQuestionId) {
                        // 刪除新建未保存的題目
                        db.collection('questions').doc(editingQuestionId).delete().catch(() => {});
                        const index = questions.findIndex(q => q.id === editingQuestionId);
                        if (index !== -1) questions.splice(index, 1);
                        isNewQuestion = false;
                        originalQuestionData = null;
                        editingQuestionId = null;
                        isEditingMode = false;
                    } else if (originalQuestionData) {
                        // 還原已有題目的修改
                        const q = questions.find(q => q.id === editingQuestionId);
                        if (q) Object.assign(q, originalQuestionData);
                        originalQuestionData = null;
                        isEditingMode = false;
                        isNewQuestion = false;
                    } else {
                        // 其他情況強制退出編輯
                        isEditingMode = false;
                        isNewQuestion = false;
                        originalQuestionData = null;
                    }
                }

                // 切換到目標題目
                editingQuestionId = id;
                isEditingMode = false; // 確保是查看模式
                isNewQuestion = false;
                const q = questions.find(q => q.id === id);
                if (q) {
                    const fg = document.getElementById('filterGrade');
                    const fs = document.getElementById('filterSemester');
                    if (fg) fg.value = q.grade || '';
                    if (fs) fs.value = q.semester || '';
                    teacherFilterGrade = q.grade || '';
                    teacherFilterSemester = q.semester || '';
                }
                render();
            };

            window.editQuestion = function(id) {
                isEditingMode = true;
                isNewQuestion = false;
                editingQuestionId = id;
                const q = questions.find(q => q.id === id);
                if (q) {
                    originalQuestionData = deepClone(q);
                    const fg = document.getElementById('filterGrade');
                    const fs = document.getElementById('filterSemester');
                    if (fg) fg.value = q.grade || '';
                    if (fs) fs.value = q.semester || '';
                    teacherFilterGrade = q.grade || '';
                    teacherFilterSemester = q.semester || '';
                }
                render();
            };

            window.deleteQuestion = function(id) {
                if (!confirm('確定刪除該題目？')) return;
                db.collection('questions').doc(id).delete()
                    .then(() => {
                        if (editingQuestionId === id) {
                            editingQuestionId = null;
                            isEditingMode = false;
                            isNewQuestion = false;
                            originalQuestionData = null;
                        }
                        alert(t('deleteSuccess'));

                    .catch(err => console.error('刪除失敗:', err));

            window.applyFilter = function() {
                const grade = document.getElementById('filterGrade')?.value || '';
                const sem = document.getElementById('filterSemester')?.value || '';
                teacherFilterGrade = grade;
                teacherFilterSemester = sem;
                const eg = document.getElementById('editGrade');
                const es = document.getElementById('editSemester');
                if (eg) eg.value = grade;
                if (es) es.value = sem;
                const q = questions.find(q => q.id === editingQuestionId);
                if (q && isEditingMode) {
                    q.grade = grade || q.grade;
                    q.semester = sem || q.semester;

            window.toggleQuestionType = function() {
                const q = questions.find(q => q.id === editingQuestionId);
                if (!q) return;
                saveCurrentEditorFields(q);
                const currentType = document.getElementById('editType').value;
                if (currentType === 'open') {
                    q.refAnswer = document.getElementById('editRefAnswer')?.value || '';
                    const keywordsStr = document.getElementById('editKeywords')?.value || '';
                    const pinyinStr = document.getElementById('editPinyin')?.value || '';
                    q.keywords = splitKeywords(keywordsStr);
                    q.pinyin = splitKeywords(pinyinStr);
                } else {
                    saveCurrentSubQuestions(q);
                }
                const newType = document.getElementById('editType').value;
                q.type = newType;
                if (newType === 'open') {
                    q.subQuestions = [];
                    if (!q.refAnswer) q.refAnswer = '';
                } else {
                    q.refAnswer = '';
                    if (!q.subQuestions || q.subQuestions.length === 0) {
                        q.subQuestions = [{ question: '', answer: '', keywords: [], pinyin: [] }];
                    }
                }
                render();
            };

            window.addSubQuestion = function() {
                const q = questions.find(q => q.id === editingQuestionId);
                if (!q) return;
                if (!q.subQuestions) q.subQuestions = [];
                saveCurrentSubQuestions(q);
                q.subQuestions.push({ question: '', answer: '', keywords: [], pinyin: [] });
                render();
            };

            window.removeSubQuestion = function(btn) {
                const div = btn.closest('.sub-question');
                const idx = parseInt(div.dataset.index, 10);
                if (isNaN(idx)) return;
                const q = questions.find(q => q.id === editingQuestionId);
                if (q && q.subQuestions && q.subQuestions.length > idx) {
                    saveCurrentSubQuestions(q);
                    q.subQuestions.splice(idx, 1);
                    render();
                }
            };

            window.handleImageUpload = function(e) {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = function(ev) {
                    const q = questions.find(q => q.id === editingQuestionId);
                    if (q) {
                        q.image = ev.target.result;
                        const container = document.getElementById('imagePreviewContainer');
                        container.innerHTML =
                            `<img src="${ev.target.result}" /><button class="btn-remove-image" onclick="window.removeImage()">移除圖片</button>`;
                        document.getElementById('editImageData').value = ev.target.result;
                    }
                };
                reader.readAsDataURL(file);
            };

            window.removeImage = function() {
                const q = questions.find(q => q.id === editingQuestionId);
                if (q) {
                    q.image = '';
                    document.getElementById('editImageData').value = '';
                    const container = document.getElementById('imagePreviewContainer');
                    container.innerHTML = '';
                }
            };

            window.saveQuestion = function() {
                const q = questions.find(q => q.id === editingQuestionId);
                if (!q) return;
                saveCurrentEditorFields(q);
                const type = document.getElementById('editType').value;
                const title = document.getElementById('editTitle').value;
                const imageData = document.getElementById('editImageData')?.value || '';
                q.title = title;
                q.image = imageData;
                q.type = type;
                let updateData = {
                    grade: q.grade,
                    semester: q.semester,
                    title: title,
                    type: type,
                    image: imageData,
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                };
                if (type === 'open') {
                    const refAnswer = document.getElementById('editRefAnswer').value || '';
                    const keywordsStr = document.getElementById('editKeywords').value || '';
                    const pinyinStr = document.getElementById('editPinyin').value || '';
                    const keywords = splitKeywords(keywordsStr);
                    const pinyin = splitKeywords(pinyinStr);
                    const maxLen = Math.max(keywords.length, pinyin.length);
                    while (keywords.length < maxLen) keywords.push('');
                    while (pinyin.length < maxLen) pinyin.push('');
                    updateData.refAnswer = refAnswer;
                    updateData.keywords = keywords;
                    updateData.pinyin = pinyin;
                    updateData.subQuestions = [];
                    q.refAnswer = refAnswer;
                    q.keywords = keywords;
                    q.pinyin = pinyin;
                    q.subQuestions = [];
                } else {
                    saveCurrentSubQuestions(q);
                    updateData.refAnswer = '';
                    updateData.keywords = [];
                    updateData.pinyin = [];
                    updateData.subQuestions = q.subQuestions || [];
                }
                db.collection('questions').doc(editingQuestionId).update(updateData)
                    .then(() => {
                        alert(t('saveSuccess'));
                        isNewQuestion = false;
                        originalQuestionData = null;
                        isEditingMode = false;
                        render();
                    })
                    .catch(err => {
                        console.error('更新失敗:', err);
                        alert('儲存失敗：' + (err.message || '請檢查網路或圖片大小，並重試。'));
                    });
            };

            window.cancelEdit = function() {
                if (isNewQuestion && editingQuestionId) {
                    if (confirm('取消將刪除未儲存的新題目，確定？')) {
                        db.collection('questions').doc(editingQuestionId).delete()
                            .then(() => {
                                editingQuestionId = null;
                                isNewQuestion = false;
                                isEditingMode = false;
                                originalQuestionData = null;
                                render();
                            })
                            .catch(err => console.error('刪除新題目失敗:', err));
                    }
                } else if (originalQuestionData && editingQuestionId) {
                    const q = questions.find(q => q.id === editingQuestionId);
                    if (q) {
                        Object.assign(q, originalQuestionData);
                        originalQuestionData = null;
                        isEditingMode = false;
                        render();
                    } else {
                        editingQuestionId = null;
                        isEditingMode = false;
                        originalQuestionData = null;
                        render();
                    }
                } else {
                    editingQuestionId = null;
                    isEditingMode = false;
                    originalQuestionData = null;
                    render();
                }
            };

            function renderStudentQuestions(grade, sem) {
                let filtered = questions.filter(q => q.grade === grade && q.semester === sem);
                if (filtered.length === 0) return `<div style="padding:30px; text-align:center; color:#8a9aa8;">${t('noQuestions')}</div>`;
                let html = `<div class="question-grid">`;
                filtered.forEach(q => {
                    html += `
                        <div class="question-card" onclick="window.selectStudentQuestion('${q.id}')">
                            <div class="qtitle">${q.title}</div>
                            ${q.image ? `<img src="${q.image}" />` : ''}
                        </div>
                    `;
                });
                html += `</div>`;
                return html;
            }

            function renderStudentAnswer() {
                const q = questions.find(q => q.id === studentSelectedQuestionId);
                if (!q) { studentSelectedQuestionId = null;

                const isOpen = q.type === 'open';
                let html = `
