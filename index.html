<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>普通話語音評測系統 · 完整修正版</title>
    <script src="https://cdn.jsdelivr.net/npm/opencc-js@1.0.5/dist/opencc.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', 'PingFang HK', 'Microsoft YaHei', sans-serif; background: #f5f7fa; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 16px; color: #1e2a3a; }
        #app { width: 100%; max-width: 1200px; flex: 1; display: flex; flex-direction: column; gap: 14px; }
        .top-bar { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; padding-bottom: 10px; border-bottom: 2px solid #dce1e8; }
        .top-bar h1 { font-size: 26px; font-weight: 700; color: #0b1e2e; }
        .top-bar .lang-switch { display: flex; gap: 8px; align-items: center; }
        .top-bar .lang-switch button { padding: 5px 14px; border: 1px solid #cbd5e1; background: #fff; border-radius: 20px; cursor: pointer; font-size: 13px; font-weight: 600; transition: 0.2s; }
        .top-bar .lang-switch button.active { background: #3b82f6; color: #fff; border-color: #3b82f6; }
        .top-bar .lang-switch button:hover:not(.active) { background: #eef2f6; }
        .view-tabs { display: flex; gap: 4px; background: #e9edf2; border-radius: 30px; padding: 4px; }
        .view-tabs button { padding: 7px 20px; border: none; border-radius: 30px; background: transparent; font-size: 15px; font-weight: 600; color: #4b5a6a; cursor: pointer; transition: 0.2s; }
        .view-tabs button.active { background: #fff; color: #0b1e2e; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .main-content { flex: 1; background: #fff; border-radius: 20px; padding: 20px 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.04); min-height: 450px; }
        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 4px; font-size: 14px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 9px 12px; border: 1px solid #dce1e8; border-radius: 10px; font-size: 15px; font-family: inherit; background: #fafcff; transition: 0.2s; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.15); }
        .form-group textarea { resize: vertical; min-height: 50px; }
        .btn { padding: 8px 20px; border: none; border-radius: 30px; font-size: 14px; font-weight: 600; cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; gap: 6px; }
        .btn-primary { background: #3b82f6; color: #fff; }
        .btn-primary:hover { background: #2563eb; }
        .btn-success { background: #22c55e; color: #fff; }
        .btn-success:hover { background: #16a34a; }
        .btn-danger { background: #ef4444; color: #fff; }
        .btn-danger:hover { background: #dc2626; }
        .btn-outline { background: transparent; border: 1.5px solid #cbd5e1; }
        .btn-outline:hover { background: #f1f5f9; }
        .btn-sm { padding: 4px 12px; font-size: 12px; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .teacher-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width:800px) { .teacher-grid { grid-template-columns: 1fr; } }
        .question-list { border-right: 1px solid #e9edf2; padding-right: 20px; }
        .question-list .list-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 10px; border-bottom: 1px solid #f0f2f5; cursor: pointer; transition: 0.1s; }
        .question-list .list-item:hover { background: #f8fafc; }
        .question-list .list-item.selected { background: #eef4ff; border-left: 4px solid #3b82f6; }
        .question-list .list-item .info { flex: 1; }
        .question-list .list-item .info .title { font-weight: 600; }
        .question-list .list-item .info .meta { font-size: 12px; color: #6b7a8a; }
        .question-list .list-item .actions { display: flex; gap: 4px; }
        .editor-panel { padding-left: 8px; }
        .sub-question { background: #f8fafc; border-radius: 12px; padding: 10px 14px; margin-bottom: 8px; border: 1px solid #e9edf2; }
        .sub-question .row { display: flex; gap: 8px; flex-wrap: wrap; }
        .sub-question .row > * { flex: 1; min-width: 100px; }
        .student-selector { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; align-items: flex-end; }
        .student-selector .form-group { margin-bottom: 0; flex: 1; min-width: 120px; }
        .question-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 14px; }
        .question-card { background: #f8fafc; border-radius: 14px; padding: 14px; border: 1px solid #e9edf2; cursor: pointer; transition: 0.2s; }
        .question-card:hover { background: #eef4ff; border-color: #3b82f6; }
        .question-card .qtitle { font-weight: 600; font-size: 15px; }
        .question-card .qmeta { font-size: 12px; color: #6b7a8a; }
        .question-card img { max-width: 100%; max-height: 100px; border-radius: 6px; margin-top: 6px; }
        .answer-area { display: flex; flex-direction: column; gap: 16px; }
        .answer-area .question-image { max-width: 100%; max-height: 250px; border-radius: 12px; object-fit: contain; background: #f0f2f5; }
        .answer-area .question-text { font-size: 18px; font-weight: 600; }
        .answer-area .sub-questions { background: #f8fafc; border-radius: 12px; padding: 14px; border: 1px solid #e9edf2; }
        .answer-area .sub-questions .sq-item { padding: 6px 0; border-bottom: 1px solid #e9edf2; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .answer-area .sub-questions .sq-item:last-child { border-bottom: none; }
        .answer-area .sub-questions .sq-item .sq-label { font-weight: 500; flex: 1; }
        .answer-area .sub-questions .sq-item .sq-status { font-size: 13px; color: #6b7a8a; }
        .answer-area .sub-questions .sq-item .sq-status.done { color: #22c55e; font-weight: 600; }
        .answer-area .keywords { background: #f0f7ff; padding: 10px 14px; border-radius: 10px; border-left: 4px solid #3b82f6; font-size: 14px; }
        .answer-area .transcript-box { background: #fff; border: 1px solid #dce1e8; border-radius: 12px; padding: 12px 16px; min-height: 60px; font-size: 16px; line-height: 1.7; }
        .answer-area .record-controls { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        .answer-area .record-controls .status-dot { display: inline-block; width: 12px; height: 12px; border-radius: 50%; background: #94a3b8; transition: 0.2s; }
        .answer-area .record-controls .status-dot.recording { background: #ef4444; animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100% { transform:scale(1); } 50% { transform:scale(1.2); } }
        .answer-area .record-controls .timer { font-size: 18px; font-weight: 600; color: #0b1e2e; min-width: 50px; }
        .result-box { background: #f8fafc; border-radius: 16px; padding: 16px 20px; border: 1px solid #e2e8f0; margin-top: 12px; }
        .result-box .score-row { display: flex; flex-wrap: wrap; gap: 14px 24px; margin-bottom: 6px; }
        .result-box .score-item { display: flex; align-items: baseline; gap: 4px; }
        .result-box .score-item .num { font-size: 24px; font-weight: 700; }
        .result-box .score-item .num.good { color: #22c55e; }
        .result-box .score-item .num.mid { color: #eab308; }
        .result-box .score-item .num.poor { color: #ef4444; }
        .result-box .suggestion { margin-top: 10px; padding-top: 10px; border-top: 1px solid #e2e8f0; }
        .result-box .sub-feedback { margin-top: 8px; font-size: 14px; }
        .result-box .sub-feedback .fb-item { padding: 4px 0; border-bottom: 1px solid #f0f2f5; }
        .progress-container { width: 100%; margin: 10px 0 4px 0; }
        .progress-bar-bg { width: 100%; height: 8px; background: #e9edf2; border-radius: 10px; overflow: hidden; }
        .progress-bar-fill { height: 100%; width: 0%; background: #3b82f6; border-radius: 10px; transition: width 0.3s; }
        .progress-text { font-size: 14px; color: #4b5a6a; margin-top: 4px; text-align: center; }
        .hidden { display: none !important; }
        .status-bar { padding: 6px 12px; background: #f0f2f5; border-radius: 10px; font-size: 13px; color: #4b5a6a; display: flex; align-items: center; gap: 10px; }
        .status-bar .label { font-weight: 600; }
        @media (max-width:600px) { body { padding: 8px; } .main-content { padding: 14px; } .top-bar h1 { font-size: 20px; } .view-tabs button { padding: 5px 12px; font-size: 13px; } .teacher-grid { grid-template-columns: 1fr; } .question-list { border-right: none; padding-right: 0; } .editor-panel { padding-left: 0; } }
    </style>
</head>
<body>
<div id="app">
    <div class="top-bar">
        <h1>🎙️ 普通話語音評測</h1>
        <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
            <div class="view-tabs">
                <button class="active" data-view="teacher">👩‍🏫 教師</button>
                <button data-view="student">🧑‍🎓 學生</button>
            </div>
            <div class="lang-switch">
                <button class="active" data-lang="zh">繁體</button>
                <button data-lang="en">English</button>
            </div>
        </div>
    </div>
    <div class="main-content" id="mainContent"></div>
</div>

<script>
    (function() {
        'use strict';

        // ================================================================
        // 1. 配置
        // ================================================================
        const CONFIG = {
            IAT_APPID: 'b35875f2',
            IAT_API_KEY: '2cba10591dc68d093065c60d0c8b98ab',
            IAT_API_SECRET: 'ZDg0NzJhZjgyNjE0N2I0OTEzMDMxZmMy',
            IAT_WS_URL: 'wss://iat-api.xfyun.cn/v2/iat',
            SPARK_APPID: 'b35875f2',
            SPARK_API_KEY: '2cba10591dc68d093065c60d0c8b98ab',
            SPARK_API_SECRET: 'ZDg0NzJhZjgyNjE0N2I0OTEzMDMxZmMy',
            SPARK_WS_URL: 'wss://spark-api.xf-yun.com/v4.0/chat',
            SPARK_DOMAIN: '4.0Ultra',
        };

        // ================================================================
        // 2. 語言
        // ================================================================
        const LANG = {
            zh: {
                grade: '年級', semester: '學期', questionList: '題目列表', newQuestion: '新增題目',
                editQuestion: '編輯題目', delete: '刪除', save: '儲存', cancel: '取消', title: '標題',
                type: '題型', open: '開放式 (看圖說故事)', fixed: '半固定式 (看圖答問題)',
                referenceAnswer: '整體參考答案', keywords: '關鍵字 (逗號分隔)', image: '圖片',
                uploadImage: '上傳圖片', subQuestions: '子問題', addSubQuestion: '新增子問題',
                subQuestion: '子問題', question: '問題', answer: '參考答案', keyword: '關鍵字 (逗號)',
                selectGradeSemester: '請選擇年級與學期', noQuestions: '目前暫無題目',
                startRecording: '開始錄音', stopRecording: '停止錄音', recording: '錄音中...',
                recognizing: '語音識別中...', scoring: '評分中...', done: '完成',
                score: '評分結果', accuracy: '內容相關性', fluency: '豐富度', integrity: '語音準確度',
                suggestion: '建議', source: '評分來源', back: '返回',
                chooseQuestion: '選擇題目作答', answerHere: '請看圖說話/回答問題',
                keywordsHint: '提示關鍵字', transcriptResult: '語音識別結果',
                pleaseSelect: '請選擇', submitAll: '提交全部答案', answering: '作答中',
                alreadyAnswered: '已作答', notStarted: '未開始', progress: '評測進行中，請稍等。',
                englishDetected: '檢測到英文回應，評分項目均為 0 分，請以普通話作答。'
            },
            en: {
                grade: 'Grade', semester: 'Semester', questionList: 'Question List', newQuestion: 'New Question',
                editQuestion: 'Edit', delete: 'Delete', save: 'Save', cancel: 'Cancel', title: 'Title',
                type: 'Type', open: 'Open (Story Telling)', fixed: 'Fixed (Q&A)',
                referenceAnswer: 'Reference Answer', keywords: 'Keywords (comma)', image: 'Image',
                uploadImage: 'Upload Image', subQuestions: 'Sub-questions', addSubQuestion: 'Add Sub-question',
                subQuestion: 'Sub-question', question: 'Question', answer: 'Answer', keyword: 'Keywords (comma)',
                selectGradeSemester: 'Select grade & semester', noQuestions: 'No questions',
                startRecording: 'Start', stopRecording: 'Stop', recording: 'Recording...',
                recognizing: 'Recognizing...', scoring: 'Scoring...', done: 'Done',
                score: 'Score', accuracy: 'Content Relevance', fluency: 'Richness', integrity: 'Pronunciation',
                suggestion: 'Suggestion', source: 'Source', back: 'Back',
                chooseQuestion: 'Choose a question', answerHere: 'Look and speak/answer',
                keywordsHint: 'Keywords', transcriptResult: 'Transcript',
                pleaseSelect: 'Select', submitAll: 'Submit All', answering: 'Answering',
                alreadyAnswered: 'Done', notStarted: 'Not started', progress: 'Processing, please wait...',
                englishDetected: 'English detected, all scores are 0. Please answer in Mandarin.'
            }
        };
        let currentLang = 'zh';
        function t(key) { return LANG[currentLang][key] || key; }

        // ================================================================
        // 3. 數據
        // ================================================================
        let questions = [];
        let currentView = 'teacher';
        let editingQuestionId = null;
        let studentSelectedQuestionId = null;
        let studentAnswerText = '';
        let selectedGrade = '';
        let selectedSemester = '';
        let subAnswers = {};
        let subAnswered = {};
        let subRecordingIndex = null;
        let subLocked = false;

        function loadData() {
            try {
                const raw = localStorage.getItem('speech_questions');
                if (raw) questions = JSON.parse(raw);
                else questions = [];
            } catch(e) { questions = []; }
            if (questions.length === 0) addDefaultQuestions();
        }
        function saveData() { localStorage.setItem('speech_questions', JSON.stringify(questions)); }
        function genId() { return Date.now().toString(36) + Math.random().toString(36).substr(2,5); }

        function addDefaultQuestions() {
            const grades = ['一年級','二年級','三年級','四年級','五年級','六年級'];
            const semesters = ['上學期','下學期'];
            for (const g of grades) {
                for (const s of semesters) {
                    questions.push({
                        id: genId(),
                        grade: g,
                        semester: s,
                        title: '小貓爬樹',
                        type: 'open',
                        refAnswer: '小貓在樹上玩耍，牠很開心。',
                        keywords: ['小貓','樹','玩耍','開心'],
                        image: '',
                        subQuestions: []
                    });
                }
            }
            saveData();
        }

        // ================================================================
        // 4. 簡繁轉換
        // ================================================================
        let converter = null;
        function initOpenCC() {
            if (typeof OpenCC !== 'undefined') {
                converter = OpenCC.Converter({ from: 'cn', to: 'hk' });
            }
        }
        function toTraditional(text) {
            if (!text) return text;
            if (converter) return converter(text);
            return text;
        }

        // ================================================================
        // 5. 視圖切換
        // ================================================================
        document.querySelectorAll('[data-view]').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('[data-view]').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentView = this.dataset.view;
                render();
            });
        });
        document.querySelectorAll('[data-lang]').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('[data-lang]').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentLang = this.dataset.lang;
                render();
            });
        });

        function render() {
            loadData();
            if (currentView === 'teacher') renderTeacher();
            else renderStudent();
        }

        // ================================================================
        // 6. 教師視圖
        // ================================================================
        function renderTeacher() {
            const grades = ['一年級','二年級','三年級','四年級','五年級','六年級'];
            const semesters = ['上學期','下學期'];
            let html = `
                <div class="teacher-grid">
                    <div class="question-list">
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                            <h3>${t('questionList')}</h3>
                            <button class="btn btn-primary btn-sm" onclick="startNewQuestion()">+ ${t('newQuestion')}</button>
                        </div>
                        <div style="display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px;">
                            <select id="filterGrade" onchange="applyFilter()" style="padding:4px 8px; border-radius:8px; border:1px solid #dce1e8;">
                                <option value="">${t('grade')}</option>
                                ${grades.map(g => `<option value="${g}">${g}</option>`).join('')}
                            </select>
                            <select id="filterSemester" onchange="applyFilter()" style="padding:4px 8px; border-radius:8px; border:1px solid #dce1e8;">
                                <option value="">${t('semester')}</option>
                                ${semesters.map(s => `<option value="${s}">${s}</option>`).join('')}
                            </select>
                        </div>
                        <div id="questionListContainer">${renderQuestionList()}</div>
                    </div>
                    <div class="editor-panel">${renderEditor()}</div>
                </div>
            `;
            document.getElementById('mainContent').innerHTML = html;
        }

        function renderQuestionList() {
            const gradeFilter = document.getElementById('filterGrade')?.value || '';
            const semFilter = document.getElementById('filterSemester')?.value || '';
            let filtered = questions;
            if (gradeFilter) filtered = filtered.filter(q => q.grade === gradeFilter);
            if (semFilter) filtered = filtered.filter(q => q.semester === semFilter);
            if (filtered.length === 0) {
                return `<div style="padding:20px; text-align:center; color:#8a9aa8;">${t('noQuestions')}</div>`;
            }
            let html = '';
            filtered.forEach(q => {
                const sel = (editingQuestionId === q.id) ? 'selected' : '';
                html += `
                    <div class="list-item ${sel}" onclick="selectQuestion('${q.id}')">
                        <div class="info">
                            <div class="title">${toTraditional(q.title)}</div>
                            <div class="meta">${q.grade} · ${q.semester} · ${q.type === 'open' ? t('open') : t('fixed')}</div>
                        </div>
                        <div class="actions">
                            <button class="btn btn-outline btn-sm" onclick="event.stopPropagation(); editQuestion('${q.id}')">✎</button>
                            <button class="btn btn-danger btn-sm" onclick="event.stopPropagation(); deleteQuestion('${q.id}')">×</button>
                        </div>
                    </div>
                `;
            });
            return html;
        }

        function renderEditor() {
            const q = questions.find(q => q.id === editingQuestionId);
            if (!q) return `<div style="padding:30px; text-align:center; color:#8a9aa8;">${t('selectGradeSemester')}</div>`;
            const isOpen = q.type === 'open';
            let html = `
                <h3>${editingQuestionId ? t('editQuestion') : t('newQuestion')}</h3>
                <div class="form-group"><label>${t('grade')}</label>
                    <select id="editGrade">${['一年級','二年級','三年級','四年級','五年級','六年級'].map(g => `<option value="${g}" ${q.grade===g?'selected':''}>${g}</option>`).join('')}</select>
                </div>
                <div class="form-group"><label>${t('semester')}</label>
                    <select id="editSemester">${['上學期','下學期'].map(s => `<option value="${s}" ${q.semester===s?'selected':''}>${s}</option>`).join('')}</select>
                </div>
                <div class="form-group"><label>${t('title')}</label><input id="editTitle" value="${q.title}" /></div>
                <div class="form-group"><label>${t('type')}</label>
                    <select id="editType" onchange="toggleQuestionType()">
                        <option value="open" ${q.type==='open'?'selected':''}>${t('open')}</option>
                        <option value="fixed" ${q.type==='fixed'?'selected':''}>${t('fixed')}</option>
                    </select>
                </div>
                <div class="form-group" id="refAnswerGroup" style="${isOpen ? '' : 'display:none;'}">
                    <label>${t('referenceAnswer')}</label><textarea id="editRefAnswer" rows="2">${q.refAnswer || ''}</textarea>
                </div>
                <div class="form-group"><label>${t('keywords')}</label><input id="editKeywords" value="${(q.keywords||[]).join(', ')}" placeholder="逗號分隔" /></div>
                <div class="form-group">
                    <label>${t('image')}</label>
                    <input type="file" id="editImage" accept="image/*" onchange="handleImageUpload(event)" />
                    ${q.image ? `<div style="margin-top:6px;"><img src="${q.image}" style="max-height:80px; border-radius:6px;" /></div>` : ''}
                    <input type="hidden" id="editImageData" value="${q.image || ''}" />
                </div>
            `;
            if (!isOpen) {
                html += `<div style="margin-top:12px;"><strong>${t('subQuestions')}</strong> <button class="btn btn-outline btn-sm" onclick="addSubQuestion()">+ ${t('addSubQuestion')}</button></div>`;
                (q.subQuestions || []).forEach((sq, idx) => {
                    html += `
                        <div class="sub-question" data-index="${idx}">
                            <div class="row">
                                <div class="form-group" style="flex:2;"><label>${t('question')}</label><input class="sq-question" value="${sq.question || ''}" /></div>
                                <div class="form-group" style="flex:2;"><label>${t('answer')}</label><input class="sq-answer" value="${sq.answer || ''}" /></div>
                                <div class="form-group" style="flex:1;"><label>${t('keyword')}</label><input class="sq-keywords" value="${(sq.keywords||[]).join(', ')}" /></div>
                                <div style="display:flex; align-items:flex-end; padding-bottom:4px;">
                                    <button class="btn btn-danger btn-sm" onclick="removeSubQuestion(this)">×</button>
                                </div>
                            </div>
                        </div>
                    `;
                });
            }
            html += `
                <div style="display:flex; gap:8px; margin-top:14px;">
                    <button class="btn btn-success" onclick="saveQuestion()">💾 ${t('save')}</button>
                    <button class="btn btn-outline" onclick="cancelEdit()">${t('cancel')}</button>
                </div>
            `;
            return html;
        }

        // ================================================================
        // 7. 教師操作函數
        // ================================================================
        window.startNewQuestion = function() {
            const newQ = { id: genId(), grade: '一年級', semester: '上學期', title: '新題目', type: 'open', refAnswer: '', keywords: [], image: '', subQuestions: [] };
            questions.push(newQ);
            editingQuestionId = newQ.id;
            saveData();
            render();
        };
        window.selectQuestion = function(id) { editingQuestionId = id; render(); };

        // ================================================================
        // 10. 開放式錄音綁定（完整無省略）
        // ================================================================
        function bindOpenRecording(q) {
            const startBtn = document.getElementById('startRecordBtn');
            const stopBtn = document.getElementById('stopRecordBtn');
            const dot = document.getElementById('recordDot');
            const timer = document.getElementById('recordTimer');
            const statusText = document.getElementById('statusText');
            const transcript = document.getElementById('studentTranscript');
            const progressContainer = document.getElementById('progressContainer');
            const progressBar = document.getElementById('progressBar');
            const progressText = document.getElementById('progressText');

            let mediaStream = null, audioContext = null, scriptProcessor = null;
            let isRecording = false, recordTimer = null, seconds = 0;
            let audioBuffer = [];
            const SAMPLE_RATE = 16000;
            let iatWs = null, isRecognizing = false, finalTranscript = '';
            let iatReceivedMessage = false, iatTimeoutId = null, iatChunkCount = 0;
            let isIatEndSent = false, waitForIatResult = false;
            let cryptoReady = false;
            let sparkWs = null, isScoring = false, sparkResult = '';
            let sparkTimeoutId = null;

            if (!cryptoReady) loadCryptoJs(() => {});

            startBtn.onclick = function() { if (!isRecording) startRecording(); };
            stopBtn.onclick = function() { if (isRecording) stopRecording(); };

            function startRecording() {
                audioBuffer = []; finalTranscript = ''; isIatEndSent = false; waitForIatResult = false; iatReceivedMessage = false; iatChunkCount = 0;
                document.getElementById('scoreResult').classList.add('hidden');
                progressContainer.classList.add('hidden');
                progressBar.style.width = '0%';
                initAudio((err) => {
                    if (err) { console.error('麥克風錯誤:', err); return; }
                    isRecording = true;
                    dot.className = 'status-dot recording';
                    startBtn.disabled = true; stopBtn.disabled = false;
                    seconds = 0; timer.textContent = '00:00';
                    if (recordTimer) clearInterval(recordTimer);
                    recordTimer = setInterval(() => {
                        seconds++;
                        timer.textContent = String(Math.floor(seconds/60)).padStart(2,'0')+':'+String(seconds%60).padStart(2,'0');
                    }, 1000);
                    statusText.textContent = '🔴 '+t('recording');
                    startIatRecognition();
                });
            }

            function stopRecording() {
                isRecording = false;
                dot.className = 'status-dot';
                startBtn.disabled = false; stopBtn.disabled = true;
                if (recordTimer) { clearInterval(recordTimer); recordTimer = null; }
                statusText.textContent = '⏹️ '+t('stopRecording');
                progressContainer.classList.remove('hidden');
                progressBar.style.width = '10%';
                progressText.textContent = t('progress');
                if (mediaStream) { mediaStream.getTracks().forEach(t=>t.stop()); mediaStream=null; }
                if (audioContext) { audioContext.close(); audioContext=null; }
                if (scriptProcessor) { scriptProcessor.disconnect(); scriptProcessor=null; }
                if (!iatReceivedMessage) console.warn('⚠️ 語音無回應');
            }

            function initAudio(cb) {
                navigator.mediaDevices.getUserMedia({
                    audio: { sampleRate: SAMPLE_RATE, channelCount: 1, echoCancellation: false, noiseSuppression: false, autoGainControl: false }
                }).then(stream => {
                    mediaStream = stream;
                    audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: SAMPLE_RATE });
                    const source = audioContext.createMediaStreamSource(stream);
                    scriptProcessor = audioContext.createScriptProcessor(4096, 1, 1);
                    scriptProcessor.onaudioprocess = (event) => {
                        if (!isRecording) return;
                        const inputData = event.inputBuffer.getChannelData(0);
                        const pcm = new Int16Array(inputData.length);
                        for (let i=0; i<inputData.length; i++) {
                            const s = Math.max(-1, Math.min(1, inputData[i]));
                            pcm[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
                        }
                        audioBuffer.push(pcm);
                    };
                    source.connect(scriptProcessor);
                    scriptProcessor.connect(audioContext.destination);
                    cb(null);
                }).catch(err => cb(err));
            }

            function startIatRecognition() {
                if (isRecognizing) return;
                if (!cryptoReady) { loadCryptoJs(() => startIatRecognition()); return; }
                try {
                    const urlObj = new URL(CONFIG.IAT_WS_URL);
                    const wsUrl = buildWsUrl(urlObj.host, urlObj.pathname, CONFIG.IAT_API_KEY, CONFIG.IAT_API_SECRET);
                    iatWs = new WebSocket(wsUrl);
                    isRecognizing = true;
                    iatReceivedMessage = false; iatChunkCount = 0; finalTranscript = ''; isIatEndSent = false; waitForIatResult = false;
                    if (iatTimeoutId) clearTimeout(iatTimeoutId);
                    iatTimeoutId = setTimeout(() => {
                        if (!iatReceivedMessage && iatWs && iatWs.readyState === WebSocket.OPEN) {
                            console.warn('⚠️ 語音服務無回應');
                            if (iatWs) iatWs.close();
                            stopRecording();
                        }
                        isRecognizing = false;
                    }, 20000);
                    iatWs.onopen = () => { sendIatHandshake(); sendIatAudioData(); };
                    iatWs.onmessage = (event) => {
                        iatReceivedMessage = true;
                        if (iatTimeoutId) { clearTimeout(iatTimeoutId); iatTimeoutId = null; }
                        try { const data = JSON.parse(event.data); handleIatMessage(data); } catch(e) {}
                    };
                    iatWs.onerror = () => { console.error('語音錯誤'); stopRecording(); isRecognizing = false; };
                    iatWs.onclose = () => { if (!iatReceivedMessage) console.warn('語音連線失敗'); if (isRecording) stopRecording(); isRecognizing = false; };
                } catch(e) { console.error('語音初始化失敗', e); stopRecording(); }
            }

            function sendIatHandshake() {
                const handshake = { common: { app_id: CONFIG.IAT_APPID }, business: { language: 'zh_cn', domain: 'iat', accent: 'mandarin' }, data: { status: 0, format: 'audio/L16;rate=16000', encoding: 'raw', audio: '' } };
                iatWs.send(JSON.stringify(handshake));
            }

            function sendIatAudioData() {
                const sendChunk = () => {
                    if (isIatEndSent || iatWs.readyState !== WebSocket.OPEN) return;
                    if (!isRecording) {
                        isIatEndSent = true;
                        iatWs.send(JSON.stringify({ data: { status: 2, format: 'audio/L16;rate=16000', encoding: 'raw', audio: '' } }));
                        waitForIatResult = true;
                        setTimeout(() => { if (waitForIatResult && !finalTranscript) { console.warn('語音識別超時'); if (iatWs && iatWs.readyState === WebSocket.OPEN) iatWs.close(); } }, 10000);
                        return;
                    }
                    if (audioBuffer.length > 0) {
                        const totalLength = audioBuffer.reduce((sum, arr) => sum + arr.length, 0);
                        const merged = new Int16Array(totalLength);
                        let offset = 0;
                        for (const arr of audioBuffer) { merged.set(arr, offset); offset += arr.length; }
                        audioBuffer = [];
                        const bytes = new Uint8Array(merged.buffer);
                        let binary = '';
                        for (let i=0; i<bytes.length; i++) binary += String.fromCharCode(bytes[i]);
                        const base64 = btoa(binary);
                        iatWs.send(JSON.stringify({ data: { status: 1, format: 'audio/L16;rate=16000', encoding: 'raw', audio: base64 } }));
                        iatChunkCount++;
                    }
                    setTimeout(sendChunk, 100);
                };
                sendChunk();
            }

            function handleIatMessage(data) {
                if (data.code && data.code !== 0) { console.error('語音錯誤 '+data.code); stopRecording(); isRecognizing = false; return; }
                if (data.data && data.data.result) {
                    const result = data.data.result;
                    if (result.ws) {
                        let text = '';
                        for (const w of result.ws) {
                            for (const cw of w.cw) text += cw.w;
                        }
                        if (text) {
                            finalTranscript += text;
                            transcript.innerHTML = toTraditional(finalTranscript);
                            progressBar.style.width = '40%';
                        }
                    }
                }
                if (data.data && data.data.status === 2) {
                    waitForIatResult = false;
                    if (iatWs && iatWs.readyState === WebSocket.OPEN) iatWs.close();
                    if (finalTranscript.trim()) {
                        studentAnswerText = finalTranscript;
                        progressBar.style.width = '60%';
                        callSparkForScore(q, finalTranscript);
                    } else { console.warn('未識別到語音'); progressContainer.classList.add('hidden'); }
                    stopRecording();
                    isRecognizing = false;
                }
            }

            function callSparkForScore(q, answer) {
                if (isScoring) return;
                isScoring = true;
                statusText.textContent = '🤖 '+t('scoring');
                progressBar.style.width = '70%';
                if (!cryptoReady) { loadCryptoJs(() => callSparkForScore(q, answer)); return; }
                try {
                    const urlObj = new URL(CONFIG.SPARK_WS_URL);
                    const wsUrl = buildWsUrl(urlObj.host, urlObj.pathname, CONFIG.SPARK_API_KEY, CONFIG.SPARK_API_SECRET);
                    sparkWs = new WebSocket(wsUrl);
                    sparkResult = '';
                    if (sparkTimeoutId) clearTimeout(sparkTimeoutId);
                    sparkTimeoutId = setTimeout(() => {
                        if (sparkWs && sparkWs.readyState === WebSocket.OPEN) { console.warn('評分超時'); sparkWs.close(); }
                        isScoring = false;
                        progressContainer.classList.add('hidden');
                    }, 30000);
                    sparkWs.onopen = () => { progressBar.style.width = '80%'; sendSparkRequest(q, answer); };
                    sparkWs.onmessage = (event) => { try { const data = JSON.parse(event.data); handleSparkMessage(data); } catch(e) {} };
                    sparkWs.onerror = () => { console.error('評分錯誤'); isScoring = false; progressContainer.classList.add('hidden'); };
                    sparkWs.onclose = () => { if (!sparkResult) console.warn('評分無回應'); isScoring = false; progressContainer.classList.add('hidden'); };
                } catch(e) { console.error('評分初始化失敗', e); isScoring = false; progressContainer.classList.add('hidden'); }
            }

            function sendSparkRequest(q, answer) {
                const hasChinese = /[\u4e00-\u9fa5]/.test(answer);
                let prompt = '';
                if (!hasChinese) {
                    prompt = `學生回答為英文，請給予鼓勵，但所有評分項目設為0。建議用中文回答。`;
                } else {
                    prompt = `你是一位專業的普通話教師，請用鼓勵性語氣評分。\n題目類型：開放式看圖說故事\n主題：${q.refAnswer || ''}\n關鍵字：${(q.keywords||[]).join('、')}\n學生回答：${answer}\n請從內容相關性、豐富度、語音準確度三項評分(0-100)，給出總分，並提供具體建議(繁體中文，50-100字，鼓勵為主)。\n輸出JSON：{"accuracy":分數,"fluency":分數,"integrity":分數,"total_score":平均分,"suggestion":"建議"}`;
                }
                const request = {
                    header: { app_id: CONFIG.SPARK_APPID, uid: 'student' },
                    parameter: { chat: { domain: CONFIG.SPARK_DOMAIN, temperature: 0.3, max_tokens: 1024, top_k: 5 } },
                    payload: { message: { text: [ { role: 'system', content: '你是一位專業的普通話教師。' }, { role: 'user', content: prompt } ] } }
                };
                sparkWs.send(JSON.stringify(request));
            }

            function handleSparkMessage(data) {
                if (data.header && data.header.code !== 0) { console.error('星火錯誤 '+data.header.code); isScoring = false; if (sparkWs) sparkWs.close(); progressContainer.classList.add('hidden'); return; }
                if (data.payload && data.payload.choices && data.payload.choices.text) {
                    for (const text of data.payload.choices.text) {
                        if (text.content) sparkResult += text.content;
                    }
                }
                if (data.header && data.header.status === 2) {
                    if (sparkTimeoutId) clearTimeout(sparkTimeoutId);
                    if (sparkWs) sparkWs.close();
                    progressBar.style.width = '90%';
                    try {
                        let jsonStr = sparkResult.trim();
                        jsonStr = jsonStr.replace(/^```json\s*/, '').replace(/\s*```$/, '');
                        const match = jsonStr.match(/\{[\s\S]*\}/);
                        if (match) jsonStr = match[0];
                        const grade = JSON.parse(jsonStr);
                        const hasChinese = /[\u4e00-\u9fa5]/.test(studentAnswerText);
                        if (!hasChinese) { grade.accuracy = 0; grade.fluency = 0; grade.integrity = 0; grade.total_score = 0; grade.suggestion = t('englishDetected'); }
                        displayScore(grade);
                        progressContainer.classList.add('hidden');
                    } catch(e) { console.error('評分解析失敗', e); progressContainer.classList.add('hidden'); }
                    isScoring = false;
                }
            }

            function displayScore(grade) {
                const resultDiv = document.getElementById('scoreResult');
                resultDiv.classList.remove('hidden');
                document.getElementById('totalScore').textContent = Math.round(grade.total_score || 0);
                document.getElementById('accScore').textContent = Math.round(grade.accuracy || 0);
                document.getElementById('fluencyScore').textContent = Math.round(grade.fluency || 0);
                document.getElementById('integrityScore').textContent = Math.round(grade.integrity || 0);
                document.getElementById('suggestionText').innerHTML = `<strong>💡 ${t('suggestion')}：</strong>${toTraditional(grade.suggestion || '')}`;
                document.getElementById('scoreSource').textContent = t('source')+'：訊飛星火 4.0Ultra';
                document.querySelectorAll('#scoreResult .num').forEach(el => {
                    const val = parseFloat(el.textContent);
                    el.className = 'num' + (val>=80?' good': val>=60?' mid':' poor');
                });
                statusText.textContent = '✅ '+t('done');
                console.log('✅ 評分完成！');
            }

            function buildWsUrl(host, path, apiKey, apiSecret) {
                if (typeof CryptoJS === 'undefined') throw new Error('CryptoJS not loaded');
                const date = new Date().toUTCString();
                const requestLine = `GET ${path} HTTP/1.1`;
                const signatureOrigin = `host: ${host}\ndate: ${date}\n${requestLine}`;
                const hmac = CryptoJS.HmacSHA256(signatureOrigin, apiSecret);
                const signature = CryptoJS.enc.Base64.stringify(hmac);
                const authorizationOrigin = `api_key="${apiKey}", algorithm="hmac-sha256", headers="host date request-line", signature="${signature}"`;
                const authorization = CryptoJS.enc.Base64.stringify(CryptoJS.enc.Utf8.parse(authorizationOrigin));
                return `wss://${host}${path}?authorization=${encodeURIComponent(authorization)}&host=${host}&date=${encodeURIComponent(date)}`;
            }

            function loadCryptoJs(cb) {
                if (typeof CryptoJS !== 'undefined') { cryptoReady=true; cb(); return; }
                const script = document.createElement('script');
                script.src = 'https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js';
                script.onload = function() { cryptoReady=true; cb(); };
                script.onerror = function() { console.error('加密庫載入失敗'); };
                document.head.appendChild(script);
            }
        }

        // ================================================================
        // 11. 半固定式錄音綁定（完整無省略）
        // ================================================================
        function bindFixedRecording(q) {
            const subs = q.subQuestions || [];
            const recordBtns = document.querySelectorAll('.sq-record-btn');
            const stopBtns = document.querySelectorAll('.sq-stop-btn');
            const transcripts = document.querySelectorAll('.sq-transcript');
            const submitBtn = document.getElementById('submitAllBtn');
            const submitStatus = document.getElementById('submitStatus');
            const progressContainer = document.getElementById('progressContainer');
            const progressBar = document.getElementById('progressBar');
            const progressText = document.getElementById('progressText');

            let currentRecordingIdx = null;
            let mediaStream = null, audioContext = null, scriptProcessor = null;
            let isRecording = false, recordTimer = null, seconds = 0;
            let audioBuffer = [];
            const SAMPLE_RATE = 16000;
            let iatWs = null, isRecognizing = false, finalTranscript = '';
            let iatReceivedMessage = false, iatTimeoutId = null, iatChunkCount = 0;
            let isIatEndSent = false, waitForIatResult = false;
            let cryptoReady = false;
            let sparkWs = null, isScoring = false, sparkResult = '';
            let sparkTimeoutId = null;

            if (!cryptoReady) loadCryptoJs(() => {});

            function updateButtons() {
                recordBtns.forEach((btn, idx) => {
                    const answered = subAnswered[idx] || false;
                    let disabled = answered || subLocked || isScoring;
                    if (idx > 0 && !subAnswered[idx-1]) disabled = true;
                    if (currentRecordingIdx !== null && currentRecordingIdx !== idx) disabled = true;
                    btn.disabled = disabled;
                });
                const allDone = subs.every((_, idx) => subAnswered[idx]);
                submitBtn.disabled = !allDone || subLocked || isScoring;
                submitStatus.textContent = allDone ? t('done') : t('answering');
            }

            recordBtns.forEach((btn, idx) => {
                btn.onclick = function() {
                    if (this.disabled) return;
                    currentRecordingIdx = idx;
                    this.style.display = 'none';
                    const stopBtn = stopBtns[idx];
                    stopBtn.style.display = 'inline-block';
                    transcripts[idx].textContent = '';
                    startRecordingForSub(idx);
                };
            });
            stopBtns.forEach((btn, idx) => {
                btn.onclick = function() {
                    if (!isRecording) return;
                    stopRecordingForSub(idx);
                };
            });

            function startRecordingForSub(idx) {
                audioBuffer = []; finalTranscript = ''; isIatEndSent = false; waitForIatResult = false; iatReceivedMessage = false; iatChunkCount = 0;
                progressContainer.classList.add('hidden');
                progressBar.style.width = '0%';
                initAudio((err) => {
                    if (err) { console.error('麥克風錯誤:', err); return; }
                    isRecording = true;
                    const statusSpan = document.querySelectorAll('.sq-status')[idx];
                    statusSpan.textContent = t('recording');
                    statusSpan.className = 'sq-status';
                    recordBtns.forEach(b => b.disabled = true);
                    startIatRecognitionForSub(idx);
                });
            }

            function stopRecordingForSub(idx) {
                isRecording = false;
                const recordBtn = recordBtns[idx];
                const stopBtn = stopBtns[idx];
                recordBtn.style.display = 'inline-block';
                stopBtn.style.display = 'none';
                if (recordTimer) { clearInterval(recordTimer); recordTimer = null; }
                if (mediaStream) { mediaStream.getTracks().forEach(t=>t.stop()); mediaStream=null; }
                if (audioContext) { audioContext.close(); audioContext=null; }
                if (scriptProcessor) { scriptProcessor.disconnect(); scriptProcessor=null; }
                if (!iatReceivedMessage) console.warn('語音無回應');
                updateButtons();
            }

            function initAudio(cb) {
                navigator.mediaDevices.getUserMedia({
                    audio: { sampleRate: SAMPLE_RATE, channelCount: 1, echoCancellation: false, noiseSuppression: false, autoGainControl: false }
                }).then(stream => {
                    mediaStream = stream;
                    audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: SAMPLE_RATE });
                    const source = audioContext.createMediaStreamSource(stream);
                    scriptProcessor = audioContext.createScriptProcessor(4096, 1, 1);
                    scriptProcessor.onaudioprocess = (event) => {
                        if (!isRecording) return;
                        const inputData = event.inputBuffer.getChannelData(0);
                        const pcm = new Int16Array(inputData.length);
                        for (let i=0; i<inputData.length; i++) {
                            const s = Math.max(-1, Math.min(1, inputData[i]));
                            pcm[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
                        }
                        audioBuffer.push(pcm);
                    };
                    source.connect(scriptProcessor);
                    scriptProcessor.connect(audioContext.destination);
                    cb(null);
                }).catch(err => cb(err));
            }

            function startIatRecognitionForSub(idx) {
                if (isRecognizing) return;
                if (!cryptoReady) { loadCryptoJs(() => startIatRecognitionForSub(idx)); return; }
                try {
                    const urlObj = new URL(CONFIG.IAT_WS_URL);
                    const wsUrl = buildWsUrl(urlObj.host, urlObj.pathname, CONFIG.IAT_API_KEY, CONFIG.IAT_API_SECRET);
                    iatWs = new WebSocket(wsUrl);
                    isRecognizing = true;
                    iatReceivedMessage = false; iatChunkCount = 0; finalTranscript = ''; isIatEndSent = false; waitForIatResult = false;
                    if (iatTimeoutId) clearTimeout(iatTimeoutId);
                    iatTimeoutId = setTimeout(() => {
                        if (!iatReceivedMessage && iatWs && iatWs.readyState === WebSocket.OPEN) {
                            console.warn('語音無回應');
                            if (iatWs) iatWs.close();
                            stopRecordingForSub(idx);
                        }
                        isRecognizing = false;
                    }, 20000);
                    iatWs.onopen = () => { sendIatHandshake(); sendIatAudioData(); };
                    iatWs.onmessage = (event) => {
                        iatReceivedMessage = true;
                        if (iatTimeoutId) { clearTimeout(iatTimeoutId); iatTimeoutId = null; }
                        try { const data = JSON.parse(event.data); handleIatMessageForSub(data, idx); } catch(e) {}
                    };
                    iatWs.onerror = () => { console.error('語音錯誤'); stopRecordingForSub(idx); isRecognizing = false; };
                    iatWs.onclose = () => { if (!iatReceivedMessage) console.warn('語音連線失敗'); if (isRecording) stopRecordingForSub(idx); isRecognizing = false; };
                } catch(e) { console.error('語音初始化失敗', e); stopRecordingForSub(idx); }
            }

            function sendIatHandshake() {
                const handshake = { common: { app_id: CONFIG.IAT_APPID }, business: { language: 'zh_cn', domain: 'iat', accent: 'mandarin' }, data: { status: 0, format: 'audio/L16;rate=16000', encoding: 'raw', audio: '' } };
                iatWs.send(JSON.stringify(handshake));
            }

            function sendIatAudioData() {
                const sendChunk = () => {
                    if (isIatEndSent || iatWs.readyState !== WebSocket.OPEN) return;
                    if (!isRecording) {
                        isIatEndSent = true;
                        iatWs.send(JSON.stringify({ data: { status: 2, format: 'audio/L16;rate=16000', encoding: 'raw', audio: '' } }));
                        waitForIatResult = true;
                        setTimeout(() => { if (waitForIatResult && !finalTranscript) { console.warn('語音識別超時'); if (iatWs && iatWs.readyState === WebSocket.OPEN) iatWs.close(); } }, 10000);
                        return;
                    }
                    if (audioBuffer.length > 0) {
                        const totalLength = audioBuffer.reduce((sum, arr) => sum + arr.length, 0);
                        const merged = new Int16Array(totalLength);
                        let offset = 0;
                        for (const arr of audioBuffer) { merged.set(arr, offset); offset += arr.length; }
                        audioBuffer = [];
                        const bytes = new Uint8Array(merged.buffer);
                        let binary = '';
                        for (let i=0; i<bytes.length; i++) binary += String.fromCharCode(bytes[i]);
                        const base64 = btoa(binary);
                        iatWs.send(JSON.stringify({ data: { status: 1, format: 'audio/L16;rate=16000', encoding: 'raw', audio: base64 } }));
                        iatChunkCount++;
                    }
                    setTimeout(sendChunk, 100);
                };
                sendChunk();
            }

            function handleIatMessageForSub(data, idx) {
                if (data.code && data.code !== 0) { console.error('語音錯誤 '+data.code); stopRecordingForSub(idx); isRecognizing = false; return; }
                if (data.data && data.data.result) {
                    const result = data.data.result;
                    if (result.ws) {
                        let text = '';
                        for (const w of result.ws) {
                            for (const cw of w.cw) text += cw.w;
                        }
                        if (text) {
                            finalTranscript += text;
                            const transcriptEl = transcripts[idx];
                            transcriptEl.textContent = toTraditional(finalTranscript);
                        }
                    }
                }
                if (data.data && data.data.status === 2) {
                    waitForIatResult = false;
                    if (iatWs && iatWs.readyState === WebSocket.OPEN) iatWs.close();
                    if (finalTranscript.trim()) {
                        subAnswers[idx] = finalTranscript;
                        subAnswered[idx] = true;
                        const statusSpan = document.querySelectorAll('.sq-status')[idx];
                        statusSpan.textContent = t('alreadyAnswered');
                        statusSpan.className = 'sq-status done';
                        const recordBtn = recordBtns[idx];
                        const stopBtn = stopBtns[idx];
                        recordBtn.style.display = 'inline-block';
                        stopBtn.style.display = 'none';
                        updateButtons();
                        const allDone = subs.every((_, i) => subAnswered[i]);
                        if (allDone) {
                            submitStatus.textContent = t('done');
                            submitBtn.disabled = false;
                            console.log('✅ 全部子問題已作答，請點擊提交');
                        }
                        isRecording = false;
                        if (mediaStream) { mediaStream.getTracks().forEach(t=>t.stop()); mediaStream=null; }
                        if (audioContext) { audioContext.close(); audioContext=null; }
                        if (scriptProcessor) { scriptProcessor.disconnect(); scriptProcessor=null; }
                        recordBtn.style.display = 'inline-block';
                        stopBtn.style.display = 'none';
                    } else { console.warn('未識別到語音'); }
                    isRecognizing = false;
                }
            }

            submitBtn.onclick = function() {
                if (this.disabled) return;
                subLocked = true;
                updateButtons();
                progressContainer.classList.remove('hidden');
                progressBar.style.width = '10%';
                progressText.textContent = t('progress');
                let fullAnswer = '';
                subs.forEach((sq, idx) => {
                    fullAnswer += `問題${idx+1}：${sq.question}\n回答：${subAnswers[idx] || ''}\n`;
                });
                callSparkForFixed(q, fullAnswer);
            };

            function callSparkForFixed(q, answer) {
                if (isScoring) return;
                isScoring = true;
                progressBar.style.width = '30%';
                if (!cryptoReady) { loadCryptoJs(() => callSparkForFixed(q, answer)); return; }
                try {
                    const urlObj = new URL(CONFIG.SPARK_WS_URL);
                    const wsUrl = buildWsUrl(urlObj.host, urlObj.pathname, CONFIG.SPARK_API_KEY, CONFIG.SPARK_API_SECRET);
                    sparkWs = new WebSocket(wsUrl);
                    sparkResult = '';
                    if (sparkTimeoutId) clearTimeout(sparkTimeoutId);
                    sparkTimeoutId = setTimeout(() => {
                        if (sparkWs && sparkWs.readyState === WebSocket.OPEN) { console.warn('評分超時'); sparkWs.close(); }
                        isScoring = false;
                        progressContainer.classList.add('hidden');
                        subLocked = false;
                        updateButtons();
                    }, 30000);
                    sparkWs.onopen = () => { progressBar.style.width = '50%'; sendSparkRequestFixed(q, answer); };
                    sparkWs.onmessage = (event) => { try { const data = JSON.parse(event.data); handleSparkMessageFixed(data); } catch(e) {} };
                    sparkWs.onerror = () => { console.error('評分錯誤'); isScoring = false; progressContainer.classList.add('hidden'); subLocked = false; updateButtons(); };
                    sparkWs.onclose = () => { if (!sparkResult) console.warn('評分無回應'); isScoring = false; progressContainer.classList.add('hidden'); subLocked = false; updateButtons(); };
                } catch(e) { console.error('評分初始化失敗', e); isScoring = false; progressContainer.classList.add('hidden'); subLocked = false; updateButtons(); }
            }

            function sendSparkRequestFixed(q, answer) {
                const hasChinese = /[\u4e00-\u9fa5]/.test(answer);
                let prompt = '';
                if (!hasChinese) {
                    prompt = `學生回答為英文，請給予鼓勵，但所有評分項目設為0。建議用中文回答。`;
                } else {
                    let subInfo = '';
                    (q.subQuestions || []).forEach((sq, idx) => {
                        subInfo += `子問題${idx+1}：${sq.question}\n參考答案：${sq.answer || ''}\n關鍵字：${(sq.keywords||[]).join('、')}\n學生回答：${subAnswers[idx] || ''}\n\n`;
                    });
                    prompt = `你是一位專業的普通話教師，請用鼓勵性語氣評分。\n題目：半固定式看圖答問題\n${subInfo}\n請對每個子問題分別給分（內容相關性、豐富度、語音準確度），並給出總分和整體建議(繁體中文，鼓勵為主)。\n輸出JSON格式：\n{"sub_scores":[{"accuracy":分數,"fluency":分數,"integrity":分數},...],"total_score":平均分,"suggestion":"整體建議"}`;
                }
                const request = {
                    header: { app_id: CONFIG.SPARK_APPID, uid: 'student' },
                    parameter: { chat: { domain: CONFIG.SPARK_DOMAIN, temperature: 0.3, max_tokens: 1024, top_k: 5 } },
                    payload: { message: { text: [ { role: 'system', content: '你是一位專業的普通話教師。' }, { role: 'user', content: prompt } ] } }
                };
                sparkWs.send(JSON.stringify(request));
            }

            function handleSparkMessageFixed(data) {
                if (data.header && data.header.code !== 0) { console.error('星火錯誤 '+data.header.code); isScoring = false; if (sparkWs) sparkWs.close(); progressContainer.classList.add('hidden'); subLocked = false; updateButtons(); return; }
                if (data.payload && data.payload.choices && data.payload.choices.text) {
                    for (const text of data.payload.choices.text) {
                        if (text.content) sparkResult += text.content;
                    }
                }
                if (data.header && data.header.status === 2) {
                    if (sparkTimeoutId) clearTimeout(sparkTimeoutId);
                    if (sparkWs) sparkWs.close();
                    progressBar.style.width = '90%';
                    try {
                        let jsonStr = sparkResult.trim();
                        jsonStr = jsonStr.replace(/^```json\s*/, '').replace(/\s*```$/, '');
                        const match = jsonStr.match(/\{[\s\S]*\}/);
                        if (match) jsonStr = match[0];
                        const grade = JSON.parse(jsonStr);
                        const hasChinese = /[\u4e00-\u9fa5]/.test(answer);
                        if (!hasChinese) { grade.total_score = 0; grade.suggestion = t('englishDetected'); grade.sub_scores = (q.subQuestions || []).map(() => ({accuracy:0, fluency:0, integrity:0})); }
                        displayFixedScore(grade);
                        progressContainer.classList.add('hidden');
                        subLocked = false;
                        updateButtons();
                    } catch(e) { console.error('評分解析失敗', e); progressContainer.classList.add('hidden'); subLocked = false; updateButtons(); }
                    isScoring = false;
                }
            }

            function displayFixedScore(grade) {
                const resultDiv = document.getElementById('scoreResult');
                resultDiv.classList.remove('hidden');
                document.getElementById('totalScore').textContent = Math.round(grade.total_score || 0);
                let avgAcc = 0, avgFlu = 0, avgInt = 0;
                const subScores = grade.sub_scores || [];
                if (subScores.length > 0) {
                    let sumAcc = 0, sumFlu = 0, sumInt = 0;
                    subScores.forEach(s => { sumAcc += s.accuracy || 0; sumFlu += s.fluency || 0; sumInt += s.integrity || 0; });
                    avgAcc = sumAcc / subScores.length;
                    avgFlu = sumFlu / subScores.length;
                    avgInt = sumInt / subScores.length;
                } else { avgAcc = grade.accuracy || 0; avgFlu = grade.fluency || 0; avgInt = grade.integrity || 0; }
                document.getElementById('accScore').textContent = Math.round(avgAcc);
                document.getElementById('fluencyScore').textContent = Math.round(avgFlu);
                document.getElementById('integrityScore').textContent = Math.round(avgInt);
                document.getElementById('suggestionText').innerHTML = `<strong>💡 ${t('suggestion')}：</strong>${toTraditional(grade.suggestion || '')}`;
                document.getElementById('scoreSource').textContent = t('source')+'：訊飛星火 4.0Ultra';
                document.querySelectorAll('#scoreResult .num').forEach(el => {
                    const val = parseFloat(el.textContent);
                    el.className = 'num' + (val>=80?' good': val>=60?' mid':' poor');
                });
                let fbHtml = '';
                (q.subQuestions || []).forEach((sq, idx) => {
                    const s = subScores[idx] || {accuracy:0, fluency:0, integrity:0};
                    fbHtml += `<div class="fb-item"><strong>${idx+1}.</strong> ${toTraditional(sq.question)}<br>內容:${s.accuracy||0} 豐富:${s.fluency||0} 語音:${s.integrity||0}</div>`;
                });
                document.getElementById('subFeedback').innerHTML = fbHtml;
                console.log('✅ 評分完成！');
            }

            function buildWsUrl(host, path, apiKey, apiSecret) {
                if (typeof CryptoJS === 'undefined') throw new Error('CryptoJS not loaded');
                const date = new Date().toUTCString();
                const requestLine = `GET ${path} HTTP/1.1`;
                const signatureOrigin = `host: ${host}\ndate: ${date}\n${requestLine}`;
                const hmac = CryptoJS.HmacSHA256(signatureOrigin, apiSecret);
                const signature = CryptoJS.enc.Base64.stringify(hmac);
                const authorizationOrigin = `api_key="${apiKey}", algorithm="hmac-sha256", headers="host date request-line", signature="${signature}"`;
                const authorization = CryptoJS.enc.Base64.stringify(CryptoJS.enc.Utf8.parse(authorizationOrigin));
                return `wss://${host}${path}?authorization=${encodeURIComponent(authorization)}&host=${host}&date=${encodeURIComponent(date)}`;
            }

            function loadCryptoJs(cb) {
                if (typeof CryptoJS !== 'undefined') { cryptoReady=true; cb(); return; }
                const script = document.createElement('script');
                script.src = 'https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js';
                script.onload = function() { cryptoReady=true; cb(); };
                script.onerror = function() { console.error('加密庫載入失敗'); };
                document.head.appendChild(script);
            }

            updateButtons();
        }

        // ================================================================
        // 12. 初始化
        // ================================================================
        initOpenCC();
        loadData();
        render();
        console.log('✅ 完整修正版已啟動，所有功能皆已包含。');
    })();
</script>
